<style>
body { background: linear-gradient(160deg,#EDE0D4 0%,#D8C4AE 100%); min-height:100vh; }
.phone-wrap {
  display:flex; justify-content:center; align-items:flex-start;
 min-height:100vh;
}

/* ── Header ──────────────────────────────── */
.home-header {
  padding: var(--sp-2) var(--sp-5) var(--sp-5);
  display:flex; justify-content:space-between; align-items:flex-start;
}
.greeting-sub  { font:var(--text-caption); color:var(--ink-3); letter-spacing:2px; margin-bottom:4px; }
.greeting-name { font-family:var(--font-serif); font-size:1.25rem; font-weight:700; color:var(--ink); letter-spacing:3px; }
.header-right  { display:flex; gap:var(--sp-3); align-items:center; padding-top:4px; }

/* ── Sections wrapper ────────────────────── */
.sections {
  display:flex; flex-direction:column;
  gap:var(--sp-4);
  padding:0 var(--sp-5) 100px;
}

/* ── 班级信息卡（简洁版）──────────────────── */
.class-card {
  display:flex; align-items:center; gap:var(--sp-3);
  padding:10px var(--sp-4);
  cursor:pointer;
}
.class-icon-sm {
  width:30px; height:30px; border-radius:var(--r-sm);
  background:var(--saffron-pale);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.class-text { flex:1; min-width:0; }
.class-name {
  font-family:var(--font-serif); font-weight:700;
  color:var(--ink); font-size:.8125rem; letter-spacing:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.class-notice-line {
  font:var(--text-caption); color:var(--ink-3); letter-spacing:.5px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:2px;
}
.class-notice-line .dot {
  display:inline-block; width:5px; height:5px; border-radius:50%;
  background:var(--saffron); margin-right:6px; vertical-align:middle;
}
.class-arrow {
  flex-shrink:0; color:var(--ink-4);
}

/* ── 当前法本卡 ───────────────────────────── */
.course-card {
  padding:var(--sp-5); position:relative; overflow:hidden;
}
.course-card::before {
  content:''; position:absolute; top:-24px; right:-24px;
  width:110px; height:110px; border-radius:50%;
  background:radial-gradient(circle,rgba(224,120,86,.13) 0%,transparent 70%);
  pointer-events:none;
}
.course-label {
  font:var(--text-caption); color:var(--ink-3); letter-spacing:2px;
  margin-bottom:var(--sp-2); display:flex; align-items:center; gap:6px;
}
.course-label::before {
  content:''; width:4px; height:4px; border-radius:50%; background:var(--saffron);
}
.course-title {
  font-family:var(--font-serif); font-size:1.125rem; font-weight:700;
  color:var(--ink); letter-spacing:3px; margin-bottom:var(--sp-3);
}
.course-meta   { display:flex; gap:var(--sp-2); flex-wrap:wrap; margin-bottom:var(--sp-4); }
.progress-row  { display:flex; justify-content:space-between; margin-bottom:var(--sp-2); }

/* ── 错题提醒 ─────────────────────────────── */
.review-card {
  display:flex; align-items:center; gap:var(--sp-3);
  padding:var(--sp-4);
  background:rgba(255,255,255,.62);
  backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
  border-radius:var(--r-lg);
  border:1px solid var(--glass-border);
  border-left:3px solid var(--crimson);
  box-shadow:var(--shadow-1);
}
.review-icon-wrap {
  width:40px; height:40px; border-radius:var(--r-sm);
  background:var(--crimson-light);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.review-badge {
  margin-left:auto; min-width:24px; height:24px;
  border-radius:var(--r-pill); background:var(--crimson); color:#FFF;
  font-size:.6rem; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  padding:0 6px; flex-shrink:0;
}

/* ── 快速入口 ─────────────────────────────── */
.icon-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:var(--sp-3);
}

<script>
// ── home 数据卡联接后端 ─────────────────────────────
//   /api/my/classes     → 顶部班级卡（空则隐藏）
//   /api/my/enrollments → 当前法本卡；需再调 /api/courses/:slug 取 overlay.progressPercent
//   /api/mistakes       → 错题 badge 数量（0 则隐藏整张卡）
// ──────────────────────────────────────────────────
var lang = window.JX.lang, sc = window.JX.sc;

function renderGreeting() {
  var h = new Date().getHours();
  var sub;
  if (h < 5)       sub = sc('深夜 · ', '深夜 · ');
  else if (h < 11) sub = sc('早安 · ', '早安 · ');
  else if (h < 13) sub = sc('午安 · ', '午安 · ');
  else if (h < 18) sub = sc('下午 · ', '下午 · ');
  else             sub = sc('晚安 · ', '晚安 · ');
  var m = new Date().getMonth() + 1;
  var months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('greeting-sub').textContent = sub + months[m - 1];
}

function renderClassCard(memberships) {
  // 缓存供 renderCourseCard 反查 enrolledViaClassId → 班级名
  window.__jxMyClasses = memberships || [];
  var card = document.getElementById('class-card');
  var cta  = document.getElementById('join-cta');
  if (!memberships || !memberships.length) {
    card.style.display = 'none';
    if (cta) cta.style.display = '';
    return;
  }
  if (cta) cta.style.display = 'none';
  var m = memberships[0];
  var cls = m.class || {};
  card.style.display = '';
  document.getElementById('class-name').textContent = cls.name || sc('（未命名班级）', '（未命名班級）');
  var joinedDays = 0;
  if (m.joinedAt) joinedDays = Math.max(0, Math.floor((Date.now() - new Date(m.joinedAt)) / 86400000));
  document.getElementById('class-notice').textContent = cls.joinCode
    ? sc('班级码 ', '班級碼 ') + cls.joinCode + ' · ' + sc('已加入 ', '已加入 ') + joinedDays + sc(' 天', ' 天')
    : sc('已加入 ', '已加入 ') + joinedDays + sc(' 天', ' 天');
}

function renderCourseCard(enrollment, overlay) {
  var classLine = document.getElementById('course-class-line');
  if (classLine) classLine.style.display = 'none';
  if (!enrollment) {
    document.getElementById('course-title').textContent = sc('尚未选修法本 · 点击下方去答题', '尚未選修法本 · 點擊下方去答題');
    document.getElementById('course-chapter-tag').textContent = sc('—', '—');
    document.getElementById('course-percent').textContent = '0%';
    document.getElementById('course-progress-fill').style.width = '0%';
    return;
  }
  var c = enrollment.course || {};
  document.getElementById('course-title').textContent = c.title || '—';
  // 若来自班级 · 把对应班级名显示在标题下方
  if (enrollment.source === 'class' && enrollment.enrolledViaClassId) {
    var membersCache = window.__jxMyClasses || [];
    var match = membersCache.find(function (m) {
      return m.class && m.class.id === enrollment.enrolledViaClassId;
    });
    if (match && classLine) {
      document.getElementById('course-class-name').textContent =
        sc('来自《', '來自《') + (match.class.name || '') + '》';
      classLine.style.display = '';
    }
  }
  var overlayObj = overlay || { progressPercent: 0, completedLessonIds: [], totalLessons: 0 };
  var pct = overlayObj.progressPercent || 0;
  document.getElementById('course-percent').textContent = pct + '%';
  document.getElementById('course-progress-fill').style.width = pct + '%';
  var done = (overlayObj.completedLessonIds || []).length;
  var total = overlayObj.totalLessons || 0;
  document.getElementById('course-chapter-tag').textContent =
    sc('已完成 ', '已完成 ') + done + ' / ' + total + sc(' 课', ' 課');
  // CTA 指向当前 lesson；若无则保持默认 quiz.html
  if (overlayObj.currentLessonId) {
    document.getElementById('course-cta').href = 'quiz.html?lessonId=' + encodeURIComponent(overlayObj.currentLessonId);
  }
}

// 学习中列表：报名 ≥ 1 时显示在首页下方
// 数据来源：/api/my/enrollments 已经返回 enrollment 数组（含 course 基础字段）
// 进度：仅展示 lessonsCompleted 数 / 总课时（来自 enrollment 自身字段）· 不并发拉每本详情避免请求风暴
function renderEnrollmentList(enrollments) {
  var box = document.getElementById('study-list-box');
  if (!box) return;
  var items = (enrollments || []).filter(function (e) { return e && e.course; });
  if (!items.length) { box.style.display = 'none'; return; }
  box.style.display = '';

  var listHtml = items.map(function (e, idx) {
    var c = e.course;
    var title = sc(c.title, c.titleTraditional || c.title);
    var emoji = c.coverEmoji || '🪷';
    var coverHtml = c.coverImageUrl
      ? '<img src="' + escapeHtml(c.coverImageUrl) + '" alt="" style="width:44px;height:44px;border-radius:8px;object-fit:cover;">'
      : '<div style="width:44px;height:44px;border-radius:8px;background:rgba(214,148,53,.12);display:flex;align-items:center;justify-content:center;font-size:1.4rem;">' + escapeHtml(emoji) + '</div>';
    var classMark = (e.source === 'class')
      ? '<span title="' + sc('班级主修', '班級主修') + '" style="margin-right:4px;">📍</span>'
      : '';
    // enrollment 自身只带 lessonsCompleted (string[]) · 总课时需要 course 详情
    // 这里只展示「已学 N 课」 + 「打开 →」按钮 · 详细进度 % 在详情页看
    var doneCount = (e.lessonsCompleted || []).length;
    var lastStudied = e.lastStudiedAt
      ? window.JX.util.relativeTime(new Date(e.lastStudiedAt))
      : sc('未开始', '未開始');
    var completed = e.completedAt;

    return '<a class="study-item" href="scripture-detail.html?slug=' + encodeURIComponent(c.slug) + '" '
      +    'style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--glass-thick);'
      +    'backdrop-filter:var(--blur);border-radius:var(--r-md);margin-bottom:8px;text-decoration:none;color:var(--ink);'
      +    'border:1px solid rgba(43,34,24,.06);">'
      +    coverHtml
      +    '<div style="flex:1;min-width:0;">'
      +      '<div style="font:var(--text-body);font-weight:500;letter-spacing:.5px;'
      +        'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'
      +        classMark + escapeHtml(title)
      +      '</div>'
      +      '<div style="font:var(--text-caption);color:var(--ink-3);margin-top:2px;letter-spacing:.5px;">'
      +        (completed
              ? '<span style="color:var(--vajra-green,#4caf50);">✓ ' + sc('已学完', '已學完') + '</span>'
              : sc('已学 ', '已學 ') + doneCount + sc(' 课 · ', ' 課 · ') + lastStudied)
      +      '</div>'
      +    '</div>'
      +    '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" '
      +      'stroke-linecap="round" viewBox="0 0 24 24" style="color:var(--ink-4);flex-shrink:0;">'
      +      '<polyline points="9 18 15 12 9 6"/></svg>'
      +  '</a>';
  }).join('');

  document.getElementById('study-list').innerHTML = listHtml;
}

function renderReviewBadge(mistakes) {
  var n = (mistakes || []).length;
  var card = document.getElementById('review-card');
  if (n === 0) { card.style.display = 'none'; return; }
  card.style.display = '';
  document.getElementById('review-badge').textContent = n > 99 ? '99+' : String(n);
}

function renderSm2Badge(stats) {
  var n = (stats && typeof stats.due === 'number') ? stats.due : 0;
  var card = document.getElementById('sm2-card');
  if (!card) return;
  if (n === 0) { card.style.display = 'none'; return; }
  card.style.display = '';
  document.getElementById('sm2-badge').textContent = n > 99 ? '99+' : String(n);
  var sub = sc(
    '共 ' + n + ' 张卡片到期 · 建议今日完成',
    '共 ' + n + ' 張卡片到期 · 建議今日完成'
  );
  document.getElementById('sm2-sub').textContent = sub;
}

function boot() {
  renderGreeting();

  // /classes 先 resolve（renderClassCard 缓存 memberships）· /enrollments 跟着 render
  // 避免 race：course-card 显示班级名依赖 __jxMyClasses 缓存
  Promise.all([
    window.JX.api.get('/api/my/classes').catch(function () { return []; }),
    window.JX.api.get('/api/my/enrollments').catch(function () { return []; }),
  ]).then(function (r) {
    renderClassCard(r[0]);
    var list = r[1];
    if (!list || !list.length) { renderCourseCard(null, null); return; }
    var first = list[0];
    if (!first.course || !first.course.slug) { renderCourseCard(first, null); return; }
    window.JX.api.get('/api/courses/' + encodeURIComponent(first.course.slug))
      .then(function (d) { renderCourseCard(first, d.overlay); })
      .catch(function () { renderCourseCard(first, null); });
    // 全部报名法本的进度列表（下方）
    renderEnrollmentList(list);
  });

  window.JX.api.get('/api/mistakes?limit=500').then(renderReviewBadge).catch(function () {});
  window.JX.api.get('/api/sm2/stats').then(renderSm2Badge).catch(function () {});

  window.JX.api.get('/api/notifications/unread-count').then(function (r) {
    var n = (r && r.data && r.data.count) | 0;
    var dot = document.getElementById('home-notif-dot');
    if (dot) dot.style.display = n > 0 ? 'block' : 'none';
  }).catch(function () {});
}

document.addEventListener('jx:user-ready', boot);
document.addEventListener('langchange', renderGreeting);
if (window.JX && window.JX.user) boot();
</script>
</body>
</html>
