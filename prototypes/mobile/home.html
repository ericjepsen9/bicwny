<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>觉学 · 首页</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
.phone-wrap {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px;
  min-height: 100vh;
  background: linear-gradient(160deg, #EDE0D4 0%, #D8C4AE 100%);
}

/* ── Header ─────────────────────────────────── */
.home-header {
  padding: var(--sp-2) var(--sp-5) var(--sp-4);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.greeting-sub { font: var(--text-caption); color: var(--ink-3); letter-spacing: 2px; margin-bottom: 4px; }
.greeting-name { font-family: var(--font-serif); font-size: 1.25rem; font-weight: 700; color: var(--ink); letter-spacing: 3px; }
.header-right  { display: flex; gap: var(--sp-3); align-items: center; padding-top: 4px; }

/* ── Streak ─────────────────────────────────── */
.streak-row {
  display: flex;
  gap: var(--sp-2);
  padding: 0 var(--sp-5);
  margin-bottom: var(--sp-4);
}
.streak-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.streak-dot {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.streak-dot.done    { background: var(--saffron); }
.streak-dot.today   { background: var(--saffron-dark); box-shadow: 0 0 0 3px var(--saffron-light); }
.streak-dot.pending { background: rgba(43,34,24,.10); }
.streak-day-lbl     { font-size: .625rem; color: var(--ink-4); letter-spacing: .5px; }
.streak-day-lbl.current { color: var(--saffron); font-weight: 700; }

/* ── Sections ───────────────────────────────── */
.sections {
  display: flex;
  flex-direction: column;
  gap: var(--sp-4);          /* clear visual gap between every card */
  padding: 0 var(--sp-5) 100px;
}

/* ── Course Card ────────────────────────────── */
.course-card {
  padding: var(--sp-5);
  position: relative;
  overflow: hidden;
}
.course-card::before {
  content: '';
  position: absolute;
  top: -24px; right: -24px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(224,120,86,.13) 0%, transparent 70%);
  pointer-events: none;
}
.course-label {
  font: var(--text-caption);
  color: var(--ink-3);
  letter-spacing: 2px;
  margin-bottom: var(--sp-2);
  display: flex; align-items: center; gap: 6px;
}
.course-label::before {
  content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--saffron);
}
.course-title {
  font-family: var(--font-serif);
  font-size: 1.125rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 3px;
  margin-bottom: var(--sp-3);
}
.course-meta { display: flex; gap: var(--sp-2); flex-wrap: wrap; margin-bottom: var(--sp-4); }
.progress-label { display: flex; justify-content: space-between; margin-bottom: var(--sp-2); }
.course-cta { display: flex; gap: var(--sp-3); margin-top: var(--sp-4); }

/* ── Plan Card ──────────────────────────────── */
.plan-card { padding: var(--sp-4) var(--sp-5); }
.plan-stats {
  display: grid;
  grid-template-columns: 1fr 1px 1fr 1px 1fr;
  align-items: center;
  margin-top: var(--sp-4);
}
.plan-sep { width: 1px; height: 32px; background: var(--border-light); justify-self: center; }

/* ── Review Reminder ────────────────────────── */
.review-card {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-4);
  background: rgba(255,255,255,.62);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-radius: var(--r-lg);
  border: 1px solid var(--glass-border);
  border-left: 3px solid var(--crimson);
  box-shadow: var(--shadow-1);
}
.review-icon-wrap {
  width: 40px; height: 40px;
  border-radius: var(--r-sm);
  background: var(--crimson-light);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.review-badge {
  margin-left: auto;
  min-width: 24px; height: 24px;
  border-radius: var(--r-pill);
  background: var(--crimson);
  color: #FFF;
  font-size: .6rem;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  padding: 0 6px;
  flex-shrink: 0;
}

/* ── Quick Access Grid ──────────────────────── */
.quick-section {}
.icon-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--sp-3);
  margin-top: var(--sp-3);
}

/* ── Upcoming pages dimmed ───────────────────── */
a.soon { opacity: .45; pointer-events: none; }
</style>
</head>
<body class="scene">

      </svg>
      <svg width="14" height="11" viewBox="0 0 14 11" fill="none">
        <path d="M7 9.5a1 1 0 1 1 0 1.5A1 1 0 0 1 7 9.5z" fill="#2B2218"/>
        <path d="M3.5 6A5 5 0 0 1 7 4.8 5 5 0 0 1 10.5 6" stroke="#2B2218" stroke-width="1.4" stroke-linecap="round" opacity=".6"/>

  <!-- Scrollable area -->

    <!-- Header -->

      <div class="header-right">

    <!-- Streak row -->
    <div class="streak-row">
      <div class="streak-day">

        <span class="streak-day-lbl">一</span>
      </div>
      <div class="streak-day">

        <span class="streak-day-lbl">二</span>
      </div>
      <div class="streak-day">
        <div class="streak-dot done"><svg width="12" height="12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>

      </div>
      <div class="streak-day">

        <span class="streak-day-lbl">四</span>
      </div>
      <div class="streak-day">
        <div class="streak-dot today"><svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3" fill="white"/></svg></div>

      </div>
      <div class="streak-day">

      <div class="streak-day">

    </div>

    <!-- All sections with consistent gap -->
    <div class="sections">

      <!-- Current course -->
      <div class="course-card glass-card-thick">

        <div class="course-meta">

          <div class="progress-fill" style="width:38%;"></div>
        </div>
        <div class="course-cta">
          <button class="btn btn-primary btn-pill" style="flex:2;">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            继续学习
          </button>
          <button class="btn btn-ghost btn-pill" style="flex:1;">法本目录</button>
        </div>
      </div>

      <!-- Today plan -->
      <div class="plan-card glass-card">

          <span class="pill pill-gold">🔥 连续 5 天</span>

            <span class="stat-value" style="color:var(--saffron);">12</span>

            <span class="stat-value" style="color:var(--crimson);">4</span>

      <!-- Review reminder -->

            <path d="M3.51 15a9 9 0 1 0 .49-4.57"/>

        </div>

      </div>

      <!-- Quick access -->
      <div class="quick-section">
        <div class="section-header">

        </div>
        <div class="icon-grid">
