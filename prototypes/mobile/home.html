<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>觉学 · 首页</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
/* ── Page-specific ───────────────────────────── */
.phone-wrap {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px 40px;
  min-height: 100vh;
  background: linear-gradient(160deg, #EDE0D4 0%, #D8C4AE 100%);
}

/* Header */
.home-header {
  padding: 0 var(--sp-5) var(--sp-4);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.greeting-line {
  font: var(--text-caption);
  color: var(--ink-3);
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.greeting-name {
  font-family: var(--font-serif);
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 3px;
}
.header-right {
  display: flex;
  gap: var(--sp-3);
  align-items: center;
  padding-top: 4px;
}

/* Course Card */
.course-card {
  margin: 0 var(--sp-5);
  padding: var(--sp-5);
  position: relative;
  overflow: hidden;
}
.course-card::before {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(224,120,86,.15) 0%, transparent 70%);
}
.course-label {
  font: var(--text-caption);
  color: var(--ink-3);
  letter-spacing: 2px;
  margin-bottom: var(--sp-2);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}
.course-label::before {
  content: '';
  display: block;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--saffron);
}
.course-title {
  font-family: var(--font-serif);
  font-size: 1.125rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 3px;
  margin-bottom: var(--sp-3);
}
.course-meta {
  display: flex;
  gap: var(--sp-3);
  margin-bottom: var(--sp-4);
}
.course-progress-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--sp-2);
}
.course-cta {
  display: flex;
  gap: var(--sp-3);
  margin-top: var(--sp-4);
}

/* Today Plan */
.plan-card {
  margin: 0 var(--sp-5);
  padding: var(--sp-4) var(--sp-5);
}
.plan-stats {
  display: grid;
  grid-template-columns: 1fr 1px 1fr 1px 1fr;
  gap: 0;
  align-items: center;
  margin-top: var(--sp-3);
}
.plan-divider {
  width: 1px;
  height: 32px;
  background: var(--border-light);
  justify-self: center;
}

/* Icon Grid */
.icon-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--sp-3);
  margin: 0 var(--sp-5);
}

/* Review Reminder */
.review-card {
  margin: 0 var(--sp-5);
  padding: var(--sp-4);
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  border-left: 3px solid var(--crimson);
  border-radius: 0 var(--r-lg) var(--r-lg) 0;
  background: rgba(255,255,255,.60);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
}
.review-icon-wrap {
  width: 40px; height: 40px;
  border-radius: var(--r-sm);
  background: var(--crimson-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.review-badge {
  margin-left: auto;
  min-width: 24px; height: 24px;
  border-radius: var(--r-pill);
  background: var(--crimson);
  color: #FFF;
  font-size: .625rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 6px;
  flex-shrink: 0;
}

/* Streak */
.streak-row {
  display: flex;
  gap: var(--sp-2);
  padding: 0 var(--sp-5);
}
.streak-day {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.streak-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.streak-dot.done    { background: var(--saffron);      }
.streak-dot.today   { background: var(--saffron-dark); box-shadow: 0 0 0 3px var(--saffron-light); }
.streak-dot.pending { background: var(--ink-5);        }
.streak-day-label   { font-size: .625rem; color: var(--ink-4); letter-spacing: .5px; }
</style>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <!-- Signal -->
      <svg width="16" height="10" fill="none" viewBox="0 0 16 10">
        <rect x="0" y="6" width="3" height="4" rx="1" fill="#2B2218" opacity=".3"/>
        <rect x="4.5" y="4" width="3" height="6" rx="1" fill="#2B2218" opacity=".5"/>
        <rect x="9" y="2" width="3" height="8" rx="1" fill="#2B2218" opacity=".7"/>
        <rect x="13.5" y="0" width="2.5" height="10" rx="1" fill="#2B2218"/>
      </svg>
      <!-- WiFi -->
      <svg width="14" height="10" fill="none" viewBox="0 0 14 10">
        <path d="M7 8.5a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" fill="#2B2218"/>
        <path d="M3.5 5.8A5 5 0 0 1 7 4.5a5 5 0 0 1 3.5 1.3" stroke="#2B2218" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
        <path d="M1 3A8 8 0 0 1 7 .5 8 8 0 0 1 13 3" stroke="#2B2218" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
      </svg>
      <!-- Battery -->
      <svg width="22" height="11" fill="none" viewBox="0 0 22 11">
        <rect x=".5" y=".5" width="18" height="10" rx="2.5" stroke="#2B2218" stroke-opacity=".35"/>
        <rect x="2" y="2" width="13" height="7" rx="1.5" fill="#2B2218" opacity=".85"/>
        <path d="M20 3.5v4a1.5 1.5 0 0 0 0-4z" fill="#2B2218" opacity=".4"/>
      </svg>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="scroll-area" style="height:756px; padding-bottom:80px;">

    <!-- Header -->
    <div class="home-header">
      <div>
        <p class="greeting-line">早安 · 四月</p>
        <p class="greeting-name">明心同学</p>
      </div>
      <div class="header-right">
        <div style="position:relative;">
          <svg width="22" height="22" fill="none" stroke="#55463A" stroke-width="1.8" stroke-linecap="round" viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <div class="notif-dot" style="position:absolute;top:-2px;right:-2px;"></div>
        </div>
        <div class="avatar">明</div>
      </div>
    </div>

    <!-- Streak Row -->
    <div class="streak-row mb-4">
      <div class="streak-day">
        <div class="streak-dot done">
          <svg width="12" height="12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span class="streak-day-label">一</span>
      </div>
      <div class="streak-day">
        <div class="streak-dot done">
          <svg width="12" height="12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span class="streak-day-label">二</span>
      </div>
      <div class="streak-dot done" style="margin:0 auto;">
        <svg width="12" height="12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="streak-day">
        <div class="streak-dot done">
          <svg width="12" height="12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span class="streak-day-label">四</span>
      </div>
      <div class="streak-day">
        <div class="streak-dot today">
          <svg width="12" height="12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="white"/></svg>
        </div>
        <span class="streak-day-label" style="color:var(--saffron);font-weight:600;">今</span>
      </div>
      <div class="streak-day">
        <div class="streak-dot pending"></div>
        <span class="streak-day-label">六</span>
      </div>
      <div class="streak-day">
        <div class="streak-dot pending"></div>
        <span class="streak-day-label">日</span>
      </div>
    </div>

    <!-- Current Course Card -->
    <div class="course-card glass-card">
      <p class="course-label">当前法本</p>
      <p class="course-title">《心经》全文贯通</p>
      <div class="course-meta">
        <span class="tag tag-saffron">初级</span>
        <span class="tag tag-ink">第 3 章 · 共 8 章</span>
        <span class="tag tag-sage">进行中</span>
      </div>
      <div class="course-progress-row">
        <span class="t-caption t-ink-3">学习进度</span>
        <span class="t-meta" style="color:var(--saffron);font-weight:600;">38%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:38%;"></div>
      </div>
      <div class="course-cta">
        <button class="btn btn-primary btn-pill" style="flex:2;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          继续学习
        </button>
        <button class="btn btn-ghost btn-pill" style="flex:1;">
          法本目录
        </button>
      </div>
    </div>

    <!-- Today Plan -->
    <div class="plan-card glass-card">
      <div class="section-header" style="margin-bottom:0;">
        <span class="section-title">今日计划</span>
        <span class="pill pill-gold">🔥 连续 5 天</span>
      </div>
      <div class="plan-stats">
        <div class="stat-pair">
          <span class="stat-value" style="color:var(--saffron);">12</span>
          <span class="stat-label">待学词</span>
        </div>
        <div class="plan-divider"></div>
        <div class="stat-pair">
          <span class="stat-value" style="color:var(--crimson);">4</span>
          <span class="stat-label">待复习</span>
        </div>
        <div class="plan-divider"></div>
        <div class="stat-pair">
          <span class="stat-value" style="color:var(--sage-dark);">8</span>
          <span class="stat-label">已完成</span>
        </div>
      </div>
    </div>

    <!-- Review Reminder -->
    <div class="review-card">
      <div class="review-icon-wrap">
        <svg width="18" height="18" fill="none" stroke="#A13C2E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4.57"/>
        </svg>
      </div>
      <div>
        <p class="t-meta" style="color:var(--crimson);letter-spacing:1.5px;">错题待复习</p>
        <p class="t-caption t-ink-3 mt-1">「色即是空」相关 · 建议今日回顾</p>
      </div>
      <div class="review-badge">4</div>
    </div>

    <!-- Quick Access Icons -->
    <div style="margin: 0 var(--sp-5);">
      <div class="section-header">
        <span class="section-title">快速入口</span>
      </div>
    </div>
    <div class="icon-grid">
      <!-- 法本 -->
      <a href="scripture.html" class="icon-tile">
        <div class="icon-bg icon-bg-saffron">
          <svg width="22" height="22" fill="none" stroke="#E07856" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <span class="icon-label">法本</span>
      </a>
      <!-- 错题 -->
      <a href="mistakes.html" class="icon-tile">
        <div class="icon-bg icon-bg-crimson">
          <svg width="22" height="22" fill="none" stroke="#A13C2E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4.57"/>
          </svg>
        </div>
        <span class="icon-label">错题</span>
      </a>
      <!-- 收藏 -->
      <a href="#" class="icon-tile">
        <div class="icon-bg icon-bg-gold">
          <svg width="22" height="22" fill="none" stroke="#B88956" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
        <span class="icon-label">收藏</span>
      </a>
      <!-- 成就 -->
      <a href="achievement.html" class="icon-tile">
        <div class="icon-bg icon-bg-sage">
          <svg width="22" height="22" fill="none" stroke="#7D9A6C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="6"/>
            <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
          </svg>
        </div>
        <span class="icon-label">成就</span>
      </a>
    </div>

  </div><!-- /scroll-area -->

  <!-- Bottom Tab Bar -->
  <div class="tab-bar">
    <a href="home.html" class="tab-item active">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>首页</span>
    </a>
    <a href="scripture.html" class="tab-item">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      <span>法本</span>
    </a>
    <a href="quiz.html" class="tab-item">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>答题</span>
    </a>
    <a href="profile.html" class="tab-item">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </a>
  </div>

</div><!-- /phone -->
</div><!-- /phone-wrap -->
</body>
</html>
