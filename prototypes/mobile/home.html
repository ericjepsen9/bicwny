<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>觉学 · 首页</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
body { background: linear-gradient(160deg,#EDE0D4 0%,#D8C4AE 100%); min-height:100vh; }
.phone-wrap {
  display:flex; justify-content:center; align-items:flex-start;
  padding:40px 20px; min-height:100vh;
}

/* ── Header ──────────────────────────────── */
.home-header {
  padding: var(--sp-2) var(--sp-5) var(--sp-5);
  display:flex; justify-content:space-between; align-items:flex-start;
}
.greeting-sub  { font:var(--text-caption); color:var(--ink-3); letter-spacing:2px; margin-bottom:4px; }
.greeting-name { font-family:var(--font-serif); font-size:1.25rem; font-weight:700; color:var(--ink); letter-spacing:3px; }
.header-right  { display:flex; gap:var(--sp-3); align-items:center; padding-top:4px; }

/* ── Sections wrapper ────────────────────── */
.sections {
  display:flex; flex-direction:column;
  gap:var(--sp-4);
  padding:0 var(--sp-5) 100px;
}

/* ── 班级信息卡（简洁版）──────────────────── */
.class-card {
  display:flex; align-items:center; gap:var(--sp-3);
  padding:10px var(--sp-4);
  cursor:pointer;
}
.class-icon-sm {
  width:30px; height:30px; border-radius:var(--r-sm);
  background:var(--saffron-pale);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.class-text { flex:1; min-width:0; }
.class-name {
  font-family:var(--font-serif); font-weight:700;
  color:var(--ink); font-size:.8125rem; letter-spacing:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.class-notice-line {
  font:var(--text-caption); color:var(--ink-3); letter-spacing:.5px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-top:2px;
}
.class-notice-line .dot {
  display:inline-block; width:5px; height:5px; border-radius:50%;
  background:var(--saffron); margin-right:6px; vertical-align:middle;
}
.class-arrow {
  flex-shrink:0; color:var(--ink-4);
}

/* ── 当前法本卡 ───────────────────────────── */
.course-card {
  padding:var(--sp-5); position:relative; overflow:hidden;
}
.course-card::before {
  content:''; position:absolute; top:-24px; right:-24px;
  width:110px; height:110px; border-radius:50%;
  background:radial-gradient(circle,rgba(224,120,86,.13) 0%,transparent 70%);
  pointer-events:none;
}
.course-label {
  font:var(--text-caption); color:var(--ink-3); letter-spacing:2px;
  margin-bottom:var(--sp-2); display:flex; align-items:center; gap:6px;
}
.course-label::before {
  content:''; width:4px; height:4px; border-radius:50%; background:var(--saffron);
}
.course-title {
  font-family:var(--font-serif); font-size:1.125rem; font-weight:700;
  color:var(--ink); letter-spacing:3px; margin-bottom:var(--sp-3);
}
.course-meta   { display:flex; gap:var(--sp-2); flex-wrap:wrap; margin-bottom:var(--sp-4); }
.progress-row  { display:flex; justify-content:space-between; margin-bottom:var(--sp-2); }

/* ── 错题提醒 ─────────────────────────────── */
.review-card {
  display:flex; align-items:center; gap:var(--sp-3);
  padding:var(--sp-4);
  background:rgba(255,255,255,.62);
  backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
  border-radius:var(--r-lg);
  border:1px solid var(--glass-border);
  border-left:3px solid var(--crimson);
  box-shadow:var(--shadow-1);
}
.review-icon-wrap {
  width:40px; height:40px; border-radius:var(--r-sm);
  background:var(--crimson-light);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.review-badge {
  margin-left:auto; min-width:24px; height:24px;
  border-radius:var(--r-pill); background:var(--crimson); color:#FFF;
  font-size:.6rem; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  padding:0 6px; flex-shrink:0;
}

/* ── 快速入口 ─────────────────────────────── */
.icon-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:var(--sp-3);
}
</style>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="10" viewBox="0 0 16 10" fill="none">
        <rect x="0"    y="6" width="3"   height="4"  rx="1" fill="#2B2218" opacity=".3"/>
        <rect x="4.5"  y="4" width="3"   height="6"  rx="1" fill="#2B2218" opacity=".5"/>
        <rect x="9"    y="2" width="3"   height="8"  rx="1" fill="#2B2218" opacity=".7"/>
        <rect x="13.5" y="0" width="2.5" height="10" rx="1" fill="#2B2218"/>
      </svg>
      <svg width="14" height="11" viewBox="0 0 14 11" fill="none">
        <path d="M7 9.5a1 1 0 1 1 0 1.5A1 1 0 0 1 7 9.5z" fill="#2B2218"/>
        <path d="M3.5 6A5 5 0 0 1 7 4.8 5 5 0 0 1 10.5 6" stroke="#2B2218" stroke-width="1.4" stroke-linecap="round" opacity=".6"/>
        <path d="M1 3A8 8 0 0 1 7 .5 8 8 0 0 1 13 3" stroke="#2B2218" stroke-width="1.4" stroke-linecap="round" opacity=".3"/>
      </svg>
      <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
        <rect x=".5" y=".5" width="18" height="10" rx="2.5" stroke="#2B2218" stroke-opacity=".35"/>
        <rect x="2"  y="2"  width="13" height="7"  rx="1.5" fill="#2B2218" opacity=".85"/>
        <path d="M20 3.5v4a1.5 1.5 0 0 0 0-4z" fill="#2B2218" opacity=".4"/>
      </svg>
    </div>
  </div>

  <!-- Scroll area -->
  <div class="scroll-area" style="height:756px;">

    <!-- Header -->
    <div class="home-header">
      <div>
        <p class="greeting-sub">早安 · 四月</p>
        <p class="greeting-name">明心同学</p>
      </div>
      <div class="header-right">
        <div style="position:relative;">
          <svg width="22" height="22" fill="none" stroke="#55463A" stroke-width="1.8" stroke-linecap="round" viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <div class="notif-dot" style="position:absolute;top:-2px;right:-2px;"></div>
        </div>
        <div class="avatar">明</div>
      </div>
    </div>

    <div class="sections">

      <!-- 班级信息（简洁卡，点击查看详情）-->
      <a href="#" class="class-card glass-card">
        <div class="class-icon-sm">
          <svg width="16" height="16" fill="none" stroke="#E07856" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="class-text">
          <p class="class-name">心经共修班</p>
          <p class="class-notice-line"><span class="dot"></span>本周五 20:00 线上共修</p>
        </div>
        <svg class="class-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </a>

      <!-- 当前法本卡 -->
      <div class="course-card glass-card-thick">
        <p class="course-label">当前法本</p>
        <p class="course-title">《心经》全文贯通</p>
        <div class="course-meta">
          <span class="tag tag-saffron">初级</span>
          <span class="tag tag-ink">第 3 章 · 共 8 章</span>
          <span class="tag tag-sage">进行中</span>
        </div>
        <div class="progress-row">
          <span class="t-caption t-ink-3">学习进度</span>
          <span class="t-meta" style="color:var(--saffron);font-weight:700;">38%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:38%;"></div>
        </div>
        <button class="btn btn-primary btn-lg btn-full btn-pill" style="margin-top:var(--sp-4);">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          继续学习
        </button>
      </div>

      <!-- 错题提醒 -->
      <div class="review-card">
        <div class="review-icon-wrap">
          <svg width="18" height="18" fill="none" stroke="#A13C2E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4.57"/>
          </svg>
        </div>
        <div>
          <p class="t-meta" style="color:var(--crimson);letter-spacing:1.5px;">错题待复习</p>
          <p class="t-caption t-ink-3" style="margin-top:3px;">「色即是空」相关 · 建议今日回顾</p>
        </div>
        <div class="review-badge">4</div>
      </div>

      <!-- 快速入口 -->
      <div>
        <div class="section-header">
          <span class="section-title">快速入口</span>
        </div>
        <div class="icon-grid">
          <a href="scripture.html" class="icon-tile">
            <div class="icon-bg icon-bg-saffron">
              <svg width="22" height="22" fill="none" stroke="#E07856" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
              </svg>
            </div>
            <span class="icon-label">法本</span>
          </a>
          <a href="mistakes.html" class="icon-tile">
            <div class="icon-bg icon-bg-crimson">
              <svg width="22" height="22" fill="none" stroke="#A13C2E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <polyline points="1 4 1 10 7 10"/>
                <path d="M3.51 15a9 9 0 1 0 .49-4.57"/>
              </svg>
            </div>
            <span class="icon-label">错题</span>
          </a>
          <a href="#" class="icon-tile">
            <div class="icon-bg icon-bg-gold">
              <svg width="22" height="22" fill="none" stroke="#B88956" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            </div>
            <span class="icon-label">收藏</span>
          </a>
          <a href="achievement.html" class="icon-tile">
            <div class="icon-bg icon-bg-sage">
              <svg width="22" height="22" fill="none" stroke="#7D9A6C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="6"/>
                <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
              </svg>
            </div>
            <span class="icon-label">成就</span>
          </a>
        </div>
      </div>

    </div><!-- /sections -->
  </div><!-- /scroll-area -->

  <!-- Bottom Tab Bar -->
  <div class="tab-bar">
    <a href="home.html" class="tab-item active">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>首页</span>
    </a>
    <a href="scripture.html" class="tab-item">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      <span>法本</span>
    </a>
    <a href="quiz.html" class="tab-item">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>答题</span>
    </a>
    <a href="profile.html" class="tab-item">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </a>
  </div>

</div><!-- /phone -->
</div><!-- /phone-wrap -->
</body>
</html>
