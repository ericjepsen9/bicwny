<!DOCTYPE html>
<html lang="zh-CN" data-lang="sc">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="view-transition" content="same-origin">
<title>觉学 · 编辑资料</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }

.avatar-section { display: flex; flex-direction: column; align-items: center; padding: var(--sp-4) 0 var(--sp-6); gap: var(--sp-3); }
.avatar-big {
  width: 84px; height: 84px; border-radius: 50%;
  background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-family: var(--font-serif); font-weight: 700; font-size: 2rem;
  letter-spacing: 2px; box-shadow: 0 8px 24px rgba(224,120,86,.3);
}
.avatar-help { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1.5px; }

.form-groups { padding: 0 var(--sp-5) var(--sp-4); display: flex; flex-direction: column; gap: var(--sp-4); }
.form-section-title { font-family: var(--font-serif); font-weight: 700; color: var(--ink-2); font-size: .8125rem; letter-spacing: 3px; padding: 0 2px; margin-top: var(--sp-2); }
.field-row {
  background: var(--glass-thick); backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border); border-radius: var(--r-lg);
  padding: var(--sp-3) var(--sp-4); display: flex; align-items: center; gap: var(--sp-3);
}
.field-label { font: var(--text-caption); font-weight: 600; color: var(--ink-2); letter-spacing: 2px; width: 74px; flex-shrink: 0; }
.field-input { flex: 1; border: none; background: transparent; font: var(--text-body); color: var(--ink); text-align: right; letter-spacing: 1px; outline: none; font-family: inherit; }
.field-input::placeholder { color: var(--ink-4); }
.field-input[readonly] { color: var(--ink-3); }
.field-input.avatar-hint { width: 44px; text-align: center; font-family: var(--font-serif); font-weight: 700; font-size: 1.125rem; }
.chip-row { display: flex; gap: var(--sp-2); flex: 1; justify-content: flex-end; flex-wrap: wrap; }
.chip {
  padding: 5px 14px; border-radius: var(--r-pill);
  font: var(--text-caption); font-weight: 600; letter-spacing: 1px;
  background: rgba(43,34,24,.05); border: 1px solid transparent; color: var(--ink-3);
  cursor: pointer; transition: all var(--dur) var(--ease);
}
.chip.active { background: var(--saffron-pale); border-color: var(--saffron-light); color: var(--saffron-dark); }

.form-msg { font: var(--text-caption); letter-spacing: 1px; padding: 10px 12px; border-radius: var(--r); min-height: 1em; margin: 0 var(--sp-5); }
.form-msg.error { color: var(--crimson); background: rgba(192,57,43,.08); }
.form-msg.ok    { color: var(--sage-dark); background: rgba(125,154,108,.12); }
.form-msg:empty { display: none; }

.edit-action { padding: var(--sp-4) var(--sp-5) var(--sp-5); }
.btn[aria-busy="true"] { opacity: .6; pointer-events: none; }
</style>
<script src="../shared/theme.js"></script>
<script src="../shared/sentry.js"></script>
<script src="../shared/analytics.js"></script>
<script src="../shared/experiments.js"></script>
<script src="../shared/lang.js"></script>
<script src="../shared/i18n.js"></script>
<script src="../shared/return-url.js"></script>
<script src="../shared/font-size.js"></script>
<script src="../shared/status-bar.js"></script>
<script src="../shared/config.js"></script>
<script src="../shared/token-store.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/offline-queue.js"></script>
<script src="../shared/scroll-restore.js"></script>
<script src="../shared/skeleton.js"></script>
<script src="../shared/haptics.js"></script>
<script src="../shared/require-auth.js"></script>
<script src="../shared/sw-register.js" defer></script>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone">

  <div class="status-bar" data-auto></div>

  <div class="top-nav">
    <a class="nav-back" href="profile.html">
      <svg width="18" height="18" fill="none" stroke="#55463A" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="nav-title"><span class="sc">编辑资料</span><span class="tc">編輯資料</span></span>
    <div style="width:34px;"></div>
  </div>

  <!-- Avatar preview -->
  <div class="avatar-section">
    <div class="avatar-big" id="avatar-preview">明</div>
    <p class="avatar-help"><span class="sc">头像显示姓名首字</span><span class="tc">頭像顯示姓名首字</span></p>
  </div>

  <form id="edit-form" class="form-groups" novalidate>

    <p class="form-section-title"><span class="sc">基础资料</span><span class="tc">基礎資料</span></p>

    <div class="field-row">
      <label class="field-label" for="fld-name"><span class="sc">法名 / 姓名</span><span class="tc">法名 ／ 姓名</span></label>
      <input class="field-input" id="fld-name" name="dharmaName" type="text" maxlength="32"
        data-ph-sc="请输入姓名或法名" data-ph-tc="請輸入姓名或法名" placeholder="请输入姓名或法名">
    </div>

    <div class="field-row">
      <label class="field-label" for="fld-avatar"><span class="sc">头像字</span><span class="tc">頭像字</span></label>
      <input class="field-input avatar-hint" id="fld-avatar" name="avatar" type="text" maxlength="2"
        data-ph-sc="取首字" data-ph-tc="取首字" placeholder="取首字">
    </div>

    <div class="field-row">
      <label class="field-label"><span class="sc">邮箱</span><span class="tc">郵箱</span></label>
      <input class="field-input" id="fld-email" type="email" readonly>
    </div>

    <p class="form-section-title"><span class="sc">偏好设置</span><span class="tc">偏好設置</span></p>

    <div class="field-row">
      <label class="field-label"><span class="sc">首选语言</span><span class="tc">首選語言</span></label>
      <div class="chip-row" id="locale-chips">
        <span class="chip" data-locale="zh-Hans"><span class="sc">简体</span><span class="tc">简體</span></span>
        <span class="chip" data-locale="zh-Hant"><span class="sc">繁体</span><span class="tc">繁體</span></span>
      </div>
    </div>

    <div class="field-row">
      <label class="field-label"><span class="sc">时区</span><span class="tc">時區</span></label>
      <div class="chip-row" id="tz-chips">
        <span class="chip" data-tz="Asia/Taipei">台北</span>
        <span class="chip" data-tz="Asia/Shanghai"><span class="sc">上海</span><span class="tc">上海</span></span>
        <span class="chip" data-tz="Asia/Hong_Kong"><span class="sc">香港</span><span class="tc">香港</span></span>
        <span class="chip" data-tz="America/Los_Angeles">LA</span>
        <span class="chip" data-tz="Europe/London">London</span>
      </div>
    </div>

    <div class="form-msg" id="edit-msg" role="status"></div>

  </form>

  <div class="edit-action">
    <button type="button" id="btn-save" class="btn btn-primary btn-lg btn-full btn-pill">
      <span class="sc">保存修改</span><span class="tc">保存修改</span>
    </button>
  </div>

</div><!-- /phone -->
</div><!-- /phone-wrap -->
<script src="../shared/nav.js"></script>
<script>
// profile-edit · PATCH /api/auth/me
// 可改：dharmaName / avatar / locale / timezone（与 User schema 一一对应）
var sc = window.JX.sc;

function pickInitial(name) {
  var s = (name || '').trim();
  for (var i = 0; i < s.length; i++) {
    if (/\S/.test(s.charAt(i))) return s.charAt(i);
  }
  return '·';
}

function setMsg(kind, text) {
  var el = document.getElementById('edit-msg');
  el.className = 'form-msg ' + kind;
  el.textContent = text || '';
}

function activateChip(containerId, attr, value) {
  var nodes = document.querySelectorAll('#' + containerId + ' .chip');
  nodes.forEach(function (c) { c.classList.toggle('active', c.getAttribute(attr) === value); });
}
function currentChip(containerId, attr) {
  var active = document.querySelector('#' + containerId + ' .chip.active');
  return active ? active.getAttribute(attr) : null;
}

function setupChipGroup(containerId, attr) {
  document.getElementById(containerId).addEventListener('click', function (ev) {
    var chip = ev.target.closest('.chip');
    if (!chip) return;
    activateChip(containerId, attr, chip.getAttribute(attr));
  });
}
setupChipGroup('locale-chips', 'data-locale');
setupChipGroup('tz-chips', 'data-tz');

// 姓名变化时同步预览头像
document.getElementById('fld-name').addEventListener('input', function (ev) {
  var explicit = document.getElementById('fld-avatar').value.trim();
  document.getElementById('avatar-preview').textContent = explicit || pickInitial(ev.target.value);
});
document.getElementById('fld-avatar').addEventListener('input', function (ev) {
  var v = ev.target.value.trim();
  document.getElementById('avatar-preview').textContent =
    v || pickInitial(document.getElementById('fld-name').value);
});

function hydrate(user) {
  document.getElementById('fld-name').value = user.dharmaName || '';
  document.getElementById('fld-avatar').value = user.avatar || '';
  document.getElementById('fld-email').value = user.email || '';
  document.getElementById('avatar-preview').textContent =
    user.avatar || pickInitial(user.dharmaName || user.email || '');
  activateChip('locale-chips', 'data-locale', user.locale || 'zh-Hans');
  activateChip('tz-chips', 'data-tz', user.timezone || 'Asia/Taipei');
}

function collectPatch(original) {
  var patch = {};
  var name = document.getElementById('fld-name').value.trim();
  var avatar = document.getElementById('fld-avatar').value.trim();
  var locale = currentChip('locale-chips', 'data-locale') || 'zh-Hans';
  var tz = currentChip('tz-chips', 'data-tz') || 'Asia/Taipei';
  if (name !== (original.dharmaName || ''))       patch.dharmaName = name;
  if (avatar !== (original.avatar || ''))         patch.avatar = avatar;
  if (locale !== (original.locale || 'zh-Hans'))  patch.locale = locale;
  if (tz !== (original.timezone || 'Asia/Taipei')) patch.timezone = tz;
  return patch;
}

// locale 只在保存成功后同步到站点语言，避免 PATCH 失败后 UI / 服务端落地不一致

var original = null;
function boot() {
  original = window.JX.user || null;
  if (original) {
    hydrate(original);
  } else {
    window.JX.api.get('/api/auth/me').then(function (u) { original = u; hydrate(u); });
  }
}

document.getElementById('btn-save').addEventListener('click', function () {
  setMsg('', '');
  if (!original) return;
  var patch = collectPatch(original);
  if (Object.keys(patch).length === 0) {
    setMsg('ok', sc('未做修改', '未做修改'));
    return;
  }
  var btn = this;
  var origLabel = btn.innerHTML;
  btn.setAttribute('aria-busy', 'true');
  btn.innerHTML = '<span class="sc">保存中…</span><span class="tc">保存中…</span>';
  window.JX.api.patch('/api/auth/me', patch).then(function (updated) {
    setMsg('ok', sc('已保存', '已保存'));
    original = updated;
    window.JX.user = updated;
    if (patch.locale) {
      var want = patch.locale === 'zh-Hant' ? 'tc' : 'sc';
      if ((document.documentElement.getAttribute('data-lang') || 'sc') !== want
          && typeof window.toggleLang === 'function') {
        window.toggleLang();
      }
    }
    setTimeout(function () { location.href = 'profile.html'; }, 500);
  }).catch(function (err) {
    setMsg('error', sc('保存失败：', '保存失敗：') + (err.message || err));
    btn.innerHTML = origLabel;
  }).finally(function () {
    btn.removeAttribute('aria-busy');
  });
});

document.addEventListener('jx:user-ready', boot);
if (window.JX && window.JX.user) boot();
</script>
</body>
</html>
