<!--
  顶礼本师释迦牟尼佛！

  顶礼文殊智慧勇识！

  顶礼传承大恩上师！

  无上甚深微妙法 百千万劫难遭遇
  我今见闻得受持 愿解如来真实义

  为度化一切众生，请大家发无上殊胜的菩提心！
-->
<!DOCTYPE html>
<html lang="zh-CN" data-lang="sc">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>觉学 · 登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }

/* ── Status bar ───────────────────────────── */
.status-bar { display: flex; justify-content: space-between; align-items: center; padding: var(--sp-3) var(--sp-5) var(--sp-2); }
.status-right { display: flex; align-items: center; gap: var(--sp-2); }

/* ── Lang button ──────────────────────────── */
.lang-btn {
  height: 22px; padding: 0 8px;
  border-radius: var(--r-pill);
  font-size: .625rem; font-weight: 700; letter-spacing: 1px;
  background: var(--saffron-pale); color: var(--saffron-dark);
  border: 1px solid var(--saffron-light);
  cursor: pointer; transition: all var(--dur) var(--ease);
}
.lang-btn:hover { background: var(--saffron-light); }

/* ── Logo ─────────────────────────────────── */
.logo-block { text-align: center; padding: var(--sp-5) var(--sp-5) var(--sp-6); }
.logo-icon {
  width: 68px; height: 68px; border-radius: var(--r-xl);
  margin: 0 auto var(--sp-4);
  background: linear-gradient(135deg, var(--saffron) 0%, var(--saffron-dark) 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 28px rgba(224,120,86,.35);
}
.logo-name { font-family: var(--font-serif); font-weight: 700; font-size: 1.5rem; color: var(--ink); letter-spacing: 8px; }
.logo-tagline { font: var(--text-caption); color: var(--ink-3); letter-spacing: 2px; margin-top: 4px; }

/* ── Screens ──────────────────────────────── */
.auth-screen { display: none; flex-direction: column; padding: 0 var(--sp-5) var(--sp-8); gap: var(--sp-4); }
.auth-screen.active { display: flex; animation: slideUp .2s var(--ease); }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

.screen-title { font-family: var(--font-serif); font-weight: 700; font-size: 1.125rem; color: var(--ink); letter-spacing: 4px; }

/* ── Code row ─────────────────────────────── */
.code-row { display: flex; gap: var(--sp-3); }
.code-row .input-field { flex: 1; }
.code-btn {
  padding: 0 var(--sp-4); border-radius: var(--r); white-space: nowrap; flex-shrink: 0;
  font: var(--text-caption); font-weight: 700; letter-spacing: 1px; cursor: pointer;
  background: var(--saffron-pale); border: 1.5px solid var(--saffron-light); color: var(--saffron-dark);
  transition: all var(--dur) var(--ease);
}
.code-btn:hover { background: var(--saffron-light); }
.code-btn.counting { color: var(--ink-4); background: rgba(255,255,255,.5); border-color: var(--border); cursor: default; }

/* ── Auth links ───────────────────────────── */
.auth-links { display: flex; justify-content: space-between; }
.auth-link { font: var(--text-caption); color: var(--saffron); letter-spacing: 1px; cursor: pointer; }
.auth-link.muted { color: var(--ink-3); }
.auth-center { text-align: center; }
</style>
<!-- lang.js 必须在 <head> 最后，data-lang 在渲染前生效避免文字闪烁 -->
<script src="../shared/lang.js"></script>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time" style="font-weight:600;font-size:.75rem;color:var(--ink-2);">9:41</span>
    <div class="status-right">
      <button class="lang-btn" onclick="toggleLang()">繁</button>
      <svg width="56" height="12" viewBox="0 0 56 12" fill="#2B2218">
        <rect x="0" y="7" width="3" height="5" rx=".5" opacity=".3"/>
        <rect x="5" y="5" width="3" height="7" rx=".5" opacity=".5"/>
        <rect x="10" y="2" width="3" height="10" rx=".5" opacity=".7"/>
        <rect x="15" y="0" width="3" height="12" rx=".5"/>
        <circle cx="26" cy="11" r="1"/>
        <path d="M23 8a5 5 0 0 1 6 0" stroke="#2B2218" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".6"/>
        <path d="M20.5 5.5a9 9 0 0 1 11 0" stroke="#2B2218" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".3"/>
        <rect x="36" y="2" width="16" height="8" rx="1.5" stroke="#2B2218" stroke-opacity=".35" stroke-width=".8" fill="none"/>
        <rect x="37" y="3" width="11" height="6" rx="1" opacity=".85"/>
        <path d="M53 5v2a1.5 1.5 0 0 0 0-2z" opacity=".4"/>
      </svg>
    </div>
  </div>

  <!-- Logo（三屏共用）-->
  <div class="logo-block">
    <div class="logo-icon">
      <svg width="30" height="30" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </div>
    <p class="logo-name">
      <span class="sc">觉　学</span><span class="tc">覺　學</span>
    </p>
    <p class="logo-tagline">
      <span class="sc">智慧学习 · 如是我闻</span><span class="tc">智慧學習 · 如是我聞</span>
    </p>
  </div>

  <!-- ══ 屏一：登录 ══ -->
  <div class="auth-screen active" id="screen-login">
    <p class="screen-title"><span class="sc">欢迎回来</span><span class="tc">歡迎回來</span></p>

    <div class="input-group">
      <label class="input-label"><span class="sc">手机号码</span><span class="tc">手機號碼</span></label>
      <input class="input-field" type="tel" inputmode="numeric" maxlength="11"
        data-ph-sc="请输入手机号" data-ph-tc="請輸入手機號" placeholder="请输入手机号">
    </div>

    <div class="input-group">
      <label class="input-label"><span class="sc">登录密码</span><span class="tc">登錄密碼</span></label>
      <input class="input-field" type="password"
        data-ph-sc="请输入密码" data-ph-tc="請輸入密碼" placeholder="请输入密码">
    </div>

    <a href="home.html" class="btn btn-primary btn-lg btn-full btn-pill">
      <span class="sc">登　录</span><span class="tc">登　錄</span>
    </a>

    <div class="auth-links">
      <span class="auth-link muted" onclick="showScreen('screen-register')">
        <span class="sc">没有账号？注册</span><span class="tc">沒有帳號？註冊</span>
      </span>
      <span class="auth-link" onclick="showScreen('screen-forgot')">
        <span class="sc">忘记密码</span><span class="tc">忘記密碼</span>
      </span>
    </div>
  </div>

  <!-- ══ 屏二：注册 ══ -->
  <div class="auth-screen" id="screen-register">
    <p class="screen-title"><span class="sc">创建账号</span><span class="tc">建立帳號</span></p>

    <div class="input-group">
      <label class="input-label"><span class="sc">法名 / 姓名</span><span class="tc">法名 ／ 姓名</span></label>
      <input class="input-field" type="text"
        data-ph-sc="请输入姓名" data-ph-tc="請輸入姓名" placeholder="请输入姓名">
    </div>

    <div class="input-group">
      <label class="input-label"><span class="sc">手机号码</span><span class="tc">手機號碼</span></label>
      <input class="input-field" type="tel" inputmode="numeric" maxlength="11"
        data-ph-sc="请输入手机号" data-ph-tc="請輸入手機號" placeholder="请输入手机号">
    </div>

    <div class="input-group">
      <label class="input-label"><span class="sc">验证码</span><span class="tc">驗證碼</span></label>
      <div class="code-row">
        <input class="input-field" type="text" inputmode="numeric" maxlength="6"
          data-ph-sc="6 位验证码" data-ph-tc="6 位驗證碼" placeholder="6 位验证码">
        <button class="code-btn" onclick="startCountdown(this)">
          <span class="sc">获取验证码</span><span class="tc">取得驗證碼</span>
        </button>
      </div>
    </div>

    <div class="input-group">
      <label class="input-label"><span class="sc">设置密码</span><span class="tc">設定密碼</span></label>
      <input class="input-field" type="password"
        data-ph-sc="至少 8 位" data-ph-tc="至少 8 位" placeholder="至少 8 位">
    </div>

    <a href="home.html" class="btn btn-primary btn-lg btn-full btn-pill">
      <span class="sc">注　册</span><span class="tc">註　冊</span>
    </a>

    <p class="auth-center">
      <span class="auth-link muted" onclick="showScreen('screen-login')">
        <span class="sc">已有账号？登录</span><span class="tc">已有帳號？登錄</span>
      </span>
    </p>
  </div>

  <!-- ══ 屏三：找回密码 ══ -->
  <div class="auth-screen" id="screen-forgot">
    <p class="screen-title"><span class="sc">找回密码</span><span class="tc">找回密碼</span></p>

    <div class="input-group">
      <label class="input-label"><span class="sc">手机号码</span><span class="tc">手機號碼</span></label>
      <input class="input-field" type="tel" inputmode="numeric" maxlength="11"
        data-ph-sc="请输入注册手机号" data-ph-tc="請輸入註冊手機號" placeholder="请输入注册手机号">
    </div>

    <div class="input-group">
      <label class="input-label"><span class="sc">验证码</span><span class="tc">驗證碼</span></label>
      <div class="code-row">
        <input class="input-field" type="text" inputmode="numeric" maxlength="6"
          data-ph-sc="6 位验证码" data-ph-tc="6 位驗證碼" placeholder="6 位验证码">
        <button class="code-btn" onclick="startCountdown(this)">
          <span class="sc">获取验证码</span><span class="tc">取得驗證碼</span>
        </button>
      </div>
    </div>

    <div class="input-group">
      <label class="input-label"><span class="sc">新密码</span><span class="tc">新密碼</span></label>
      <input class="input-field" type="password"
        data-ph-sc="至少 8 位" data-ph-tc="至少 8 位" placeholder="至少 8 位">
    </div>

    <div class="input-group">
      <label class="input-label"><span class="sc">确认新密码</span><span class="tc">確認新密碼</span></label>
      <input class="input-field" type="password"
        data-ph-sc="再次输入密码" data-ph-tc="再次輸入密碼" placeholder="再次输入密码">
    </div>

    <a href="auth.html" class="btn btn-primary btn-lg btn-full btn-pill">
      <span class="sc">确认重置</span><span class="tc">確認重設</span>
    </a>

    <p class="auth-center">
      <span class="auth-link muted" onclick="showScreen('screen-login')">
        <span class="sc">返回登录</span><span class="tc">返回登錄</span>
      </span>
    </p>
  </div>

</div><!-- /phone -->
</div><!-- /phone-wrap -->

<script>
// 三屏切换
function showScreen(id) {
  document.querySelectorAll('.auth-screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// 验证码 60s 倒计时
function startCountdown(btn) {
  let s = 60;
  btn.disabled = true;
  btn.classList.add('counting');
  // 记录当前语言版本的按钮文本
  const iv = setInterval(function () {
    btn.innerHTML = s-- + 's';
    if (s < 0) {
      clearInterval(iv);
      const lang = document.documentElement.getAttribute('data-lang') || 'sc';
      btn.innerHTML = lang === 'sc'
        ? '<span class="sc">重新获取</span><span class="tc" style="display:none">重新取得</span>'
        : '<span class="sc" style="display:none">重新获取</span><span class="tc">重新取得</span>';
      btn.disabled = false;
      btn.classList.remove('counting');
    }
  }, 1000);
}
</script>
</body>
</html>
