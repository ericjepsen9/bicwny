<!--
  顶礼本师释迦牟尼佛！

  顶礼文殊智慧勇识！

  顶礼传承大恩上师！

  无上甚深微妙法 百千万劫难遭遇
  我今见闻得受持 愿解如来真实义

  为度化一切众生，请大家发无上殊胜的菩提心！
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>觉学 · 登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
body { background:linear-gradient(160deg,#EDE0D4 0%,#D8C4AE 100%); min-height:100vh; }
.row { display:flex; justify-content:center; gap:28px; padding:40px 20px; flex-wrap:wrap; }
.phone-caption { text-align:center; font:var(--text-meta); color:var(--ink-2); letter-spacing:2px; margin-bottom:var(--sp-3); }

/* ── Auth Layout ──────────────────────────── */
.auth-body { display:flex; flex-direction:column; height:756px; padding:var(--sp-6) var(--sp-5) var(--sp-8); }

/* Logo block */
.logo-block { text-align:center; margin-bottom:var(--sp-8); }
.logo-icon {
  width:72px; height:72px; border-radius:var(--r-xl); margin:0 auto var(--sp-4);
  background:linear-gradient(135deg,var(--saffron) 0%,var(--saffron-dark) 100%);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 10px 28px rgba(224,120,86,.35);
}
.logo-name   { font-family:var(--font-serif); font-weight:700; font-size:1.5rem; color:var(--ink); letter-spacing:6px; }
.logo-tagline{ font:var(--text-caption); color:var(--ink-3); letter-spacing:2px; margin-top:4px; }

/* Form */
.auth-form  { display:flex; flex-direction:column; gap:var(--sp-4); flex:1; }
.form-title { font-family:var(--font-serif); font-weight:700; font-size:1.125rem; color:var(--ink); letter-spacing:4px; margin-bottom:var(--sp-2); }

/* Verification code row */
.code-row   { display:flex; gap:var(--sp-3); }
.code-row .input-field { flex:1; }
.code-btn {
  padding:0 var(--sp-4); border-radius:var(--r); white-space:nowrap;
  font:var(--text-caption); font-weight:700; letter-spacing:1.5px;
  background:var(--saffron-pale); border:1.5px solid var(--saffron-light);
  color:var(--saffron-dark); flex-shrink:0;
}
.code-btn.counting { color:var(--ink-4); background:rgba(255,255,255,.5); border-color:var(--border); }

/* Footer links */
.auth-links { display:flex; justify-content:space-between; margin-top:var(--sp-2); }
.auth-link  { font:var(--text-caption); color:var(--saffron); letter-spacing:1px; }
.auth-link.plain { color:var(--ink-3); }

/* Divider */
.auth-divider { text-align:center; position:relative; margin:var(--sp-2) 0; }
.auth-divider::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:var(--border-light); }
.auth-divider span { position:relative; background:transparent; padding:0 var(--sp-3); font:var(--text-caption); color:var(--ink-4); letter-spacing:1px; }
</style>
</head>
<body>
<div class="row">

<!-- ══ 登录 ══ -->
<div>
<p class="phone-caption">登录</p>
<div class="phone">
  <div class="status-bar">
    <span class="time">9:41</span>
    <svg width="56" height="12" viewBox="0 0 56 12" fill="#2B2218">
      <rect x="0" y="7" width="3" height="5" rx=".5" opacity=".3"/><rect x="5" y="5" width="3" height="7" rx=".5" opacity=".5"/><rect x="10" y="2" width="3" height="10" rx=".5" opacity=".7"/><rect x="15" y="0" width="3" height="12" rx=".5"/>
      <circle cx="26" cy="11" r="1"/><path d="M23 8a5 5 0 0 1 6 0" stroke="#2B2218" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".6"/><path d="M20.5 5.5a9 9 0 0 1 11 0" stroke="#2B2218" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".3"/>
      <rect x="36" y="2" width="16" height="8" rx="1.5" stroke="#2B2218" stroke-opacity=".35" stroke-width=".8" fill="none"/><rect x="37" y="3" width="11" height="6" rx="1" opacity=".85"/><path d="M53 5v2a1.5 1.5 0 0 0 0-2z" opacity=".4"/>
    </svg>
  </div>

  <div class="auth-body">
    <div class="logo-block">
      <div class="logo-icon">
        <svg width="32" height="32" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <p class="logo-name">觉　学</p>
      <p class="logo-tagline">智慧学习 · 如是我闻</p>
    </div>

    <div class="auth-form">
      <p class="form-title">欢迎回来</p>
      <div class="input-group">
        <label class="input-label">手机号码</label>
        <input class="input-field" type="tel" placeholder="请输入手机号">
      </div>
      <div class="input-group">
        <label class="input-label">登录密码</label>
        <input class="input-field" type="password" placeholder="请输入密码">
      </div>
      <a href="home.html" class="btn btn-primary btn-lg btn-full btn-pill" style="margin-top:var(--sp-2);">
        登　录
      </a>
      <div class="auth-links">
        <a href="#register" class="auth-link plain">没有账号？注册</a>
        <a href="#forgot" class="auth-link">忘记密码</a>
      </div>
    </div>
  </div>
</div>
</div>

<!-- ══ 注册 ══ -->
<div>
<p class="phone-caption">注册</p>
<div class="phone">
  <div class="status-bar">
    <span class="time">9:41</span>
    <svg width="56" height="12" viewBox="0 0 56 12" fill="#2B2218">
      <rect x="0" y="7" width="3" height="5" rx=".5" opacity=".3"/><rect x="5" y="5" width="3" height="7" rx=".5" opacity=".5"/><rect x="10" y="2" width="3" height="10" rx=".5" opacity=".7"/><rect x="15" y="0" width="3" height="12" rx=".5"/>
      <circle cx="26" cy="11" r="1"/><path d="M23 8a5 5 0 0 1 6 0" stroke="#2B2218" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".6"/><path d="M20.5 5.5a9 9 0 0 1 11 0" stroke="#2B2218" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".3"/>
      <rect x="36" y="2" width="16" height="8" rx="1.5" stroke="#2B2218" stroke-opacity=".35" stroke-width=".8" fill="none"/><rect x="37" y="3" width="11" height="6" rx="1" opacity=".85"/><path d="M53 5v2a1.5 1.5 0 0 0 0-2z" opacity=".4"/>
    </svg>
  </div>

  <div class="auth-body">
    <div class="logo-block" style="margin-bottom:var(--sp-5);">
      <div class="logo-icon">
        <svg width="32" height="32" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <p class="logo-name">觉　学</p>
    </div>

    <div class="auth-form">
      <p class="form-title">创建账号</p>
      <div class="input-group">
        <label class="input-label">法名 / 姓名</label>
        <input class="input-field" type="text" placeholder="请输入姓名">
      </div>
      <div class="input-group">
        <label class="input-label">手机号码</label>
        <input class="input-field" type="tel" placeholder="请输入手机号">
      </div>
      <div class="input-group">
        <label class="input-label">验证码</label>
        <div class="code-row">
          <input class="input-field" type="text" placeholder="6 位验证码">
          <button class="code-btn">获取验证码</button>
        </div>
      </div>
      <div class="input-group">
        <label class="input-label">设置密码</label>
        <input class="input-field" type="password" placeholder="至少 8 位">
      </div>
      <a href="home.html" class="btn btn-primary btn-lg btn-full btn-pill">
        注　册
      </a>
      <p style="text-align:center;"><a href="#login" class="auth-link plain">已有账号？登录</a></p>
    </div>
  </div>
</div>
</div>

<!-- ══ 找回密码 ══ -->
<div>
<p class="phone-caption">找回密码</p>
<div class="phone">
  <div class="status-bar">
    <span class="time">9:41</span>
    <svg width="56" height="12" viewBox="0 0 56 12" fill="#2B2218">
      <rect x="0" y="7" width="3" height="5" rx=".5" opacity=".3"/><rect x="5" y="5" width="3" height="7" rx=".5" opacity=".5"/><rect x="10" y="2" width="3" height="10" rx=".5" opacity=".7"/><rect x="15" y="0" width="3" height="12" rx=".5"/>
      <circle cx="26" cy="11" r="1"/><path d="M23 8a5 5 0 0 1 6 0" stroke="#2B2218" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".6"/><path d="M20.5 5.5a9 9 0 0 1 11 0" stroke="#2B2218" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".3"/>
      <rect x="36" y="2" width="16" height="8" rx="1.5" stroke="#2B2218" stroke-opacity=".35" stroke-width=".8" fill="none"/><rect x="37" y="3" width="11" height="6" rx="1" opacity=".85"/><path d="M53 5v2a1.5 1.5 0 0 0 0-2z" opacity=".4"/>
    </svg>
  </div>

  <div class="auth-body">
    <div class="logo-block" style="margin-bottom:var(--sp-5);">
      <div class="logo-icon">
        <svg width="32" height="32" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <p class="logo-name">觉　学</p>
    </div>

    <div class="auth-form">
      <p class="form-title">找回密码</p>
      <div class="input-group">
        <label class="input-label">手机号码</label>
        <input class="input-field" type="tel" placeholder="请输入注册手机号">
      </div>
      <div class="input-group">
        <label class="input-label">验证码</label>
        <div class="code-row">
          <input class="input-field" type="text" placeholder="6 位验证码">
          <button class="code-btn counting">55s 后重发</button>
        </div>
      </div>
      <div class="input-group">
        <label class="input-label">新密码</label>
        <input class="input-field" type="password" placeholder="至少 8 位">
      </div>
      <div class="input-group">
        <label class="input-label">确认新密码</label>
        <input class="input-field" type="password" placeholder="再次输入密码">
      </div>
      <a href="auth.html" class="btn btn-primary btn-lg btn-full btn-pill">
        确认重置
      </a>
      <p style="text-align:center;"><a href="auth.html" class="auth-link plain">返回登录</a></p>
    </div>
  </div>
</div>
</div>

</div>
<script src="../shared/nav.js"></script>
</body>
</html>
