<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }

/* Top nav · 复用 components.css 共享样式 · 此处仅压低标题字号 */
.top-nav .nav-title { font-size: 1rem; letter-spacing: 3px; }

/* Reading header */
.reading-header { padding: 0 var(--sp-5) var(--sp-3); display: flex; justify-content: space-between; align-items: center; }
.reading-progress { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px; }

/* Reading body */
.reading-body { padding: var(--sp-4) var(--sp-5) 90px; }
.reading-chapter-label { font: var(--text-meta); color: var(--saffron); letter-spacing: 3px; font-weight: 700; margin-bottom: var(--sp-2); }

}

}
.scripture-text .annotated { border-bottom: 1.5px dashed var(--gold-dark); cursor: pointer; }

/* Annotation card */
.annotation-card {

}

/* Bottom tools */
.reading-tools {

}
.tool-btn {

  gap: 3px; padding: 6px; border-radius: var(--r-sm);
  text-decoration: none; cursor: pointer; background: none; border: none;
}
.tool-btn span { font: var(--text-caption); color: var(--ink-2); letter-spacing: 1px; }
.tool-btn.primary {
  flex: 1.6; background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
  color: #FFF; padding: 10px; flex-direction: row; gap: var(--sp-2);
  box-shadow: 0 4px 14px rgba(224,120,86,.35); border-radius: var(--r-sm);
}
.tool-btn.primary span { color: #FFF; font-weight: 700; letter-spacing: 2px; font-family: var(--font-serif); }

/* 介绍页（首次打开法本）· 全屏卡片 */
.intro-screen {
  display: none;
  position: absolute; inset: 0; z-index: 50;
  background: var(--bg-scene);
  padding: var(--sp-6) var(--sp-5);
  overflow-y: auto;
}
.intro-screen.show { display: block; }
.intro-cover {
  width: 60%; max-width: 220px; aspect-ratio: 1/1;
  margin: var(--sp-4) auto var(--sp-5);
  border-radius: var(--r-lg);
  background: linear-gradient(135deg, var(--saffron-pale), var(--gold-pale));
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; box-shadow: var(--shadow-2);
}
.intro-cover img { width: 100%; height: 100%; object-fit: cover; }
.intro-cover-emoji { font-size: 4.5rem; }
.intro-title {
  font-family: var(--font-serif); font-weight: 700; font-size: 1.5rem;
  text-align: center; letter-spacing: 4px; color: var(--ink); margin-bottom: 6px;
}
.intro-author {
  text-align: center; color: var(--ink-3); font: var(--text-caption);
  letter-spacing: 1.5px; margin-bottom: var(--sp-5);
}
.intro-stats {
  display: flex; justify-content: center; gap: var(--sp-5); margin-bottom: var(--sp-5);
}
.intro-stat-num { font-family: var(--font-serif); font-weight: 700; font-size: 1.25rem; color: var(--saffron-dark); }
.intro-stat-lbl { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px; }
.intro-desc {
  font: var(--text-body-serif); color: var(--ink-2);
  letter-spacing: 1px; line-height: 1.85;
  margin-bottom: var(--sp-6); padding: 0 var(--sp-3); text-align: justify;
  white-space: pre-wrap;
}
.intro-cta {
  display: block; width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
  color: #FFF; border: 0; border-radius: var(--r-pill);
  font-family: var(--font-serif); font-weight: 700;
  font-size: 1rem; letter-spacing: 4px; cursor: pointer;
  box-shadow: 0 6px 18px rgba(224,120,86,.35);
}

<script>
// scripture-reading · 电子书阅读模式
//   ?slug=xxx                      → auto-resume：用 enrollment.lastStudiedAt 判断首次
//                                    首次 → 介绍页；不是首次 → currentLessonId 续读
//   ?slug=xxx&lessonId=yyy          → 直接打开指定 lesson
//   ?slug=xxx&intro=1               → 强制显示介绍页（用于「打开新书」入口）
var sc = window.JX.sc, escapeHtml = window.JX.util.escapeHtml;

function flattenLessons(course) {
  var out = [];
  (course.chapters || []).forEach(function (ch, ci) {
    (ch.lessons || []).forEach(function (l, li) {
      out.push({
        lesson: l, chapter: ch,
        chapterIdx: ci, lessonIdx: li, chapterCount: (course.chapters || []).length,
      });
    });
  });
  return out;
}

function showIntro(course, flat, slug, manual) {
  var screen = document.getElementById('intro-screen');
  var coverEl = document.getElementById('intro-cover');
  if (course.coverImageUrl) {
    coverEl.innerHTML = '<img src="' + escapeHtml(course.coverImageUrl) + '" alt="">';
  } else {
    coverEl.innerHTML = '<span class="intro-cover-emoji">' + escapeHtml(course.coverEmoji || '🪷') + '</span>';
  }
  document.getElementById('intro-title').textContent = course.title || '—';
  var authorEl = document.getElementById('intro-author');
  authorEl.textContent = course.author || '';
  authorEl.style.display = course.author ? '' : 'none';
  document.getElementById('intro-chapters').textContent = (course.chapters || []).length;
  document.getElementById('intro-lessons').textContent = flat.length;
  document.getElementById('intro-desc').textContent = course.description || '';

  // 手动重看模式：显示 × 关闭按钮 + 「开始阅读」改成「关闭介绍」
  var closeBtn = document.getElementById('intro-close');
  var startBtn = document.getElementById('intro-start');
  if (manual) {
    closeBtn.style.display = '';
    closeBtn.onclick = function () { screen.classList.remove('show'); };
    startBtn.innerHTML = '<span class="sc">关闭介绍</span><span class="tc">關閉介紹</span>';
    startBtn.onclick = function () { screen.classList.remove('show'); };
  } else {
    closeBtn.style.display = 'none';
    startBtn.innerHTML = '<span class="sc">开始阅读</span><span class="tc">開始閱讀</span>';
    startBtn.onclick = function () {
      if (!flat.length) return;
      var first = flat[0];
      location.href = window.JX.nav.toReading({ slug: slug, lessonId: first.lesson.id });
    };
  }
  screen.classList.add('show');
}

function renderLesson(ctx, flat, slug, courseId, enrolled, course, overlay) {
  var l = ctx.lesson;
  var ch = ctx.chapter;
  document.getElementById('top-title').textContent = ch.title;
  document.getElementById('chapter-label').textContent =
    sc('第 ', '第 ') + (ctx.chapterIdx + 1) + sc(' 章 · 第 ', ' 章 · 第 ') + (ctx.lessonIdx + 1) + sc(' 课', ' 課');
  document.getElementById('lesson-title').textContent = l.title;

  var idxInFlat = flat.findIndex(function (x) { return x.lesson.id === l.id; });
  document.getElementById('reading-progress').textContent =
    sc('第 ', '第 ') + (idxInFlat + 1) + ' / ' + flat.length + sc(' 课', ' 課');

  // M6: referenceText 为空时给更明确的友好提示
  // - 文案区分'admin 还没录入原文' vs 引导用户去看讲解 + 答题
  // - hasSummary 时强调'内容已在课时要点 / 答题中'，否则显示纯空状态
  var hasSummary = !!l.teachingSummary;
  var emptyHint = hasSummary
    ? sc('本课无原文摘录 · 内容以下方「课时要点」与答题为准',
         '本課無原文摘錄 · 內容以下方「課時要點」與答題為準')
    : sc('本课暂无原文摘录', '本課暫無原文摘錄');
  var refHtml = l.referenceText
    ? '<p class="scripture-text">' + escapeHtml(l.referenceText).replace(/\n/g, '<br>') + '</p>'
    : '<div class="scripture-text" style="color:var(--ink-4);text-align:center;padding:var(--sp-4);background:rgba(43,34,24,.04);border-radius:var(--r);border:1px dashed var(--ink-5);font-size:.875rem;">' +
        '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" viewBox="0 0 24 24" style="display:block;margin:0 auto 6px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>' +
        escapeHtml(emptyHint) +
      '</div>';
  document.getElementById('lesson-reference').innerHTML = refHtml;

  var sumHtml = l.teachingSummary
    ? '<div class="annotation-card">' +
        '<p class="annotation-title">' +
          '<svg width="14" height="14" fill="none" stroke="#B88956" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>' +
          escapeHtml(sc('课时要点', '課時要點')) +
        '</p>' +
        '<p class="annotation-body">' + escapeHtml(l.teachingSummary).replace(/\n/g, '<br>') + '</p>' +
      '</div>'
    : '';
  document.getElementById('lesson-summary').innerHTML = sumHtml;

  var prev = flat[idxInFlat - 1];
  var next = flat[idxInFlat + 1];
  function lessonHref(id) {
    return window.JX.nav.toReading({ slug: slug, lessonId: id });
  }

  // 「记录已读」+ 跳转 · 用户点 [上/下一课] 或 [本课答题] 都视为'读过'
  // 注意：仅更新 currentLessonId（已读状态）· 不再 addCompletedLessonId
  // '已学'状态升级为：答题正确率 ≥ 80% 时由 quiz.html 标记
  function markAndGo(targetUrl) {
    if (enrolled && courseId) {
      window.JX.api.patch(
        '/api/enrollments/' + encodeURIComponent(courseId) + '/progress',
        { currentLessonId: l.id }
      ).then(function (res) {
        // M2: 同步写 cache · 切到 quiz/下一课时不丢"刚读到的位置"
        if (res && res.overlay && window.JX.overlayCache) {
          window.JX.overlayCache.save(courseId, res.overlay);
        }
      }).catch(function () { /* 静默 */ });
    }
    location.href = targetUrl;
  }

  var prevBtn = document.getElementById('prev-lesson');
  var nextBtn = document.getElementById('next-lesson');
  if (prevBtn) {
    if (prev) { prevBtn.style.visibility = ''; prevBtn.onclick = function () { markAndGo(lessonHref(prev.lesson.id)); }; }
    else { prevBtn.style.visibility = 'hidden'; }
  }
  if (nextBtn) {
    if (next) { nextBtn.style.visibility = ''; nextBtn.onclick = function () { markAndGo(lessonHref(next.lesson.id)); }; }
    else { nextBtn.style.visibility = 'hidden'; }
  }

  // 顶部目录 → scripture-detail · 顶部返回 → courses 列表
  // toc-link 跳 detail · 带 from=reading 让 detail 返回时能回到 reading
  document.getElementById('toc-link').href = window.JX.nav.toScriptureDetail({
    slug: slug,
    from: window.JX.nav.FROM.READING,
  });
  // H4: 顶部 ← 按 ?from= 动态决定回逻辑父级（mature app 行为 · 不依赖浏览器 history）
  var navFrom = window.JX.util.queryParam('from') || '';
  var backEl = document.getElementById('back-link');
  backEl.href = window.JX.nav.fromReadingReturnUrl({ from: navFrom, slug: slug });

  // ℹ️ 介绍按钮 → 弹出介绍页（手动重看模式）
  var introBtn = document.getElementById('intro-btn');
  if (introBtn && course) {
    introBtn.onclick = function () { showIntro(course, flat, slug, true); };
  }

  // D4: A-/A+ 字号步进 · 复用 JX.fontSize 4 档（0.9 / 1 / 1.15 / 1.3）
  (function () {
    if (!window.JX || !window.JX.fontSize) return;
    var SCALES = window.JX.fontSize.list().map(function (s) { return s.value; });
    function step(dir) {
      var cur = window.JX.fontSize.get();
      var idx = SCALES.indexOf(cur);
      if (idx < 0) {
        // 找最接近的档位
        idx = 0;
        var best = Math.abs(SCALES[0] - cur);
        for (var i = 1; i < SCALES.length; i++) {
          var d = Math.abs(SCALES[i] - cur);
          if (d < best) { best = d; idx = i; }
        }
      }
      var next = Math.max(0, Math.min(SCALES.length - 1, idx + dir));
      if (next === idx) return; // 已到端点
      window.JX.fontSize.set(SCALES[next]);
      if (window.JX.toast) {
        var lbl = window.JX.fontSize.list()[next];
        window.JX.toast.info('字号：' + (lbl.labelSc || lbl.value));
      }
    }
    var smaller = document.getElementById('font-smaller');
    var bigger = document.getElementById('font-bigger');
    if (smaller) smaller.onclick = function () { step(-1); };
    if (bigger) bigger.onclick = function () { step(1); };
  })();

  // [本课答题] 按钮：先 mark 已读再跳 quiz · from=reading 配合返回
  // courseId 透传给 quiz · 完成时由 quiz 决定是否标记 addCompletedLessonId
  // nextLessonId 透传 · quiz 完成页可显示「下一课」直接跳转下一课的阅读
  var quizBtn = document.getElementById('goto-quiz');
  if (quizBtn) {
    var quizUrl = window.JX.nav.toQuiz({
      lessonId: l.id,
      courseId: courseId,
      from: window.JX.nav.FROM.READING,
      slug: slug,
      nextLessonId: next ? next.lesson.id : null,
    });
    quizBtn.href = quizUrl;
    quizBtn.addEventListener('click', function (ev) {
      ev.preventDefault();
      markAndGo(quizUrl);
    });
  }

  // 「✓ 本课已学」标记：当前课在 enrollment.lessonsCompleted 数组里 → 在状态徽章旁显示
  var completedSet = new Set((overlay && overlay.completedLessonIds) || []);
  var stateEl = document.getElementById('reading-state');
  if (stateEl) {
    if (completedSet.has(l.id)) {
      stateEl.className = 'pill pill-sage';
      stateEl.innerHTML = '<span class="sc">✓ 本课已学</span><span class="tc">✓ 本課已學</span>';
    } else {
      stateEl.className = 'pill pill-saffron';
      stateEl.innerHTML = '<span class="sc">阅读中</span><span class="tc">閱讀中</span>';
    }
  }

  // 进入页面就更新 currentLessonId（不加 addCompletedLessonId · 等用户主动跳走才标完成）
  if (enrolled && courseId) {
    window.JX.api.patch(
      '/api/enrollments/' + encodeURIComponent(courseId) + '/progress',
      { currentLessonId: l.id }
    ).then(function (res) {
      // M2: 写 cache 让同 session 内其他 tab/页 也能优先看到最新 currentLessonId
      if (res && res.overlay && window.JX.overlayCache) {
        window.JX.overlayCache.save(courseId, res.overlay);
      }
    }).catch(function () { /* 静默 */ });
  }
}

function showError(msg) {
  document.querySelector('.reading-body').innerHTML =
    '<p class="scripture-text" style="color:var(--crimson);text-align:center;">'
    + escapeHtml(msg) + '</p>';
}

function resolveSlug() {
  var q = window.JX.util.queryParam('slug');
  if (q) return Promise.resolve(q);
  return window.JX.api.get('/api/my/enrollments').then(function (list) {
    if (list && list.length && list[0].course && list[0].course.slug) return list[0].course.slug;
    location.replace('courses.html');
    return new Promise(function () {});
  });
}

function boot() {
  var lessonId = window.JX.util.queryParam('lessonId');
  var forceIntro = window.JX.util.queryParam('intro') === '1';
  var slug;
  resolveSlug()
    .then(function (s) {
      slug = s;
      if (!window.JX.util.queryParam('slug')) {
        var u = new URL(location.href);
        u.searchParams.set('slug', slug);
        history.replaceState(null, '', u);
      }
      return Promise.all([
        window.JX.api.get('/api/courses/' + encodeURIComponent(slug)),
        window.JX.api.get('/api/my/enrollments').catch(function () { return []; }),
      ]);
    })
    .then(function (rs) {
      var data = rs[0];
      var enrollments = rs[1] || [];
      var course = data.course || data;
      var overlay = data.overlay;
      var flat = flattenLessons(course);
      if (!flat.length) return showError(sc('本法本暂无课时', '本法本暫無課時'));

      var enr = enrollments.find(function (e) { return e.course && e.course.slug === slug; });
      var neverOpened = !enr || !enr.lastStudiedAt;
      var enrolled = !!enr;
      var courseId = course.id;

      // M4: archived 法本进入只读模式 · banner 提示 · 答题入口由后端拦
      if (course.archivedAt && window.JX.toast) {
        window.JX.toast.info(sc(
          '该法本已下线 · 仅可复习已学内容（无法新答题）',
          '該法本已下線 · 僅可複習已學內容（無法新答題）'
        ));
      }

      // M2: 读 quiz 刚写的 overlay cache · 5min 内有效 · 与服务端 overlay 合并（cache 优先）
      // 解决 PATCH→GET 复制延迟造成 reading boot 拿到 stale completedLessonIds 的问题
      if (window.JX.overlayCache) {
        var cached = window.JX.overlayCache.read(courseId);
        if (cached) overlay = window.JX.overlayCache.merge(overlay, cached);
      }

      // URL lessonId > forceIntro > 首次打开 > currentLessonId 续读 > 第一课
      if (lessonId) {
        var ctx = flat.find(function (x) { return x.lesson.id === lessonId; }) || flat[0];
        renderLesson(ctx, flat, slug, courseId, enrolled, course, overlay);
      } else if (forceIntro || neverOpened) {
        showIntro(course, flat, slug, false);
      } else {
        var resumeId = overlay && overlay.currentLessonId;
        var ctx2 = resumeId ? flat.find(function (x) { return x.lesson.id === resumeId; }) : null;
        renderLesson(ctx2 || flat[0], flat, slug, courseId, enrolled, course, overlay);
      }
    })
    .catch(function (err) { showError(sc('加载失败：', '加載失敗：') + (err.message || err)); });
}
document.addEventListener('jx:user-ready', boot);
document.addEventListener('langchange', boot);
if (window.JX && window.JX.user) boot();
</script>
</body>
</html>
