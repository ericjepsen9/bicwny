<!--
  顶礼本师释迦牟尼佛！

  顶礼文殊智慧勇识！

  顶礼传承大恩上师！

  无上甚深微妙法 百千万劫难遭遇
  我今见闻得受持 愿解如来真实义

  为度化一切众生，请大家发无上殊胜的菩提心！
-->
<!DOCTYPE html>
<html lang="zh-CN" data-lang="sc">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>觉学 · 色即是空</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }

/* Top nav */
.top-nav { display: flex; align-items: center; gap: var(--sp-3); padding: 0 var(--sp-5) var(--sp-3); }
.top-nav-title { font-family: var(--font-serif); font-weight: 700; color: var(--ink); font-size: 1rem; letter-spacing: 3px; flex: 1; }
.nav-action {
  width: 34px; height: 34px; border-radius: var(--r-sm);
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; cursor: pointer;
}

/* Reading header */
.reading-header { padding: 0 var(--sp-5) var(--sp-3); display: flex; justify-content: space-between; align-items: center; }
.reading-progress { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px; }

/* Reading body */
.reading-body { padding: var(--sp-4) var(--sp-5) 90px; }
.reading-chapter-label { font: var(--text-meta); color: var(--saffron); letter-spacing: 3px; font-weight: 700; margin-bottom: var(--sp-2); }
.reading-chapter-title { font-family: var(--font-serif); font-size: 1.375rem; font-weight: 700; color: var(--ink); letter-spacing: 5px; margin-bottom: var(--sp-5); }

.scripture-text {
  font-family: var(--font-serif); font-size: 1rem; line-height: 2.2;
  color: var(--ink); letter-spacing: 3px; margin-bottom: var(--sp-4); text-align: justify;
}
.scripture-text .highlight {
  background: linear-gradient(180deg, transparent 60%, rgba(224,120,86,.35) 60%);
  padding: 0 2px; cursor: pointer;
}
.scripture-text .annotated { border-bottom: 1.5px dashed var(--gold-dark); cursor: pointer; }

/* Annotation card */
.annotation-card {
  padding: var(--sp-4); margin-bottom: var(--sp-4);
  background: var(--gold-pale); border: 1px solid var(--gold-light);
  border-left: 3px solid var(--gold); border-radius: 0 var(--r) var(--r) 0;
}
.annotation-title {
  font-family: var(--font-serif); font-weight: 700; color: var(--gold-dark);
  font-size: .875rem; letter-spacing: 2px; margin-bottom: var(--sp-2);
  display: flex; align-items: center; gap: 6px;
}
.annotation-body { font: var(--text-body-serif); color: var(--ink-2); letter-spacing: 1px; line-height: 1.75; }

/* Bottom tools */
.reading-tools {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; gap: var(--sp-2); padding: var(--sp-3) var(--sp-4) 28px;
  background: var(--glass-thick); backdrop-filter: var(--blur);
  border-top: 1px solid var(--glass-border);
}
.tool-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 6px; border-radius: var(--r-sm);
  text-decoration: none; cursor: pointer; background: none; border: none;
}
.tool-btn span { font: var(--text-caption); color: var(--ink-2); letter-spacing: 1px; }
.tool-btn.primary {
  flex: 1.6; background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
  color: #FFF; padding: 10px; flex-direction: row; gap: var(--sp-2);
  box-shadow: 0 4px 14px rgba(224,120,86,.35); border-radius: var(--r-sm);
}
.tool-btn.primary span { color: #FFF; font-weight: 700; letter-spacing: 2px; font-family: var(--font-serif); }
</style>
<script src="../shared/lang.js"></script>
<script src="../shared/status-bar.js"></script>
<script src="../shared/config.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/require-auth.js"></script>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone" style="position:relative;overflow:hidden;">

  <div class="status-bar" data-auto></div>

  <div class="top-nav">
    <a class="nav-action" id="back-link" href="scripture-detail.html">
      <svg width="18" height="18" fill="none" stroke="#55463A" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="top-nav-title" id="top-title">—</span>
    <button class="nav-action" id="prev-lesson" aria-label="上一课">
      <svg width="18" height="18" fill="none" stroke="#55463A" stroke-width="1.8" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
  </div>

  <div class="reading-header">
    <span class="reading-progress" id="reading-progress">—</span>
    <span class="pill pill-saffron" id="reading-state"><span class="sc">阅读中</span><span class="tc">閱讀中</span></span>
  </div>

  <div class="reading-body">
    <p class="reading-chapter-label" id="chapter-label">—</p>
    <h1 class="reading-chapter-title" id="lesson-title">—</h1>

    <div id="lesson-reference"></div>
    <div id="lesson-summary"></div>
  </div>

  <div class="reading-tools">
    <button class="tool-btn" id="next-lesson" aria-label="下一课">
      <svg width="20" height="20" fill="none" stroke="#55463A" stroke-width="1.8" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
      <span><span class="sc">下一课</span><span class="tc">下一課</span></span>
    </button>
    <button class="tool-btn soon" title="即将上线">
      <svg width="20" height="20" fill="none" stroke="#55463A" stroke-width="1.8" stroke-linecap="round" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span><span class="sc">笔记</span><span class="tc">筆記</span></span>
    </button>
    <a href="#" class="tool-btn primary" id="goto-quiz">
      <svg width="16" height="16" fill="none" stroke="#FFF" stroke-width="2.2" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span><span class="sc">开始答题</span><span class="tc">開始答題</span></span>
    </a>
  </div>

</div><!-- /phone -->
</div><!-- /phone-wrap -->
<script src="../shared/nav.js"></script>
<script>
// scripture-reading · 从 /api/courses/:slug 拿课程树，定位 ?lessonId=
var sc = window.JX.sc, escapeHtml = window.JX.util.escapeHtml;

function flattenLessons(course) {
  var out = [];
  (course.chapters || []).forEach(function (ch, ci) {
    (ch.lessons || []).forEach(function (l, li) {
      out.push({
        lesson: l, chapter: ch,
        chapterIdx: ci, lessonIdx: li, chapterCount: (course.chapters || []).length,
      });
    });
  });
  return out;
}

function renderLesson(ctx, flat) {
  var l = ctx.lesson;
  var ch = ctx.chapter;
  document.getElementById('top-title').textContent = ch.title + ' · ' + l.title;
  document.getElementById('chapter-label').textContent =
    sc('第 ', '第 ') + (ctx.chapterIdx + 1) + sc(' 章 · 第 ', ' 章 · 第 ') + (ctx.lessonIdx + 1) + sc(' 课', ' 課');
  document.getElementById('lesson-title').textContent = l.title;

  var idxInFlat = flat.findIndex(function (x) { return x.lesson.id === l.id; });
  document.getElementById('reading-progress').textContent =
    sc('第 ', '第 ') + (idxInFlat + 1) + ' / ' + flat.length + sc(' 课', ' 課');

  var refHtml = l.referenceText
    ? '<p class="scripture-text">' + escapeHtml(l.referenceText).replace(/\n/g, '<br>') + '</p>'
    : '<p class="scripture-text" style="color:var(--ink-4);">' + escapeHtml(sc('（本课暂无原文摘录）', '（本課暫無原文摘錄）')) + '</p>';
  document.getElementById('lesson-reference').innerHTML = refHtml;

  var sumHtml = l.teachingSummary
    ? '<div class="annotation-card">' +
        '<p class="annotation-title">' +
          '<svg width="14" height="14" fill="none" stroke="#B88956" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>' +
          escapeHtml(sc('课时要点', '課時要點')) +
        '</p>' +
        '<p class="annotation-body">' + escapeHtml(l.teachingSummary).replace(/\n/g, '<br>') + '</p>' +
      '</div>'
    : '';
  document.getElementById('lesson-summary').innerHTML = sumHtml;

  // 导航按钮（上一课 / 下一课）
  var prev = flat[idxInFlat - 1];
  var next = flat[idxInFlat + 1];
  var slug = window.JX.util.queryParam('slug');
  function lessonHref(id) {
    return 'scripture-reading.html?slug=' + encodeURIComponent(slug) + '&lessonId=' + encodeURIComponent(id);
  }
  var prevBtn = document.getElementById('prev-lesson');
  var nextBtn = document.getElementById('next-lesson');
  if (prev) { prevBtn.style.visibility = ''; prevBtn.onclick = function () { location.href = lessonHref(prev.lesson.id); }; }
  else { prevBtn.style.visibility = 'hidden'; }
  if (next) { nextBtn.style.visibility = ''; nextBtn.onclick = function () { location.href = lessonHref(next.lesson.id); }; }
  else { nextBtn.style.visibility = 'hidden'; }

  document.getElementById('back-link').href = 'scripture-detail.html?slug=' + encodeURIComponent(slug);
  document.getElementById('goto-quiz').href = 'quiz.html?lessonId=' + encodeURIComponent(l.id);
}

function showError(msg) {
  document.querySelector('.reading-body').innerHTML =
    '<p class="scripture-text" style="color:var(--crimson);text-align:center;">'
    + escapeHtml(msg) + '</p>';
}

function resolveSlug() {
  var q = window.JX.util.queryParam('slug');
  if (q) return Promise.resolve(q);
  return window.JX.api.get('/api/my/enrollments').then(function (list) {
    if (list && list.length && list[0].course && list[0].course.slug) return list[0].course.slug;
    return window.JX.api.get('/api/courses').then(function (courses) {
      if (!courses || !courses.length) throw new Error(sc('暂无已发布法本', '暫無已發佈法本'));
      return courses[0].slug;
    });
  });
}

function boot() {
  var lessonId = window.JX.util.queryParam('lessonId');
  resolveSlug()
    .then(function (slug) {
      // 若初始 URL 没有 slug，补一个，避免后续分享链接丢参
      if (!window.JX.util.queryParam('slug')) {
        var u = new URL(location.href);
        u.searchParams.set('slug', slug);
        history.replaceState(null, '', u);
      }
      return window.JX.api.get('/api/courses/' + encodeURIComponent(slug));
    })
    .then(function (data) {
      var course = data.course || data;
      var flat = flattenLessons(course);
      if (!flat.length) return showError(sc('本法本暂无课时', '本法本暫無課時'));
      var ctx = lessonId ? flat.find(function (x) { return x.lesson.id === lessonId; }) : flat[0];
      if (!ctx) ctx = flat[0];
      renderLesson(ctx, flat);
    })
    .catch(function (err) { showError(sc('加载失败：', '加載失敗：') + (err.message || err)); });
}
document.addEventListener('jx:user-ready', boot);
document.addEventListener('langchange', boot);
if (window.JX && window.JX.user) boot();
</script>
</body>
</html>
