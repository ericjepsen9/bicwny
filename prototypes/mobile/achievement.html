  无上甚深微妙法 百千万劫难遭遇
  我今见闻得受持 愿解如来真实义

  为度化一切众生，请大家发无上殊胜的菩提心！
-->
<!DOCTYPE html>
<html lang="zh-CN" data-lang="sc">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>觉学 · 学习统计</title>
<script src="../shared/lang.js"></script>
<script src="../shared/return-url.js"></script>
<script src="../shared/font-size.js"></script>
<script src="../shared/status-bar.js"></script>
<script src="../shared/config.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/require-auth.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<style>
body { background:linear-gradient(160deg,#EDE0D4 0%,#D8C4AE 100%); min-height:100vh; }
.phone-wrap { display:flex; justify-content:center; }
/* ── Level Ring ───────────────────────────── */
.level-section {
  display:flex; flex-direction:column; align-items:center;
  padding:var(--sp-5) var(--sp-5) var(--sp-4);
  gap:var(--sp-3);
}
.level-ring-wrap { position:relative; width:120px; height:120px; }
.level-ring-track {
  position:absolute; inset:0; border-radius:50%;
  background: conic-gradient(
    var(--gold) 0deg,
    var(--gold-dark) 252deg,
    var(--gold-light) 252deg
  );
  mask: radial-gradient(farthest-side, transparent 58%, black 59%);
  -webkit-mask: radial-gradient(farthest-side, transparent 58%, black 59%);
}
.level-ring-inner {
  position:absolute; inset:8px;
  border-radius:50%;
  background:linear-gradient(135deg,#FFFAF4,#F6DFCA);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  box-shadow:inset 0 2px 8px rgba(160,100,60,.08);
}
.level-num  { font-family:var(--font-serif); font-weight:700; font-size:2rem; color:var(--gold-dark); line-height:1; }
.level-word { font:var(--text-caption); color:var(--gold); letter-spacing:2px; margin-top:2px; }
.level-title { font-family:var(--font-serif); font-weight:700; font-size:1.125rem; color:var(--ink); letter-spacing:4px; }
.level-subtitle { font:var(--text-caption); color:var(--ink-3); letter-spacing:2px; }

/* ── Stats ────────────────────────────────── */
.stats-row {
  display:grid; grid-template-columns:1fr 1px 1fr 1px 1fr;
  margin:0 var(--sp-5); padding:var(--sp-4);
  background:var(--glass-thick); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-border); border-radius:var(--r-lg);
  box-shadow:var(--shadow-1);
}
.stats-sep { background:var(--border-light); justify-self:center; height:36px; width:1px; }

/* ── Badge Grid ───────────────────────────── */
.badge-section { padding:var(--sp-4) var(--sp-5) 100px; }
.badge-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--sp-3); margin-top:var(--sp-3); }
.badge-item {
  display:flex; flex-direction:column; align-items:center; gap:var(--sp-2);
  padding:var(--sp-4) var(--sp-2);
  border-radius:var(--r-lg); border:1px solid var(--glass-border);
}
.badge-item.earned {
  background:linear-gradient(135deg,var(--gold-pale),var(--gold-light));
  border-color:var(--gold-light);
  box-shadow:0 4px 12px rgba(212,165,116,.2);
}
.badge-item.locked { background:rgba(255,255,255,.35); opacity:.55; }
.badge-icon { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.badge-item.earned .badge-icon { background:linear-gradient(135deg,var(--gold-light),var(--gold)); box-shadow:0 3px 10px rgba(180,130,80,.3); }
.badge-item.locked .badge-icon { background:rgba(43,34,24,.06); }
.badge-name { font:var(--text-caption); font-weight:600; letter-spacing:1px; text-align:center; }
.badge-item.earned .badge-name { color:var(--gold-dark); }
.badge-item.locked .badge-name { color:var(--ink-4); }
.badge-cond { font-size:.5625rem; color:var(--ink-4); letter-spacing:.5px; text-align:center; line-height:1.5; }
.badge-progress {
  width:100%; height:3px; background:rgba(43,34,24,.08); border-radius:2px; overflow:hidden; margin-top:2px;
}
.badge-progress > span { display:block; height:100%; background:var(--gold); border-radius:2px; }
.badge-item.earned .badge-progress { display:none; }
</style>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone">

  <div class="status-bar" data-auto></div>

  <div class="top-nav">
    <a class="nav-back" id="nav-back" href="profile.html"><svg width="18" height="18" fill="none" stroke="#55463A" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="nav-title"><span class="sc">学习统计</span><span class="tc">學習統計</span></span>
    <div style="width:34px;"></div>
  </div>

  <div class="scroll-area">

    <!-- 总览环：累计答题数 -->
    <div class="level-section">
      <div class="level-ring-wrap">
        <div class="level-ring-track" id="stat-ring"></div>
        <div class="level-ring-inner">
          <span class="level-num" id="stat-total">—</span>
          <span class="level-word"><span class="sc">累计答题</span><span class="tc">累計答題</span></span>
        </div>
      </div>
      <p class="level-title" id="stat-days-title">—</p>
      <p class="level-subtitle" id="stat-today">—</p>
    </div>

    <!-- 三项指标 -->
    <div class="stats-row">
      <div class="stat-pair">
        <span class="stat-value" id="stat-streak">—</span>
        <span class="stat-label"><span class="sc">连续天数</span><span class="tc">連續天數</span></span>
      </div>
      <div class="stats-sep"></div>
      <div class="stat-pair">
        <span class="stat-value" id="stat-rate" style="color:var(--sage-dark);">—</span>
        <span class="stat-label"><span class="sc">正确率</span><span class="tc">正確率</span></span>
      </div>
      <div class="stats-sep"></div>
      <div class="stat-pair">
        <span class="stat-value" id="stat-mastered" style="color:var(--saffron);">—</span>
        <span class="stat-label"><span class="sc">已掌握</span><span class="tc">已掌握</span></span>
      </div>
    </div>

    <!-- 按课程分列 -->
    <div class="badge-section">
      <div class="section-header">
        <span class="section-title"><span class="sc">按法本分列</span><span class="tc">按法本分列</span></span>
      </div>
      <div id="by-course-list" style="margin-top:var(--sp-3);display:flex;flex-direction:column;gap:var(--sp-2);">
        <div style="text-align:center;padding:var(--sp-4);font:var(--text-caption);color:var(--ink-3);"><span class="sc">加载中…</span><span class="tc">加載中…</span></div>
      </div>
    </div>

    <!-- 勋章墙 · 接 /api/achievements -->
    <div class="badge-section" style="padding-top:0;">
      <div class="section-header">
        <span class="section-title"><span class="sc">成就勋章</span><span class="tc">成就勳章</span></span>
        <span id="badge-counter" class="section-hint" style="font:var(--text-caption);color:var(--ink-3);letter-spacing:1px;"></span>
      </div>
      <div id="badge-grid" class="badge-grid">
        <div style="grid-column:1/-1;text-align:center;padding:var(--sp-4);font:var(--text-caption);color:var(--ink-3);"><span class="sc">加载中…</span><span class="tc">加載中…</span></div>
      </div>
    </div>

  </div><!-- /scroll-area -->

</div><!-- /phone -->
</div><!-- /phone-wrap -->
<script src="../shared/nav.js"></script>
<script>
// achievement（学习统计）· 顶部 GET /api/my/progress · 底部 GET /api/achievements 徽章墙
var sc = window.JX.sc, escapeHtml = window.JX.util.escapeHtml;

function $(id) { return document.getElementById(id); }

function render(p) {
  p = p || {};
  $('stat-total').textContent = p.totalAnswers || 0;
  $('stat-streak').textContent = (p.streak && p.streak.current) || 0;
  $('stat-rate').textContent = Math.round((p.correctRate || 0) * 100) + '%';
  $('stat-mastered').textContent = (p.sm2 && p.sm2.mastered) || 0;

  // 顶部环下方副标题：活跃天数 / 今日答题
  var totalDays = p.totalDays || 0;
  var todayAns = p.todayAnswered || 0;
  $('stat-days-title').innerHTML = '<span class="sc">共 ' + totalDays + ' 天活跃</span><span class="tc">共 ' + totalDays + ' 天活躍</span>';
  $('stat-today').innerHTML = '<span class="sc">今日已答 ' + todayAns + ' 题</span><span class="tc">今日已答 ' + todayAns + ' 題</span>';

  // 环的进度：用今日答题数映射到 0-100%（简易视觉）
  var pct = Math.min(100, Math.round((todayAns / 20) * 100));
  var deg = Math.round(pct * 3.6);
  $('stat-ring').style.background =
    'conic-gradient(var(--gold) 0deg, var(--gold-dark) ' + deg + 'deg, var(--gold-light) ' + deg + 'deg)';

  // 按课程列
  var list = $('by-course-list');
  var byCourse = p.byCourse || [];
  if (!byCourse.length) {
    list.innerHTML =
      '<div style="padding:var(--sp-4);text-align:center;color:var(--ink-4);font:var(--text-caption);letter-spacing:1px;">'
      + sc('尚未有答题记录', '尚未有答題記錄')
      + '</div>';
    return;
  }
  list.innerHTML = byCourse.map(function (c) {
    var rate = Math.round((c.correctRate || 0) * 100);
    return ''
      + '<div style="display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);background:var(--glass-thick);border:1px solid var(--glass-border);border-radius:var(--r-lg);">'
      +   '<div style="flex:1;min-width:0;">'
      +     '<p style="font-family:var(--font-serif);font-weight:700;color:var(--ink);font-size:.9375rem;letter-spacing:2px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(c.title || '—') + '</p>'
      +     '<p style="font:var(--text-caption);color:var(--ink-3);letter-spacing:1px;">' + sc('答 ', '答 ') + (c.answered || 0) + sc(' 题 · 正确率 ', ' 題 · 正確率 ') + rate + '%</p>'
      +   '</div>'
      +   '<span style="flex-shrink:0;padding:4px 10px;border-radius:var(--r-pill);font:var(--text-caption);font-weight:700;letter-spacing:1px;'
      +     (rate >= 80 ? 'background:var(--sage-light);color:var(--sage-dark);' : rate >= 60 ? 'background:var(--gold-pale);color:var(--gold-dark);' : 'background:rgba(192,57,43,.10);color:var(--crimson);')
      +   '">' + rate + '%</span>'
      + '</div>';
  }).join('');
}

// bootGuard · 8s 没拿到 → by-course-list 容器换'网络慢 · 刷新'
window.JX.util.bootGuard(
  document.getElementById('by-course-list'),
  window.JX.api.get('/api/my/progress').then(render).catch(function (err) {
    console.warn('[achievement] /api/my/progress 拉取失败', err);
    render({});
  }),
  { timeoutMs: 8000 }
);

// ─── 勋章墙 · /api/achievements ────────────────────────────────
// 每枚徽章 { id, category, titleSc/Tc, descSc/Tc, unlocked, progress, current, target }
var BADGE_ICONS = {
  activity: '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>',
  streak:   '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5Z"/></svg>',
  accuracy: '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
  mastery:  '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 2 14.5 8.5 21 9l-5 4.87L17.18 21 12 17.27 6.82 21 8 13.87 3 9l6.5-.5L12 2Z"/></svg>',
  breadth:  '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg>',
};

function renderBadges(r) {
  var grid = $('badge-grid');
  var counter = $('badge-counter');
  if (!r || !r.badges || !r.badges.length) {
    grid.innerHTML =
      '<div style="grid-column:1/-1;padding:var(--sp-4);text-align:center;color:var(--ink-4);font:var(--text-caption);letter-spacing:1px;">'
      + sc('暂无勋章数据', '暫無勳章數據')
      + '</div>';
    counter.textContent = '';
    return;
  }
  counter.innerHTML =
    '<span class="sc">已获 ' + r.unlockedCount + ' / ' + r.totalBadges + '</span>'
    + '<span class="tc">已獲 ' + r.unlockedCount + ' / ' + r.totalBadges + '</span>';
  grid.innerHTML = r.badges.map(function (b) {
    var title = sc(b.titleSc || b.id, b.titleTc || b.titleSc || b.id);
    var desc  = sc(b.descSc  || '',   b.descTc  || b.descSc  || '');
    var pct   = Math.max(0, Math.min(100, Math.round((b.progress || 0) * 100)));
    var icon  = BADGE_ICONS[b.category] || BADGE_ICONS.activity;
    var progressHtml = b.unlocked
      ? ''
      : '<div class="badge-progress" aria-label="' + pct + '%"><span style="width:' + pct + '%"></span></div>'
        + '<p class="badge-cond">' + escapeHtml(String(b.current)) + ' / ' + escapeHtml(String(b.target)) + '</p>';
    return ''
      + '<div class="badge-item ' + (b.unlocked ? 'earned' : 'locked') + '" title="' + escapeHtml(desc) + '">'
      +   '<div class="badge-icon">' + icon + '</div>'
      +   '<span class="badge-name">' + escapeHtml(title) + '</span>'
      +   progressHtml
      + '</div>';
  }).join('');
}

window.JX.api.get('/api/achievements').then(function (r) {
  renderBadges(r && r.data);
}).catch(function (err) {
  console.warn('[achievement] /api/achievements 拉取失败', err);
  renderBadges(null);
});
</script>
</body>
</html>
