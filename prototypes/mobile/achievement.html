<style>
body { background:linear-gradient(160deg,#EDE0D4 0%,#D8C4AE 100%); min-height:100vh; }
.phone-wrap { display:flex; justify-content:center; padding:40px 20px; }
.top-nav { display:flex; align-items:center; gap:var(--sp-3); padding:0 var(--sp-5) var(--sp-4); }
.nav-back { width:34px; height:34px; border-radius:var(--r-sm); background:var(--glass-thick); border:1px solid var(--glass-border); display:flex; align-items:center; justify-content:center; }
.nav-title { font-family:var(--font-serif); font-weight:700; color:var(--ink); font-size:1.0625rem; letter-spacing:4px; flex:1; }

/* ── Level Ring ───────────────────────────── */
.level-section {
  display:flex; flex-direction:column; align-items:center;
  padding:var(--sp-5) var(--sp-5) var(--sp-4);
  gap:var(--sp-3);
}
.level-ring-wrap { position:relative; width:120px; height:120px; }
.level-ring-track {
  position:absolute; inset:0; border-radius:50%;
  background: conic-gradient(
    var(--gold) 0deg,
    var(--gold-dark) 252deg,
    var(--gold-light) 252deg
  );
  mask: radial-gradient(farthest-side, transparent 58%, black 59%);
  -webkit-mask: radial-gradient(farthest-side, transparent 58%, black 59%);
}
.level-ring-inner {
  position:absolute; inset:8px;
  border-radius:50%;
  background:linear-gradient(135deg,#FFFAF4,#F6DFCA);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  box-shadow:inset 0 2px 8px rgba(160,100,60,.08);
}
.level-num  { font-family:var(--font-serif); font-weight:700; font-size:2rem; color:var(--gold-dark); line-height:1; }
.level-word { font:var(--text-caption); color:var(--gold); letter-spacing:2px; margin-top:2px; }
.level-title { font-family:var(--font-serif); font-weight:700; font-size:1.125rem; color:var(--ink); letter-spacing:4px; }
.level-subtitle { font:var(--text-caption); color:var(--ink-3); letter-spacing:2px; }

/* ── Stats ────────────────────────────────── */
.stats-row {
  display:grid; grid-template-columns:1fr 1px 1fr 1px 1fr;
  margin:0 var(--sp-5); padding:var(--sp-4);
  background:var(--glass-thick); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-border); border-radius:var(--r-lg);
  box-shadow:var(--shadow-1);
}
.stats-sep { background:var(--border-light); justify-self:center; height:36px; width:1px; }

/* ── Badge Grid ───────────────────────────── */
.badge-section { padding:var(--sp-4) var(--sp-5) 100px; }
.badge-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:var(--sp-3); margin-top:var(--sp-3); }
.badge-item {
  display:flex; flex-direction:column; align-items:center; gap:var(--sp-2);
  padding:var(--sp-4) var(--sp-2);
  border-radius:var(--r-lg); border:1px solid var(--glass-border);
}
.badge-item.earned {
  background:linear-gradient(135deg,var(--gold-pale),var(--gold-light));
  border-color:var(--gold-light);
  box-shadow:0 4px 12px rgba(212,165,116,.2);
}
.badge-item.locked { background:rgba(255,255,255,.35); opacity:.55; }
.badge-icon { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.badge-item.earned .badge-icon { background:linear-gradient(135deg,var(--gold-light),var(--gold)); box-shadow:0 3px 10px rgba(180,130,80,.3); }
.badge-item.locked .badge-icon { background:rgba(43,34,24,.06); }
.badge-name { font:var(--text-caption); font-weight:600; letter-spacing:1px; text-align:center; }
.badge-item.earned .badge-name { color:var(--gold-dark); }
.badge-item.locked .badge-name { color:var(--ink-4); }
.badge-cond { font-size:.5625rem; color:var(--ink-4); letter-spacing:.5px; text-align:center; }
</style>
</head>
