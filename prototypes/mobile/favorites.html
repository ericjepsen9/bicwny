<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display: flex; justify-content: center; }

.fav-wrap { padding: var(--sp-4) var(--sp-5) var(--sp-8); display: flex; flex-direction: column; gap: var(--sp-3); }

.fav-summary {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--sp-2) 0;
  font: var(--text-caption); color: var(--ink-3); letter-spacing: 1.5px;
}

.fav-item {
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  border-radius: var(--r); padding: var(--sp-3) var(--sp-4);
  display: flex; flex-direction: column; gap: 6px;
  transition: border-color var(--dur) var(--ease);
}
.fav-item:hover { border-color: var(--saffron-light); }
.fav-top {
  display: flex; justify-content: space-between; align-items: center; gap: var(--sp-2);
}
.fav-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.fav-tag {
  padding: 1px 8px; border-radius: var(--r-pill);
  font-size: .6875rem; font-weight: 600; letter-spacing: 1.5px;
  background: var(--sage-light); color: var(--sage-dark);
}
.fav-tag.type  { background: var(--saffron-pale); color: var(--saffron-dark); }
.fav-text {
  font: var(--text-body); line-height: 1.7; letter-spacing: .5px;
  color: var(--ink); display: -webkit-box; -webkit-box-orient: vertical;
  -webkit-line-clamp: 2; overflow: hidden;
}
.fav-actions {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 4px;
}
.fav-time { font: var(--text-caption); color: var(--ink-4); letter-spacing: 1px; }
.fav-remove {
  padding: 4px 10px; border-radius: var(--r-pill);
  background: transparent; border: 1px solid var(--border-light);
  color: var(--ink-3); font-size: .75rem; letter-spacing: 1px;
  cursor: pointer; transition: all var(--dur) var(--ease);
}
.fav-remove:hover { border-color: var(--crimson); color: var(--crimson); }
.fav-remove[aria-busy="true"] { opacity: .5; pointer-events: none; }

/* 空态 */
.empty-block {
  padding: var(--sp-8) var(--sp-5);
  display: flex; flex-direction: column; align-items: center; gap: var(--sp-3);
  text-align: center;
}
.empty-icon {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--gold-pale); color: var(--gold-dark);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: var(--sp-3);
}
.empty-title { font-family: var(--font-serif); font-weight: 700; font-size: 1.125rem; letter-spacing: 4px; color: var(--ink); }
.empty-desc { font: var(--text-body); color: var(--ink-2); letter-spacing: 1px; line-height: 1.7; max-width: 280px; }

<script>
// 收藏列表 · GET /api/favorites
// 点击单条 → 进题目详情（复用 mistake-detail？当前直接跳到 quiz.html 作答一遍）
// 点 × 删除 → DELETE /api/favorites/:questionId → 本地移除
var sc = window.JX.sc;

var typeLabel = {
  single: [sc('单选', '單選'), '單選'],
  multi:  [sc('多选', '多選'), '多選'],
  fill:   [sc('填空', '填空'), '填空'],
  open:   [sc('开放', '開放'), '開放'],
  sort:   [sc('排序', '排序'), '排序'],
  match:  [sc('连线', '連線'), '連線'],
  image:  [sc('图片', '圖片'), '圖片'],
  listen: [sc('听颂', '聽頌'), '聽頌'],
  flip:   [sc('速记', '速記'), '速記'],
  flow:   [sc('流程', '流程'), '流程'],
  guided: [sc('引导', '引導'), '引導'],
  scenario: [sc('情境', '情境'), '情境'],
};

function relTime(iso) {
  if (!iso) return '';
  var ts = new Date(iso).getTime();
  var diff = Date.now() - ts;
  var days = Math.floor(diff / 86400000);
  if (days < 1) return sc('今日', '今日');
  if (days < 7) return sc(days + ' 天前', days + ' 天前');
  var weeks = Math.floor(days / 7);
  if (weeks < 4) return sc(weeks + ' 周前', weeks + ' 週前');
  var months = Math.floor(days / 30);
  if (months < 12) return sc(months + ' 个月前', months + ' 個月前');
  return sc(Math.floor(days / 365) + ' 年前', Math.floor(days / 365) + ' 年前');
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// D6: 法本筛选 · 保存全量列表用于切换 dropdown 时本地过滤
var allFavorites = [];
var currentCourseId = '';
var courseTitleById = {};

function populateCourseFilter() {
  var sel = document.getElementById('course-filter');
  if (!sel) return;
  var seen = {};
  var items = [];
  allFavorites.forEach(function (it) {
    var q = it.question || {};
    var cid = q.courseId;
    if (!cid || seen[cid]) return;
    seen[cid] = 1;
    items.push({ id: cid, title: q.courseTitle || courseTitleById[cid] || cid });
  });
  items.sort(function (a, b) { return (a.title > b.title) ? 1 : -1; });
  var keep = sel.value;
  sel.innerHTML = '<option value="">' + escapeHtml(sc('全部法本', '全部法本')) + '</option>' +
    items.map(function (c) {
      return '<option value="' + escapeHtml(c.id) + '">' + escapeHtml(c.title) + '</option>';
    }).join('');
  if (keep && seen[keep]) sel.value = keep;
}

function applyFilter() {
  if (!currentCourseId) return render(allFavorites);
  var filtered = allFavorites.filter(function (it) {
    return ((it.question && it.question.courseId) || '') === currentCourseId;
  });
  render(filtered);
}

function render(items) {
  var block = document.getElementById('items');
  var countLabel = document.getElementById('count-label');
  var listBlock = document.getElementById('list-block');
  var emptyBlock = document.getElementById('empty-block');

  if (!items || !items.length) {
    listBlock.style.display = 'none';
    emptyBlock.style.display = '';
    return;
  }

  listBlock.style.display = '';
  emptyBlock.style.display = 'none';

  countLabel.textContent = sc(
    '共 ' + items.length + ' 条收藏',
    '共 ' + items.length + ' 條收藏'
  );

  block.innerHTML = items.map(function (it) {
    var q = it.question || {};
    var qid = it.questionId || q.id;
    var type = q.type || 'single';
    var typeT = (typeLabel[type] || [type, type])[0];
    var sourceTag = q.source ? '<span class="fav-tag">' + escapeHtml(q.source) + '</span>' : '';
    var lessonId = q.lessonId || '';
    var courseId = q.courseId || '';
    // H1: 必须同时有 lessonId + courseId 才能正常推进进度；缺一则禁用按钮 + tooltip 解释
    var canRetry = !!(lessonId && courseId);
    var retryBtn = canRetry
      ? '<button type="button" class="fav-retry" data-lid="' + escapeHtml(lessonId)
          + '" data-cid="' + escapeHtml(courseId) + '" data-qid="' + escapeHtml(qid) + '" '
          + 'style="margin-left:auto;margin-right:8px;padding:5px 12px;border-radius:var(--r-pill);'
          + 'border:1px solid var(--saffron);background:var(--saffron);color:#FFF;'
          + 'font:var(--text-caption);font-weight:600;letter-spacing:1px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;">'
          + '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>'
          + sc('练一练', '練一練')
          + '</button>'
      : (lessonId || courseId
          ? '<button type="button" disabled '
              + 'title="' + escapeHtml(sc('题目缺少法本归属信息，无法记录进度', '題目缺少法本歸屬信息，無法記錄進度')) + '" '
              + 'style="margin-left:auto;margin-right:8px;padding:5px 12px;border-radius:var(--r-pill);'
              + 'border:1px solid var(--ink-5);background:rgba(43,34,24,.06);color:var(--ink-4);'
              + 'font:var(--text-caption);font-weight:600;letter-spacing:1px;cursor:not-allowed;display:inline-flex;align-items:center;gap:4px;">'
              + sc('练一练', '練一練')
              + '</button>'
          : '');
    return ''
      + '<div class="fav-item" data-qid="' + escapeHtml(qid) + '">'
      +   '<div class="fav-top">'
      +     '<div class="fav-tags">'
      +       '<span class="fav-tag type">' + typeT + '</span>'
      +       sourceTag
      +     '</div>'
      +   '</div>'
      +   '<p class="fav-text">' + escapeHtml(q.questionText || sc('（题目已下架）', '（題目已下架）')) + '</p>'
      +   '<div class="fav-actions">'
      +     '<span class="fav-time">' + sc('收藏于 ', '收藏於 ') + relTime(it.createdAt) + '</span>'
      +     '<button type="button" class="fav-explain" data-qid="' + escapeHtml(qid) + '" '
      +       'style="margin-left:auto;margin-right:8px;padding:5px 12px;border-radius:var(--r-pill);'
      +       'border:1px solid var(--gold-dark);background:var(--gold-pale);color:var(--gold-dark);'
      +       'font:var(--text-caption);font-weight:600;letter-spacing:1px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;">'
      +       sc('看题解', '看題解')
      +     '</button>'
      +     retryBtn
      +     '<button type="button" class="fav-remove" data-qid="' + escapeHtml(qid) + '">'
      +       '<span class="sc">取消收藏</span><span class="tc">取消收藏</span>'
      +     '</button>'
      +   '</div>'
      + '</div>';
  }).join('');

  // M7: 「看题解」按钮 → mistake-detail · from=favorites
  block.querySelectorAll('.fav-explain').forEach(function (btn) {
    btn.addEventListener('click', function (ev) {
      ev.stopPropagation();
      var qid = btn.getAttribute('data-qid');
      if (!qid) return;
      location.href = window.JX.nav.toMistakeDetail({
        questionId: qid,
        from: window.JX.nav.FROM.FAVORITES,
      });
    });
  });

  // 「练一练」按钮：跳 quiz · from=favorites · 完成后回 favorites
  block.querySelectorAll('.fav-retry').forEach(function (btn) {
    btn.addEventListener('click', function (ev) {
      ev.stopPropagation();
      var lid = btn.getAttribute('data-lid');
      var cid = btn.getAttribute('data-cid');
      if (!lid) {
        window.JX.toast && window.JX.toast.error(sc('题目数据异常', '題目數據異常'));
        return;
      }
      location.href = window.JX.nav.toQuiz({
        lessonId: lid,
        courseId: cid,
        from: window.JX.nav.FROM.FAVORITES,
      });
    });
  });

  // 绑定删除按钮
  block.querySelectorAll('.fav-remove').forEach(function (btn) {
    btn.addEventListener('click', function (ev) {
      ev.stopPropagation();
      var qid = btn.getAttribute('data-qid');
      if (!qid || !confirm(sc('取消收藏该题？', '取消收藏該題？'))) return;
      btn.setAttribute('aria-busy', 'true');
      window.JX.api.del('/api/favorites/' + encodeURIComponent(qid))
        .then(function () {
          if (window.JX && window.JX.haptics) window.JX.haptics.success();
          allFavorites = allFavorites.filter(function (x) {
            return (x.questionId || (x.question && x.question.id)) !== qid;
          });
          populateCourseFilter();
          var item = btn.closest('.fav-item');
          if (item) item.remove();
          // 更新计数 / 重新判空
          var rest = block.querySelectorAll('.fav-item').length;
          if (rest === 0) render([]);
          else {
            countLabel.textContent = sc(
              '共 ' + rest + ' 条收藏',
              '共 ' + rest + ' 條收藏'
            );
          }
        })
        .catch(function (err) {
          btn.removeAttribute('aria-busy');
          window.JX.toast.error(sc('取消失败：', '取消失敗：') + ((err && err.message) || err));
        });
    });
  });
}

// D6: dropdown 切换 → 本地过滤
//   切换后若过滤可见为 0 且后端还有数据 · 自动续拉直到看见或拉完
document.getElementById('course-filter').addEventListener('change', function () {
  currentCourseId = this.value || '';
  applyFilter();
  if (hasMore && currentCourseId) {
    var filteredCount = allFavorites.filter(function (it) {
      return ((it.question && it.question.courseId) || '') === currentCourseId;
    }).length;
    if (filteredCount === 0) loadPage();
  }
});

// 兜底：拉一份 courses 列表用于 ID→title 映射
window.JX.api.get('/api/courses').then(function (cs) {
  (Array.isArray(cs) ? cs : []).forEach(function (c) { courseTitleById[c.id] = c.title; });
  // 拿到 title 后刷新 dropdown 文本
  populateCourseFilter();
}).catch(function () { /* 静默 */ });

// cursor pagination · 30 条每页 · 触底自动加载下一页
var PAGE_SIZE = 30;
var nextCursor = null;
var hasMore = true;
var loading = false;

function loadPage() {
  if (loading || !hasMore) return Promise.resolve();
  loading = true;
  var url = '/api/favorites?limit=' + PAGE_SIZE;
  if (nextCursor) {
    url += '&cursorAt=' + encodeURIComponent(nextCursor.createdAt) +
           '&cursorId=' + encodeURIComponent(nextCursor.id);
  }
  return window.JX.api.get(url).then(function (data) {
    var batch = Array.isArray(data) ? data : [];
    allFavorites = allFavorites.concat(batch);
    if (batch.length < PAGE_SIZE) hasMore = false;
    else {
      var last = batch[batch.length - 1];
      nextCursor = { createdAt: last.createdAt, id: last.id };
    }
    populateCourseFilter();
    applyFilter();
    loading = false;
    // filter 边界 · 过滤后可见为 0 但还有更多数据 · 自动续拉
    //   上限 5 页（150 条）防死循环
    if (hasMore && currentCourseId && allFavorites.length < PAGE_SIZE * 5) {
      var filteredCount = allFavorites.filter(function (it) {
        return ((it.question && it.question.courseId) || '') === currentCourseId;
      }).length;
      if (filteredCount === 0) return loadPage();
    }
  }).catch(function (err) {
    loading = false;
    if (allFavorites.length === 0) {
      console.error('[favorites] 拉取失败', err);
      render([]);
    }
  });
}

function setupInfiniteScroll() {
  var sentinel = document.createElement('div');
  sentinel.id = 'fav-sentinel';
  sentinel.style.cssText = 'height:48px;display:flex;align-items:center;justify-content:center;font:var(--text-caption);color:var(--ink-4);';
  document.getElementById('list-block').appendChild(sentinel);
  if (typeof IntersectionObserver === 'undefined') return;
  var io = new IntersectionObserver(function (entries) {
    if (!entries[0].isIntersecting) return;
    if (!hasMore) {
      sentinel.textContent = sc('— 已显示全部 —', '— 已顯示全部 —');
      return;
    }
    sentinel.textContent = sc('加载中…', '載入中…');
    loadPage().then(function () {
      sentinel.textContent = hasMore ? '' : sc('— 已显示全部 —', '— 已顯示全部 —');
    });
  }, { rootMargin: '200px' });
  io.observe(sentinel);
}

window.JX.util.bootGuard(
  document.getElementById('count-label'),
  loadPage().then(function () { setupInfiniteScroll(); }),
  { timeoutMs: 8000 }
);
</script>
