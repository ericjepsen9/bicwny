<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display: flex; justify-content: center; }

.qc-header {
  padding: var(--sp-2) var(--sp-5) var(--sp-4);
}
.qc-title {
  font-family: var(--font-serif); font-weight: 700; font-size: 1.5rem;
  color: var(--ink); letter-spacing: 4px;
}
.qc-subtitle {
  font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px;
  margin-top: 4px;
}

/* ── 复习行（SM-2 / 错题 / 收藏） ─── */
.qc-review-row {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-3);
  padding: 0 var(--sp-5) var(--sp-5);
}
.qc-review-card {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: var(--sp-4) var(--sp-2);
  background: var(--glass-thick); backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border); border-radius: var(--r-lg);
  text-decoration: none; color: var(--ink);
  transition: transform var(--dur) var(--ease);
}
.qc-review-card:active { transform: scale(.97); }
.qc-review-icon {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
}
.qc-review-icon.sm2     { background: rgba(236,180,86,.18); color: var(--gold-dark); }
.qc-review-icon.mistakes{ background: var(--crimson-light); color: var(--crimson); }
.qc-review-icon.favs    { background: var(--saffron-pale); color: var(--saffron-dark); }
.qc-review-num {
  font-family: var(--font-serif); font-weight: 700; font-size: 1.25rem; color: var(--ink);
}
.qc-review-num.zero { color: var(--ink-4); font-weight: 500; }
.qc-review-lbl {
  font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px;
}

/* ── 法本练习区 ─── */
.qc-section-head {
  padding: 0 var(--sp-5) var(--sp-3);
  font: var(--text-caption); color: var(--ink-3); letter-spacing: 2px;
  display: flex; align-items: center; gap: 6px;
}
.qc-section-head::before {
  content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--saffron);
}

.qc-course-list { padding: 0 var(--sp-5) var(--sp-8); display: flex; flex-direction: column; gap: var(--sp-3); }

.qc-course-card {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-3); background: var(--glass-thick); backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border); border-radius: var(--r-lg);
  text-decoration: none; color: var(--ink);
}
.qc-course-card:active { transform: scale(.99); }
.qc-cover {
  width: 56px; height: 56px; flex-shrink: 0;
  border-radius: var(--r-md);
  background: linear-gradient(135deg, var(--saffron-pale), var(--gold-pale));
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.qc-cover img { width: 100%; height: 100%; object-fit: cover; }
.qc-cover-emoji { font-size: 1.6rem; }
.qc-info { flex: 1; min-width: 0; }
.qc-name {
  font-family: var(--font-serif); font-weight: 600; font-size: .9375rem;
  color: var(--ink); letter-spacing: 1.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.qc-meta { font: var(--text-caption); color: var(--ink-3); letter-spacing: .5px; margin-top: 2px; }
.qc-bar {
  height: 4px; background: var(--ink-5); border-radius: 2px; overflow: hidden;
  margin-top: 6px;
}
.qc-bar-fill { height: 100%; background: linear-gradient(90deg, var(--saffron), var(--saffron-dark)); }
.qc-arrow { color: var(--ink-4); flex-shrink: 0; }

.qc-empty {
  text-align: center; padding: var(--sp-8) var(--sp-5);
  color: var(--ink-3); font: var(--text-body); letter-spacing: 1px;
}
.qc-empty .cta {
  display: inline-block; margin-top: var(--sp-3); padding: 10px 20px;
  background: var(--saffron); color: #FFF; border-radius: var(--r-pill);
  text-decoration: none; font-weight: 600; letter-spacing: 1.5px;
}
</style>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone">

  <div class="status-bar" data-auto></div>

  <!-- Header (no back button - this is a top-level tab) -->
  <div class="qc-header">
    <p class="qc-title"><span class="sc">答题</span><span class="tc">答題</span></p>
    <p class="qc-subtitle"><span class="sc">检验所学 · 巩固记忆</span><span class="tc">檢驗所學 · 鞏固記憶</span></p>
  </div>

  <!-- 复习快捷行：SM-2 + 错题 + 收藏 -->
  <div class="qc-review-row">
    <a class="qc-review-card" href="sm2-review.html">
      <div class="qc-review-icon sm2">🔁</div>
      <div class="qc-review-num" id="qc-sm2-num">—</div>
      <div class="qc-review-lbl"><span class="sc">SM-2 复习</span><span class="tc">SM-2 複習</span></div>
    </a>
    <a class="qc-review-card" href="mistakes.html">
      <div class="qc-review-icon mistakes">❌</div>
      <div class="qc-review-num" id="qc-mistake-num">—</div>
      <div class="qc-review-lbl"><span class="sc">错题本</span><span class="tc">錯題本</span></div>
    </a>
    <a class="qc-review-card" href="favorites.html">
      <div class="qc-review-icon favs">⭐</div>
      <div class="qc-review-num" id="qc-fav-num">—</div>
      <div class="qc-review-lbl"><span class="sc">收藏</span><span class="tc">收藏</span></div>
    </a>
  </div>

  <!-- 按法本练习 -->
  <div class="qc-section-head"><span class="sc">按法本练习</span><span class="tc">按法本練習</span></div>
  <div class="qc-course-list" id="qc-courses">
    <div class="qc-empty"><span class="sc">加载中…</span><span class="tc">加載中…</span></div>
  </div>

</div>
</div>

<script src="../shared/nav.js"></script>
<script>
// quiz-center · 独立答题入口
//   顶部：SM-2 / 错题 / 收藏 三个数字快捷
//   下方：我的法本列表（点 → scripture-detail，从章节 ⋮ 进 quiz）
var sc = window.JX.sc, escapeHtml = window.JX.util.escapeHtml;

function setBadge(id, n) {
  var el = document.getElementById(id);
  el.textContent = String(n);
  if (n === 0) el.classList.add('zero'); else el.classList.remove('zero');
}

function renderCourses(enrollments) {
  var box = document.getElementById('qc-courses');
  var items = (enrollments || []).filter(function (e) { return e && e.course; });
  if (!items.length) {
    box.innerHTML =
      '<div class="qc-empty">' +
        '<p>' + escapeHtml(sc('您还没加入任何法本', '您還沒加入任何法本')) + '</p>' +
        '<a class="cta" href="courses.html">' +
          escapeHtml(sc('去选修法本', '去選修法本')) + '</a>' +
      '</div>';
    return;
  }

  box.innerHTML = items.map(function (e) {
    var c = e.course;
    var title = sc(c.title, c.titleTraditional || c.title);
    var emoji = c.coverEmoji || '🪷';
    var coverHtml = c.coverImageUrl
      ? '<img src="' + escapeHtml(c.coverImageUrl) + '" alt="">'
      : '<span class="qc-cover-emoji">' + escapeHtml(emoji) + '</span>';
    var done = (e.lessonsCompleted || []).length;
    // M3: 后端已返回 course.totalLessons · 显示「已答 N / M 课」
    var total = c.totalLessons || 0;
    var sub = e.completedAt
      ? sc('✓ 已学完', '✓ 已學完')
      : (total > 0
          ? sc('已答 ', '已答 ') + done + ' / ' + total + sc(' 课', ' 課')
          : sc('已答 ', '已答 ') + done + sc(' 课', ' 課'));
    var classMark = (e.source === 'class') ? '📍 ' : '';
    return '<a class="qc-course-card" href="' + window.JX.nav.toScriptureDetail({ slug: c.slug, mode: 'quiz', from: window.JX.nav.FROM.CENTER }) + '">'
      +    '<div class="qc-cover">' + coverHtml + '</div>'
      +    '<div class="qc-info">'
      +      '<div class="qc-name">' + classMark + escapeHtml(title) + '</div>'
      +      '<div class="qc-meta">' + escapeHtml(sub) + '</div>'
      +    '</div>'
      +    '<svg class="qc-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>'
      +  '</a>';
  }).join('');
}

function boot() {
  // 5s failsafe · 防 API 慢 / 异常时'加载中'卡死
  var loadingTimer = setTimeout(function () {
    var box = document.getElementById('qc-courses');
    if (box && box.innerHTML.indexOf('加载中') >= 0) {
      box.innerHTML = '<div class="qc-empty">' +
        '<span class="sc">网络慢，加载中… <a href="javascript:location.reload()" style="color:var(--saffron-dark);text-decoration:underline;">刷新</a></span>' +
        '<span class="tc">網絡慢，載入中… <a href="javascript:location.reload()" style="color:var(--saffron-dark);text-decoration:underline;">刷新</a></span>' +
        '</div>';
    }
  }, 5000);

  // Phase 1（首屏）· sm2.stats 5KB + my/enrollments 几 KB · 并行 · 先渲染主体
  //   首屏不等 mistakes (可达数百条) / favorites · badge 用 '—' 占位
  setBadge('qc-sm2-num', 0);
  document.getElementById('qc-mistake-num').textContent = '—';
  document.getElementById('qc-fav-num').textContent = '—';
  Promise.all([
    window.JX.api.get('/api/sm2/stats').catch(function () { return { due: 0 }; }),
    window.JX.api.get('/api/my/enrollments').catch(function () { return []; }),
  ]).then(function (rs) {
    clearTimeout(loadingTimer);
    var sm2Stats = rs[0];
    var enrollments = rs[1];
    setBadge('qc-sm2-num', (sm2Stats && typeof sm2Stats.due === 'number') ? sm2Stats.due : 0);
    renderCourses(enrollments);
  });

  // Phase 2（次屏）· 只取 count · payload 几十字节 · 不下载完整列表
  //   不阻塞 paint · 失败 → badge 显 0 · 用户进 mistakes/favorites 页时拉完整列表
  window.JX.api.get('/api/mistakes/count').then(function (r) {
    setBadge('qc-mistake-num', (r && r.count) || 0);
  }).catch(function () { setBadge('qc-mistake-num', 0); });
  window.JX.api.get('/api/favorites/count').then(function (r) {
    setBadge('qc-fav-num', (r && r.count) || 0);
  }).catch(function () { setBadge('qc-fav-num', 0); });
}
document.addEventListener('jx:user-ready', boot);
document.addEventListener('langchange', boot);
if (window.JX && window.JX.user) boot();
</script>
