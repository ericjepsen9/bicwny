<!DOCTYPE html>
<html lang="zh-CN" data-lang="sc">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>觉学 · 修改密码</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<script src="../shared/lang.js"></script>
<script src="../shared/return-url.js"></script>
<script src="../shared/font-size.js"></script>
<script src="../shared/status-bar.js"></script>
<script src="../shared/config.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/require-auth.js"></script>
<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display: flex; justify-content: center; }
.form-wrap { padding: var(--sp-4) var(--sp-5); display: flex; flex-direction: column; gap: var(--sp-4); }
.form-hint { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1.5px; line-height: 1.7; padding: 10px 12px; background: rgba(43,34,24,.04); border-radius: var(--r); }
.form-msg { font: var(--text-caption); letter-spacing: 1px; padding: 10px 12px; border-radius: var(--r); min-height: 1em; }
.form-msg.error { color: var(--crimson); background: rgba(192,57,43,.08); }
.form-msg.ok    { color: var(--sage-dark); background: rgba(125,154,108,.12); }
.form-msg:empty { display: none; }
.btn[aria-busy="true"] { opacity: .6; pointer-events: none; }
</style>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone">

  <div class="status-bar" data-auto></div>

  <div class="top-nav">
    <a class="nav-back" href="profile.html"><svg width="18" height="18" fill="none" stroke="#55463A" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="nav-title"><span class="sc">修改密码</span><span class="tc">修改密碼</span></span>
    <div style="width:34px;"></div>
  </div>

  <form id="form-change" class="form-wrap" novalidate>

    <p class="form-hint">
      <span class="sc">修改成功后，所有设备会被退出登录，请重新登录。</span>
      <span class="tc">修改成功後，所有設備會被退出登入，請重新登錄。</span>
    </p>

    <div class="input-group">
      <label class="input-label" for="fld-current"><span class="sc">当前密码</span><span class="tc">當前密碼</span></label>
      <input class="input-field" id="fld-current" name="currentPassword" type="password" autocomplete="current-password" required
        data-ph-sc="输入当前密码" data-ph-tc="輸入當前密碼" placeholder="输入当前密码">
    </div>

    <div class="input-group">
      <label class="input-label" for="fld-new"><span class="sc">新密码</span><span class="tc">新密碼</span></label>
      <input class="input-field" id="fld-new" name="newPassword" type="password" autocomplete="new-password" required minlength="6"
        data-ph-sc="至少 6 位" data-ph-tc="至少 6 位" placeholder="至少 6 位">
    </div>

    <div class="input-group">
      <label class="input-label" for="fld-confirm"><span class="sc">确认新密码</span><span class="tc">確認新密碼</span></label>
      <input class="input-field" id="fld-confirm" name="confirm" type="password" autocomplete="new-password" required
        data-ph-sc="再次输入新密码" data-ph-tc="再次輸入新密碼" placeholder="再次输入新密码">
    </div>

    <div class="form-msg" id="change-msg" role="status"></div>

    <button type="submit" class="btn btn-primary btn-lg btn-full btn-pill">
      <span class="sc">确认修改</span><span class="tc">確認修改</span>
    </button>
  </form>

</div>
</div>
<script src="../shared/nav.js"></script>
<script>
// change-password · POST /api/auth/change-password
// 成功后后端已吊销所有 session；前端立即清 token 跳登录页
var sc = window.JX.sc;

function setMsg(kind, text) {
  var el = document.getElementById('change-msg');
  el.className = 'form-msg ' + kind;
  el.textContent = text || '';
}

document.getElementById('form-change').addEventListener('submit', function (ev) {
  ev.preventDefault();
  var cur = document.getElementById('fld-current').value;
  var neu = document.getElementById('fld-new').value;
  var cfm = document.getElementById('fld-confirm').value;

  if (!cur || !neu || !cfm)          return setMsg('error', sc('请填写全部字段', '請填寫全部字段'));
  if (neu.length < 6)                return setMsg('error', sc('新密码至少 6 位', '新密碼至少 6 位'));
  if (neu !== cfm)                    return setMsg('error', sc('两次输入的新密码不一致', '兩次輸入的新密碼不一致'));
  if (neu === cur)                    return setMsg('error', sc('新密码不能与当前密码相同', '新密碼不能與當前密碼相同'));

  var btn = ev.target.querySelector('button[type="submit"]');
  var origLabel = btn.innerHTML;
  btn.setAttribute('aria-busy', 'true');
  btn.innerHTML = '<span class="sc">修改中…</span><span class="tc">修改中…</span>';
  setMsg('', '');

  window.JX.api.post('/api/auth/change-password', { currentPassword: cur, newPassword: neu })
    .then(function () {
      setMsg('ok', sc('已修改，正在重新登录…', '已修改，正在重新登錄…'));
      // 后端已吊销所有 session；本地 token 也清掉
      window.JX.api.clearTokens();
      setTimeout(function () { location.replace('auth.html'); }, 600);
    })
    .catch(function (err) {
      if (err && err.status === 401) setMsg('error', sc('当前密码不正确', '當前密碼不正確'));
      else setMsg('error', sc('修改失败：', '修改失敗：') + (err.message || err));
      btn.innerHTML = origLabel;
    })
    .finally(function () { btn.removeAttribute('aria-busy'); });
});
</script>
</body>
</html>
