body { background:linear-gradient(160deg,#EDE0D4 0%,#D8C4AE 100%); min-height:100vh; }
.phone-wrap { display:flex; justify-content:center; padding:40px 20px; }

/* ── Profile Header ───────────────────────── */
.profile-header {
  padding:var(--sp-5) var(--sp-5) var(--sp-4);
  display:flex; align-items:center; gap:var(--sp-4);
}
.avatar-lg {
  width:64px; height:64px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--saffron-light),var(--gold-light));
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-serif); font-weight:700; font-size:1.375rem;
  color:var(--saffron-dark);
  border:3px solid rgba(255,255,255,.85);
  box-shadow:var(--shadow-2);
}
.profile-info { flex:1; }
.profile-name  { font-family:var(--font-serif); font-weight:700; font-size:1.125rem; color:var(--ink); letter-spacing:3px; }
.profile-level { font:var(--text-meta); color:var(--gold-dark); letter-spacing:2px; margin-top:3px; }
.profile-edit  {
  padding:6px 14px; border-radius:var(--r-pill);
  font:var(--text-caption); font-weight:600; letter-spacing:1.5px;
  background:var(--saffron-pale); border:1.5px solid var(--saffron-light); color:var(--saffron-dark);
}

/* ── Summary Stats ────────────────────────── */
.summary-bar {
  margin:0 var(--sp-5);
  display:grid; grid-template-columns:1fr 1px 1fr 1px 1fr;
  padding:var(--sp-4);
  background:var(--glass-thick); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-border); border-radius:var(--r-lg);
  box-shadow:var(--shadow-1);
}
.sum-sep { width:1px; height:32px; background:var(--border-light); justify-self:center; }

/* ── Sections ─────────────────────────────── */
.sections { display:flex; flex-direction:column; gap:var(--sp-4); padding:var(--sp-4) var(--sp-5) 100px; }

/* ── Plan Card (moved from home) ─────────── */
.plan-card { padding:var(--sp-4) var(--sp-5); }
.plan-stats { display:grid; grid-template-columns:1fr 1px 1fr 1px 1fr; align-items:center; margin-top:var(--sp-4); }
.plan-sep { width:1px; height:32px; background:var(--border-light); justify-self:center; }

/* ── Streak Row ───────────────────────────── */
.streak-card { padding:var(--sp-4) var(--sp-5); }
.streak-dots { display:flex; gap:var(--sp-2); margin-top:var(--sp-3); }
.streak-day  { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; }
.streak-dot  { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.streak-dot.done    { background:var(--saffron); }
.streak-dot.today   { background:var(--saffron-dark); box-shadow:0 0 0 3px var(--saffron-light); }
.streak-dot.pending { background:rgba(43,34,24,.10); }
.streak-lbl { font-size:.625rem; color:var(--ink-4); letter-spacing:.5px; }
.streak-lbl.cur { color:var(--saffron); font-weight:700; }

/* ── Menu List ────────────────────────────── */
.menu-card { padding:var(--sp-2) 0; overflow:hidden; }
.menu-item {
  display:flex; align-items:center; gap:var(--sp-3);
  padding:var(--sp-4) var(--sp-5);
  transition:background var(--dur) var(--ease);
}
.menu-item:active { background:rgba(224,120,86,.06); }
.menu-item + .menu-item { border-top:1px solid var(--border-light); }
.menu-icon  { width:34px; height:34px; border-radius:var(--r-sm); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.menu-label { flex:1; font:var(--text-body); color:var(--ink); letter-spacing:1px; }
.menu-arrow { color:var(--ink-4); }
.menu-item.danger .menu-label { color:var(--crimson); }
.menu-item.danger .menu-icon  { background:var(--crimson-light); }

<script>
// ── profile 数据 ──────────────────────────────────
//   /api/my/progress → totalDays/byCourse/streak/sm2/todayAnswered/weekDays
// ──────────────────────────────────────────────────
var lang = window.JX.lang, sc = window.JX.sc;

// 级别估算（内部）：每 50 次正确答题 = 1 级，最高 12
// titleBand 根据总答题量给语义性称号；launch 期先轻量
function deriveLevel(progress) {
  var correct = Math.round((progress.correctRate || 0) * (progress.totalAnswers || 0));
  var lv = Math.min(12, 1 + Math.floor(correct / 50));
  var bandsSc = ['初学', '入门', '精进', '持戒', '正念', '正定', '慧观', '般若行者', '菩萨道'];
  var bandsTc = ['初學', '入門', '精進', '持戒', '正念', '正定', '慧觀', '般若行者', '菩薩道'];
  var idx = Math.min(bandsSc.length - 1, Math.floor((lv - 1) / 2));
  return { lv: lv, title: sc(bandsSc[idx], bandsTc[idx]) };
}

function renderStreakDots(weekDays) {
  var set = {};
  (weekDays || []).forEach(function (d) { set[d] = true; });

  var now = new Date();
  // 计算本周周一 UTC
  var dow = (now.getUTCDay() + 6) % 7; // 0=周一
  var monday = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
  monday.setUTCDate(monday.getUTCDate() - dow);
  var today = now.toISOString().slice(0, 10);
  var labels = ['一', '二', '三', '四', '五', '六', '日'];

  var wrap = document.getElementById('streak-dots');
  wrap.innerHTML = '';
  for (var i = 0; i < 7; i++) {
    var d = new Date(monday);
    d.setUTCDate(monday.getUTCDate() + i);
    var key = d.toISOString().slice(0, 10);
    var done = !!set[key];
    var isToday = key === today;
    var state = isToday ? (done ? 'today' : 'today') : (done ? 'done' : 'pending');

    var inner = '';
    if (state === 'done') {
      inner = '<svg width="12" height="12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
    } else if (state === 'today') {
      inner = '<svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3" fill="white"/></svg>';
    }
    var html = '<div class="streak-day">' +
      '<div class="streak-dot ' + state + '">' + inner + '</div>' +
      '<span class="streak-lbl' + (isToday ? ' cur' : '') + '">' + (isToday ? sc('今', '今') : labels[i]) + '</span>' +
      '</div>';
    wrap.insertAdjacentHTML('beforeend', html);
  }
}

function renderProgress(p) {
  // Summary bar
  document.getElementById('stat-days').textContent = p.totalDays || 0;
  document.getElementById('stat-courses').textContent = (p.byCourse || []).length;
  document.getElementById('stat-correct-rate').textContent = Math.round((p.correctRate || 0) * 100) + '%';

  // Level
  var lv = deriveLevel(p);
  document.getElementById('profile-level').textContent = '⬡ ' + lv.title + ' · Lv.' + lv.lv;

  // Today plan
  var sm2 = p.sm2 || {};
  document.getElementById('plan-new').textContent = sm2['new'] || 0;
  document.getElementById('plan-due').textContent = sm2.due || 0;
  document.getElementById('plan-done').textContent = p.todayAnswered || 0;

  // Streak pill + caption
  var cur = (p.streak && p.streak.current) || 0;
  document.getElementById('streak-pill').innerHTML = '🔥 ' +
    '<span class="sc">连续 ' + cur + ' 天</span><span class="tc">連續 ' + cur + ' 天</span>';
  document.getElementById('streak-caption').innerHTML =
    '<span class="sc">已连续 ' + cur + ' 天</span><span class="tc">已連續 ' + cur + ' 天</span>';

  // Week dots
  renderStreakDots(p.weekDays || []);
}

function renderBackofficeLink(user) {
  if (!user) return;
  var a = document.getElementById('menu-backoffice');
  var lbl = document.getElementById('menu-backoffice-label');
  if (user.role === 'admin') {
    a.href = '../desktop/admin.html';
    lbl.innerHTML = '<span class="sc">进入管理员后台</span><span class="tc">進入管理員後台</span>';
    a.style.display = '';
  } else if (user.role === 'coach') {
    a.href = '../desktop/coach.html';
    lbl.innerHTML = '<span class="sc">进入辅导员后台</span><span class="tc">進入輔導員後台</span>';
    a.style.display = '';
  } else {
    a.style.display = 'none';
  }
}

function boot() {
  renderBackofficeLink(window.JX && window.JX.user);
  window.JX.api.get('/api/my/progress').then(renderProgress).catch(function (err) {
    console.warn('[profile] /api/my/progress 失败：', err);
    // 降级：至少渲染空骨架
    renderProgress({ totalAnswers: 0, correctRate: 0, byCourse: [], streak: { current: 0 }, sm2: {}, totalDays: 0, todayAnswered: 0, weekDays: [] });
  });
}

// 退出登录 · 调后端吊销 refresh
document.getElementById('profile-logout').addEventListener('click', function () {
  if (!confirm(sc('确定退出登录？', '確定退出登入？'))) return;
  window.JX.api.logout().finally(function () { location.replace('auth.html'); });
});
