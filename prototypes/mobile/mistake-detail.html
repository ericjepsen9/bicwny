<script>
// mistake-detail · GET /api/mistakes/:questionId（owner 可见完整答案）
//
// 注：本 <script> 区在提交 40b78a6 (refactor 信息架构调整) 中被误删了开
//     标签 + ~90 行函数定义（formatUserAnswer / formatCorrectAnswer /
//     typeBadge / render 主体），导致整页 JS 不执行 · 本次修复并恢复。
var sc = window.JX.sc, escapeHtml = window.JX.util.escapeHtml, relTime = window.JX.util.relativeTime;
var LETTERS = ['A', 'B', 'C', 'D', 'E', 'F'];

// 把用户的 answer 按 type 渲染为可读文本
function formatUserAnswer(q, a) {
  if (!a) return sc('（未记录）', '（未記錄）');
  var opts = (q.payload && q.payload.options) || [];
  switch (q.type) {
    case 'single':
    case 'image':
    case 'listen': {
      var i = a.selectedIndex;
      if (typeof i !== 'number' || !opts[i]) return sc('（未作答）', '（未作答）');
      return LETTERS[i] + '. ' + opts[i].text;
    }
    case 'multi':
    case 'scenario': {
      var arr = (a.selectedIndexes || []).filter(function (x) { return typeof x === 'number' && opts[x]; });
      if (!arr.length) return sc('（未作答）', '（未作答）');
      return arr.map(function (x) { return LETTERS[x] + '. ' + opts[x].text; }).join('\n');
    }
    case 'fill': {
      if (typeof a.value === 'string') return a.value;
      if (typeof a.selectedOption === 'number') {
        var fillOpts = (q.payload && q.payload.options) || [];
        return fillOpts[a.selectedOption] || sc('（选项越界）', '（選項越界）');
      }
      return sc('（未作答）', '（未作答）');
    }
    case 'open': return a.text || sc('（未作答）', '（未作答）');
    case 'sort': {
      var items = (q.payload && q.payload.items) || [];
      var order = a.order || [];
      return order.map(function (i) { return (items[i] && items[i].text) || '?'; }).join(' → ');
    }
    case 'match': {
      var pairs = a.pairs || {};
      return Object.keys(pairs).map(function (lid) { return lid + ' → ' + pairs[lid]; }).join('\n');
    }
    default:
      return JSON.stringify(a);
  }
}

function formatCorrectAnswer(q) {
  // 优先用 Question.correctText（管理员在造题时写的可读版本）
  if (q.correctText) return q.correctText;
  var opts = (q.payload && q.payload.options) || [];
  switch (q.type) {
    case 'single':
    case 'image':
    case 'listen': {
      var idx = opts.findIndex(function (o) { return o && o.correct; });
      return idx >= 0 ? LETTERS[idx] + '. ' + opts[idx].text : '—';
    }
    case 'multi':
    case 'scenario':
      return opts.filter(function (o) { return o && o.correct; })
        .map(function (o) { return LETTERS[opts.indexOf(o)] + '. ' + o.text; })
        .join('\n') || '—';
    case 'fill': return (q.payload && q.payload.correctWord) || '—';
    case 'open': return (q.payload && q.payload.referenceAnswer) || '—';
    case 'sort': {
      var items = (q.payload && q.payload.items) || [];
      return items.slice().sort(function (a, b) { return a.order - b.order; })
        .map(function (it) { return it.text; }).join(' → ') || '—';
    }
    case 'match': {
      var right = (q.payload && q.payload.right) || [];
      return right.map(function (r) { return r.match + ' → ' + r.id; }).join('\n') || '—';
    }
    default: return '—';
  }
}

function typeBadge(t) {
  var m = {
    single: ['单选', '單選'], multi: ['多选', '多選'], fill: ['填空', '填空'],
    open: ['问答', '問答'], sort: ['排序', '排序'], match: ['匹配', '匹配'],
    image: ['图识', '圖識'], listen: ['听颂', '聽誦'], scenario: ['情境', '情境'],
    flow: ['流程', '流程'], guided: ['引导', '引導'], flip: ['速记', '速記'],
  };
  return (m[t] || [t, t])[(window.JX && window.JX.lang && window.JX.lang() === 'tc') ? 1 : 0];
}

function render(d) {
  var q = d.question;
  var last = d.lastAnswer;
  var userAnswerText = formatUserAnswer(q, last && last.answer);
  var correctText = formatCorrectAnswer(q);

  var body = document.getElementById('detail-body');
  body.innerHTML =
    '<div class="breadcrumb">' + escapeHtml(q.source || '—') + '</div>' +
    '<div class="question-block glass-card-thick">' +
      '<div class="meta-pill-row">' +
        '<span class="meta-pill crimson">✗ ' + escapeHtml(sc('答错 ', '答錯 ')) + d.wrongCount + sc(' 次', ' 次') + '</span>' +
        '<span class="meta-pill">' + escapeHtml(typeBadge(q.type)) + '</span>' +
        '<span class="meta-pill">' + escapeHtml(sc('最近错答 · ', '最近錯答 · ') + relTime(d.lastWrongAt)) + '</span>' +
      '</div>' +
      '<p class="q-stem">' + escapeHtml(q.questionText) + '</p>' +
      '<p class="answer-label wrong-lbl">' + escapeHtml(sc('我的答案', '我的答案')) + '</p>' +
      '<div class="answer-text wrong">' + escapeHtml(userAnswerText) + '</div>' +
      '<p class="answer-label correct-lbl">' + escapeHtml(sc('正确答案', '正確答案')) + '</p>' +
      '<div class="answer-text correct">' + escapeHtml(correctText) + '</div>' +
    '</div>' +
    (q.wrongText
      ? '<div class="explanation" style="margin:0;">' +
          '<div class="explanation-icon"><svg width="16" height="16" fill="none" stroke="#B88956" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>' +
          '<div class="explanation-body">' +
            '<p class="explanation-title">' + escapeHtml(sc('释义', '釋義')) + '</p>' +
            '<p class="explanation-text">' + escapeHtml(q.wrongText) + '</p>' +
          '</div>' +
        '</div>'
      : '') +
    '<a href="' + window.JX.nav.toQuiz({
        lessonId: q.lessonId,
        courseId: q.courseId,
        // M7: 从 favorites 进来时保持 from=favorites · 答完跳回 favorites 而非 mistake-detail
        from: (window.JX.util.queryParam('from') === window.JX.nav.FROM.FAVORITES)
              ? window.JX.nav.FROM.FAVORITES
              : window.JX.nav.FROM.MISTAKE,
        questionId: q.id || q.questionId || '',
      }) + '" class="btn btn-primary btn-lg btn-full btn-pill">' +
      '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>' +
      '<span class="sc">再练一次</span><span class="tc">再練一次</span>' +
    '</a>';
}

function showError(msg) {
  document.getElementById('detail-body').innerHTML =
    '<div class="question-block glass-card-thick" style="text-align:center;">' +
    '<p style="color:var(--crimson);font:var(--text-body);">' + escapeHtml(msg) + '</p>' +
    '<a href="mistakes.html" class="btn btn-ghost btn-pill" style="margin-top:var(--sp-4);">' +
      sc('返回错题本', '返回錯題本') + '</a></div>';
}

var currentQid = null;
// M7: 本页可从 favorites 进 · 标题 / 返回按钮 / 移除按钮按 ?from= 调整
(function () {
  var navFrom = window.JX.util.queryParam('from') || '';
  var FROM = window.JX.nav.FROM;
  if (navFrom === FROM.FAVORITES) {
    var titleEl = document.getElementById('md-title');
    if (titleEl) titleEl.innerHTML = '<span class="sc">题目详解</span><span class="tc">題目詳解</span>';
    var backEl = document.getElementById('md-back');
    if (backEl) backEl.href = 'favorites.html';
    // 「移除错题本」按钮在 favorites 入口下无意义 → 隐藏
    var removeBtn = document.getElementById('btn-remove');
    if (removeBtn) removeBtn.style.display = 'none';
  }
})();

function boot() {
  var qid = window.JX.util.queryParam('questionId');
  if (!qid) return showError(sc('缺少 questionId 参数', '缺少 questionId 參數'));
  currentQid = qid;
  // M7: from=favorites 时走 owner-detail 端点（不要求错题本记录）
  var navFrom = window.JX.util.queryParam('from') || '';
  var endpoint = navFrom === window.JX.nav.FROM.FAVORITES
    ? '/api/my/questions/' + encodeURIComponent(qid)
    : '/api/mistakes/' + encodeURIComponent(qid);
  // bootGuard · 8s 没拿到 → 容器换'网络慢 · 刷新'
  window.JX.util.bootGuard(
    document.getElementById('detail-body'),
    window.JX.api.get(endpoint)
      .then(render)
      .catch(function (err) {
        showError(sc('加载失败：', '加載失敗：') + (err.message || err));
      }),
    { timeoutMs: 8000 }
  );
}

// 右上垃圾桶：从错题本移除
document.getElementById('btn-remove').addEventListener('click', function () {
  if (!currentQid) return;
  if (!confirm(sc('确定从错题本移除？', '確定從錯題本移除？'))) return;
  window.JX.api.del('/api/mistakes/' + encodeURIComponent(currentQid))
    .then(function () {
      if (window.JX && window.JX.haptics) window.JX.haptics.success();
      location.href = 'mistakes.html';
    })
    .catch(function (err) {
      if (window.JX && window.JX.haptics) window.JX.haptics.error();
      window.JX.toast.error(sc('移除失败：', '移除失敗：') + (err.message || err));
    });
});

// ── 举报此题（D 阶段 · 与 quiz.html 同模式）─────────────
(function () {
  var REASONS = [
    { value: 'wrong_answer',   sc: '答案有误',   tc: '答案有誤' },
    { value: 'doctrine_error', sc: '义理错误',   tc: '義理錯誤' },
    { value: 'typo',           sc: '错别字 / 排版问题', tc: '錯別字 / 排版問題' },
    { value: 'sensitive',      sc: '涉及冒犯',   tc: '涉及冒犯' },
    { value: 'other',          sc: '其他',       tc: '其他' },
  ];

  var backdrop = document.getElementById('rpt-backdrop');
  var form     = document.getElementById('rpt-form');
  var errBox   = document.getElementById('rpt-err');
  var detailsI = document.getElementById('rpt-details');
  var submitBt = document.getElementById('rpt-submit');
  var reasonsC = document.getElementById('rpt-reasons');

  function renderReasons() {
    reasonsC.innerHTML = REASONS.map(function (r, i) {
      var id = 'rpt-r-' + i;
      return '<label class="rpt-reason" for="' + id + '">' +
        '<input type="radio" name="reason" id="' + id + '" value="' + r.value + '">' +
        '<span>' + escapeHtml(sc(r.sc, r.tc)) + '</span>' +
        '</label>';
    }).join('');
  }
  function open() {
    if (!currentQid) {
      window.JX.toast.error(sc('题目未加载', '題目未載入'));
      return;
    }
    renderReasons();
    form.reset();
    errBox.classList.remove('show');
    errBox.textContent = '';
    backdrop.classList.add('open');
  }
  function close() { backdrop.classList.remove('open'); }

  reasonsC.addEventListener('change', function () {
    reasonsC.querySelectorAll('.rpt-reason').forEach(function (el) {
      var input = el.querySelector('input');
      el.classList.toggle('checked', input && input.checked);
    });
  });

  document.getElementById('btn-report').addEventListener('click', open);
  document.getElementById('rpt-cancel').addEventListener('click', close);
  backdrop.addEventListener('click', function (ev) {
    if (ev.target === backdrop) close();
  });
  document.addEventListener('keydown', function (ev) {
    if (ev.key === 'Escape' && backdrop.classList.contains('open')) close();
  });
  document.addEventListener('langchange', function () {
    if (backdrop.classList.contains('open')) renderReasons();
  });

  form.addEventListener('submit', function (ev) {
    ev.preventDefault();
    var reason = form.querySelector('input[name="reason"]:checked');
    if (!currentQid || !reason) {
      errBox.textContent = sc('请选择举报原因', '請選擇舉報原因');
      errBox.classList.add('show');
      return;
    }
    var details = (detailsI.value || '').trim();
    var body = { questionId: currentQid, reason: reason.value };
    if (details) body.details = details;

    submitBt.setAttribute('aria-busy', 'true');
    errBox.classList.remove('show');

    window.JX.api.post('/api/reports', body)
      .then(function () {
        close();
        window.JX.toast.success(sc('举报已提交，感谢反馈', '舉報已提交，感謝反饋'));
      })
      .catch(function (err) {
        errBox.textContent = (err && err.message) || sc('提交失败，请稍后重试', '提交失敗，請稍後重試');
        errBox.classList.add('show');
      })
      .finally(function () { submitBt.removeAttribute('aria-busy'); });
  });
})();

document.addEventListener('jx:user-ready', boot);
document.addEventListener('langchange', boot);
if (window.JX && window.JX.user) boot();
</script>
