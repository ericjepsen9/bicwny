<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display:flex; justify-content:center; }

.filter-tabs { display:flex; gap:var(--sp-2); padding:0 var(--sp-5) var(--sp-4); overflow-x:auto; scrollbar-width:none; }
.filter-tabs::-webkit-scrollbar { display:none; }
.ftab {
  padding:6px 14px; border-radius:var(--r-pill); white-space:nowrap;
  font:var(--text-caption); font-weight:600; letter-spacing:1.5px;
  background:rgba(255,255,255,.55); border:1px solid var(--glass-border);
  color:var(--ink-3); cursor:pointer;
}
.ftab.active { background:var(--saffron); color:#FFF; border-color:var(--saffron-dark); }

.mistake-card {
  display:block; padding:var(--sp-4);
  background:rgba(255,255,255,.62);
  backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
  border-radius:var(--r-lg); border:1px solid var(--glass-border);
  border-left:3px solid var(--crimson);
  box-shadow:var(--shadow-1);
  text-decoration:none; color:inherit; cursor:pointer;
  transition:transform var(--dur) var(--ease);
}
.mistake-card:hover { transform:translateY(-1px); box-shadow:var(--shadow-2); }
.mistake-chapter { font:var(--text-caption); color:var(--ink-3); letter-spacing:1.5px; margin-bottom:var(--sp-2); }
.mistake-stem { font:var(--text-body); color:var(--ink); letter-spacing:1px; line-height:1.5; margin-bottom:var(--sp-3); }
.mistake-footer { display:flex; align-items:center; justify-content:space-between; }
.mistake-time { font:var(--text-caption); color:var(--ink-4); letter-spacing:1px; }
.review-countdown {
  display:flex; align-items:center; gap:4px;
  font:var(--text-caption); font-weight:600; color:var(--crimson); letter-spacing:1px;
}

.sections { display:flex; flex-direction:column; gap:var(--sp-3); padding:0 var(--sp-5) 100px; }
</style>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone">

  <div class="status-bar" data-auto></div>

  <div class="top-nav">
    <a class="nav-back" id="nav-back" href="quiz-center.html"><svg width="18" height="18" fill="none" stroke="#55463A" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="nav-title"><span class="sc">错题本</span><span class="tc">錯題本</span></span>
    <button class="nav-action" aria-label="搜索"><svg width="18" height="18" fill="none" stroke="#55463A" stroke-width="1.8" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
  </div>

  <div class="filter-tabs" id="filter-tabs">
    <span class="ftab active" data-filter="all"><span class="sc">全部</span><span class="tc">全部</span> (<span data-count="all">0</span>)</span>
    <span class="ftab" data-filter="today"><span class="sc">今日</span><span class="tc">今日</span> (<span data-count="today">0</span>)</span>
  </div>

  <div style="padding:0 var(--sp-5) var(--sp-3);">
    <select id="course-filter" class="course-filter"
      style="width:100%;padding:8px 12px;border-radius:var(--r-pill);
             border:1px solid var(--glass-border);background:rgba(255,255,255,.6);
             font:var(--text-caption);color:var(--ink);letter-spacing:1.5px;outline:none;">
      <option value=""><span class="sc">全部法本</span></option>
    </select>
  </div>

  <div class="scroll-area">
  <div class="sections" id="mistakes-list">
    <div class="skel-list" data-skeleton="1" aria-hidden="true">
      <div class="skel-card"><div class="skel skel-title" style="margin-bottom:12px;"></div><div class="skel skel-line" style="margin-bottom:8px;"></div><div class="skel skel-line-sm"></div></div>
      <div class="skel-card"><div class="skel skel-title" style="margin-bottom:12px;"></div><div class="skel skel-line" style="margin-bottom:8px;"></div><div class="skel skel-line-sm"></div></div>
      <div class="skel-card"><div class="skel skel-title" style="margin-bottom:12px;"></div><div class="skel skel-line" style="margin-bottom:8px;"></div><div class="skel skel-line-sm"></div></div>
      <div class="skel-card"><div class="skel skel-title" style="margin-bottom:12px;"></div><div class="skel skel-line" style="margin-bottom:8px;"></div><div class="skel skel-line-sm"></div></div>
    </div>
  </div>
  </div>

<script>
var sc = window.JX.sc;
var escapeHtml = window.JX.util.escapeHtml;
var allMistakes = [];
var currentFilter = 'all';
var currentCourseId = '';
var courseTitleById = {};

function isToday(iso) {
  if (!iso) return false;
  var d = new Date(iso);
  var now = new Date();
  return d.getFullYear() === now.getFullYear() &&
         d.getMonth() === now.getMonth() &&
         d.getDate() === now.getDate();
}

function filterMistakes() {
  return allMistakes.filter(function (m) {
    if (currentFilter === 'today' && !isToday(m.lastWrongAt)) return false;
    if (currentCourseId) {
      var cid = (m.question && m.question.courseId) || '';
      if (cid !== currentCourseId) return false;
    }
    return true;
  });
}

function renderCards() {
  var list = document.getElementById('mistakes-list');
  list.innerHTML = '';
  var data = filterMistakes();
  if (!data.length) {
    list.innerHTML =
      '<div class="q-card" style="text-align:center;padding:var(--sp-6);background:rgba(255,255,255,.55);border:1px solid var(--glass-border);border-radius:var(--r-lg);">' +
        '<p style="font:var(--text-caption);color:var(--ink-3);">' +
          escapeHtml(sc('暂无错题', '暫無錯題')) +
        '</p></div>';
    return;
  }
  data.forEach(function (m) {
    var q = m.question || {};
    var stem = q.questionText || sc('（题目已失效）', '（題目已失效）');
    var source = q.source || '';
    var when = window.JX.util.relativeTime(m.lastWrongAt);
    var lessonId = q.lessonId || '';
    var courseId = q.courseId || '';
    // H1: lessonId + courseId 缺一即禁用 · tooltip 解释
    var canRetry = !!(lessonId && courseId);
    var retryHtml = canRetry
      ? '<button class="mistake-retry" ' +
          'style="margin-left:auto;padding:5px 12px;border-radius:var(--r-pill);' +
          'border:1px solid var(--saffron);background:var(--saffron);color:#FFF;' +
          'font:var(--text-caption);font-weight:600;letter-spacing:1px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;">' +
          '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>' +
          sc('再练', '再練') +
        '</button>'
      : '<button disabled title="' + escapeHtml(sc('题目缺少法本归属信息，无法记录进度', '題目缺少法本歸屬信息，無法記錄進度')) + '" ' +
          'style="margin-left:auto;padding:5px 12px;border-radius:var(--r-pill);' +
          'border:1px solid var(--ink-5);background:rgba(43,34,24,.06);color:var(--ink-4);' +
          'font:var(--text-caption);font-weight:600;letter-spacing:1px;cursor:not-allowed;display:inline-flex;align-items:center;gap:4px;">' +
          sc('再练', '再練') +
        '</button>';
    var card = document.createElement('div');
    card.className = 'mistake-card';
    card.style.position = 'relative';
    card.innerHTML =
      '<p class="mistake-chapter">' + escapeHtml(source) + '</p>' +
      '<p class="mistake-stem">' + escapeHtml(stem) + '</p>' +
      '<div class="mistake-footer">' +
        '<span class="mistake-time">' + escapeHtml(when) + '</span>' +
        '<span class="review-countdown">' +
          '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>' +
          '<span>' + m.wrongCount + sc(' 次错', ' 次錯') + '</span>' +
        '</span>' +
        retryHtml +
      '</div>' +
      '<button class="mistake-remove" aria-label="' + sc('移除', '移除') + '" ' +
        'style="position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;' +
        'border:1px solid var(--glass-border);background:rgba(255,255,255,.7);' +
        'color:var(--ink-3);cursor:pointer;font-size:14px;line-height:1;">✕</button>';

    // 点击卡片主体 → 去错题解析页
    card.addEventListener('click', function (ev) {
      if (ev.target.closest('.mistake-remove')) return;
      if (ev.target.closest('.mistake-retry')) return;
      location.href = window.JX.nav.toMistakeDetail({ questionId: m.questionId });
    });
    // 「再练一次」直接跳 quiz · from=mistake & questionId 让 quiz 完成后跳回错题详情
    // canRetry 已保证 lessonId + courseId 都齐全；disabled 按钮无此 class，querySelector 返回 null
    var retryEl = card.querySelector('.mistake-retry');
    if (retryEl) {
      retryEl.addEventListener('click', function (ev) {
        ev.stopPropagation();
        location.href = window.JX.nav.toQuiz({
          lessonId: lessonId,
          courseId: courseId,
          from: window.JX.nav.FROM.MISTAKE,
          questionId: m.questionId,
        });
      });
    }
    // 移除按钮
    card.querySelector('.mistake-remove').addEventListener('click', function (ev) {
      ev.stopPropagation();
      if (!confirm(sc('确定从错题本移除？', '確定從錯題本移除？'))) return;
      window.JX.api.del('/api/mistakes/' + encodeURIComponent(m.questionId)).then(function () {
        allMistakes = allMistakes.filter(function (x) { return x.questionId !== m.questionId; });
        updateCounts();
        populateCourseFilter();
        renderCards();
      }).catch(function (err) {
        window.JX.toast.error(sc('移除失败：', '移除失敗：') + (err.message || err));
      });
    });

    list.appendChild(card);
  });
}

function updateCounts() {
  document.querySelector('[data-count="all"]').textContent = allMistakes.length;
  document.querySelector('[data-count="today"]').textContent =
    allMistakes.filter(function (m) { return isToday(m.lastWrongAt); }).length;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(function (t) {
    t.classList.toggle('active', t.getAttribute('data-filter') === f);
  });
  renderCards();
}

document.getElementById('filter-tabs').addEventListener('click', function (ev) {
  var t = ev.target.closest('.ftab');
  if (!t) return;
  setFilter(t.getAttribute('data-filter'));
  // 切 today / all 时若可见为 0 且后端还有数据 · 自动续拉
  if (hasMore && filterMistakes().length === 0) loadPage();
});

// D6: 法本筛选 dropdown
document.getElementById('course-filter').addEventListener('change', function () {
  currentCourseId = this.value || '';
  renderCards();
  if (hasMore && filterMistakes().length === 0) loadPage();
});

// 从 allMistakes 推导 course list（去重 · 按 title 排序）· 题目自身没有 courseTitle 时用 courseTitleById 兜底
function populateCourseFilter() {
  var sel = document.getElementById('course-filter');
  if (!sel) return;
  var seen = {};
  var items = [];
  allMistakes.forEach(function (m) {
    var q = m.question || {};
    var cid = q.courseId;
    if (!cid || seen[cid]) return;
    seen[cid] = 1;
    items.push({ id: cid, title: q.courseTitle || courseTitleById[cid] || cid });
  });
  items.sort(function (a, b) { return (a.title > b.title) ? 1 : -1; });
  var keep = sel.value;
  sel.innerHTML = '<option value="">' + escapeHtml(sc('全部法本', '全部法本')) + '</option>' +
    items.map(function (c) {
      return '<option value="' + escapeHtml(c.id) + '">' + escapeHtml(c.title) + '</option>';
    }).join('');
  if (keep && seen[keep]) sel.value = keep;
}

// cursor pagination · 30 条每页 · 触底 IntersectionObserver 自动加载下一页
var PAGE_SIZE = 30;
var nextCursor = null; // { lastWrongAt, id } | null
var hasMore = true;
var loading = false;

function loadPage() {
  if (loading || !hasMore) return Promise.resolve();
  loading = true;
  var url = '/api/mistakes?limit=' + PAGE_SIZE;
  if (nextCursor) {
    url += '&cursorAt=' + encodeURIComponent(nextCursor.lastWrongAt) +
           '&cursorId=' + encodeURIComponent(nextCursor.id);
  }
  return window.JX.api.get(url).then(function (data) {
    var batch = Array.isArray(data) ? data : [];
    allMistakes = allMistakes.concat(batch);
    if (batch.length < PAGE_SIZE) {
      hasMore = false;
    } else {
      var last = batch[batch.length - 1];
      nextCursor = { lastWrongAt: last.lastWrongAt, id: last.id };
    }
    updateCounts();
    populateCourseFilter();
    renderCards();
    loading = false;
    // filter 边界 · 过滤后可见为 0 但还有更多数据 · 自动续拉
    //   场景：用户筛某法本 · 当前页 30 条全是别的法本 · 不主动拉用户看不到自己的错题
    //   上限 5 次（150 条）防死循环 · 5 页都筛空就让用户改条件
    if (hasMore && filterMistakes().length === 0 && allMistakes.length < PAGE_SIZE * 5) {
      return loadPage();
    }
  }).catch(function (err) {
    loading = false;
    if (allMistakes.length === 0) {
      document.getElementById('mistakes-list').innerHTML =
        '<div class="q-card" style="text-align:center;padding:var(--sp-6);"><p style="color:var(--crimson);">'
        + escapeHtml(sc('加载失败：', '加載失敗：') + (err.message || err))
        + '</p>'
        + '<a href="javascript:location.reload()" class="btn btn-ghost btn-pill" style="margin-top:12px;display:inline-block;padding:6px 18px;">'
        + escapeHtml(sc('重试', '重試')) + '</a>'
        + '</div>';
    }
    // 续页失败静默 · 用户可下拉刷新或滚回顶部触发
  });
}

function setupInfiniteScroll() {
  // 在列表底部插入哨兵 · 进入视口就拉下一页
  var sentinel = document.createElement('div');
  sentinel.id = 'mistakes-sentinel';
  sentinel.style.cssText = 'height:48px;display:flex;align-items:center;justify-content:center;font:var(--text-caption);color:var(--ink-4);';
  document.getElementById('mistakes-list').after(sentinel);
  if (typeof IntersectionObserver === 'undefined') return; // 老浏览器不退化 · 用户手动刷新
  var io = new IntersectionObserver(function (entries) {
    if (!entries[0].isIntersecting) return;
    if (!hasMore) {
      sentinel.textContent = sc('— 已显示全部 —', '— 已顯示全部 —');
      return;
    }
    sentinel.textContent = sc('加载中…', '載入中…');
    loadPage().then(function () {
      sentinel.textContent = hasMore ? '' : sc('— 已显示全部 —', '— 已顯示全部 —');
    });
  }, { rootMargin: '200px' });
  io.observe(sentinel);
}

function boot() {
  // 先拉一份 courses 列表用于 ID→title 映射兜底
  window.JX.api.get('/api/courses').then(function (cs) {
    (Array.isArray(cs) ? cs : []).forEach(function (c) { courseTitleById[c.id] = c.title; });
  }).catch(function () { /* 静默 */ });

  window.JX.util.bootGuard(
    document.getElementById('mistakes-list'),
    loadPage().then(function () { setupInfiniteScroll(); }),
    { timeoutMs: 8000 }
  );
}

document.addEventListener('jx:user-ready', boot);
document.addEventListener('langchange', renderCards);
if (window.JX && window.JX.user) boot();
</script>
</body>
