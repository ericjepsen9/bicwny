<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display: flex; justify-content: center; }

.filter-tabs { display: flex; gap: var(--sp-2); padding: 0 var(--sp-5) var(--sp-3); }
.ftab {
  padding: 5px 14px; border-radius: var(--r-pill);
  font: var(--text-caption); font-weight: 600; letter-spacing: 1px;
  background: rgba(43,34,24,.05); border: 1px solid transparent;
  color: var(--ink-3); cursor: pointer; transition: all var(--dur) var(--ease);
}
.ftab.active { background: var(--saffron-pale); border-color: var(--saffron-light); color: var(--saffron-dark); }

/* ── 网格布局：3 列（移动端宽 ≈ 375px → 每张 ~108px）─── */
.course-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-3);
  padding: 0 var(--sp-5) var(--sp-8);
}

.book-card {
  position: relative;
  display: block; text-decoration: none; color: inherit;
  cursor: pointer; transition: transform var(--dur) var(--ease);
}
.book-card:active { transform: scale(.96); }

/* 封面 1:1 方形 · 优先用 coverImageUrl，没图回落渐变 + emoji */
.book-cover {
  position: relative;
  width: 100%; aspect-ratio: 1 / 1;
  border-radius: var(--r-md);
  background: linear-gradient(135deg, var(--saffron-pale), var(--gold-pale));
  overflow: hidden;
  box-shadow: var(--shadow-1);
  display: flex; align-items: center; justify-content: center;
}
.book-cover img {
  width: 100%; height: 100%; object-fit: cover;
}
.book-cover-emoji {
  font-size: 2.2rem; line-height: 1;
}

/* 已加入徽章（左上角金色对勾） */
.book-pill {
  position: absolute;
  top: 6px; left: 6px;
  padding: 2px 8px;
  border-radius: var(--r-pill);
  font-size: .625rem; font-weight: 700; letter-spacing: .5px;
  background: var(--saffron); color: #fff;
  box-shadow: 0 2px 6px rgba(224,120,86,.4);
  display: flex; align-items: center; gap: 3px;
}
.book-pill.class-main { background: var(--gold-dark); }
.book-pill svg { width: 10px; height: 10px; stroke-width: 3; }

/* 卡片右上角 ⋮ 菜单（仅 enrolled 且非班级主修；点击打开退出确认）*/
.book-menu {
  position: absolute;
  top: 4px; right: 4px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,.35);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,.2);
}
.book-menu:hover { background: rgba(0,0,0,.55); }

.book-title {
  font-family: var(--font-serif); font-weight: 600;
  font-size: .8125rem; color: var(--ink); letter-spacing: 1.5px;
  margin-top: 8px; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; text-align: center;
}
.book-author {
  font-size: .6875rem; color: var(--ink-3); letter-spacing: .5px;
  margin-top: 2px; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-align: center;
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center; padding: var(--sp-8) var(--sp-5);
  color: var(--ink-3); font: var(--text-body); letter-spacing: 1px;
}

/* ── 详情底部弹层（未加入时点击卡片显示）─── */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: none; opacity: 0;
  z-index: 200; transition: opacity .25s ease;
}
.sheet-backdrop.open { display: block; opacity: 1; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: var(--bg-scene);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: var(--sp-5);
  z-index: 201;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
  max-height: 80vh; overflow-y: auto;
}
.sheet-backdrop.open + .sheet,
.sheet.open { transform: translateY(0); }
.sheet-cover {
  width: 100%; max-width: 200px; aspect-ratio: 1/1;
  border-radius: var(--r-lg); margin: 0 auto var(--sp-4);
  background: linear-gradient(135deg, var(--saffron-pale), var(--gold-pale));
  overflow: hidden; box-shadow: var(--shadow-2);
  display: flex; align-items: center; justify-content: center;
}
.sheet-cover img { width: 100%; height: 100%; object-fit: cover; }
.sheet-cover-emoji { font-size: 4rem; }
.sheet-title { font-family: var(--font-serif); font-size: 1.25rem; font-weight: 700; text-align: center; letter-spacing: 2px; margin-bottom: 4px; }
.sheet-author { text-align: center; color: var(--ink-3); font: var(--text-caption); letter-spacing: 1px; margin-bottom: var(--sp-3); }
.sheet-desc { font: var(--text-caption); color: var(--ink-2); letter-spacing: .5px; line-height: 1.6; margin-bottom: var(--sp-4); padding: 0 var(--sp-2); }
.sheet-stats { display: flex; gap: var(--sp-4); justify-content: center; margin-bottom: var(--sp-4); font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px; }
.sheet-stats b { color: var(--saffron-dark); font-size: 1.1rem; }
.sheet-actions { display: flex; gap: var(--sp-2); }
.sheet-btn {
  flex: 1; padding: 12px; border-radius: var(--r-pill);
  font: var(--text-body); font-weight: 700; letter-spacing: 2px;
  border: 1px solid; cursor: pointer; text-align: center; text-decoration: none;
}
.sheet-btn.primary { background: var(--saffron); color: #fff; border-color: var(--saffron-dark); }
.sheet-btn.ghost { background: transparent; color: var(--ink-3); border-color: var(--border); }
.sheet-btn[aria-busy="true"] { opacity: .5; pointer-events: none; }
</style>
</head>

<script>
// courses · GET /api/courses + GET /api/my/enrollments
//   报名：POST /api/enrollments { courseId }
//   退课：DELETE /api/enrollments/:courseId
var sc = window.JX.sc, escapeHtml = window.JX.util.escapeHtml;

var state = {
  courses: [],
  enrollments: [],
  filter: 'all',  // all | enrolled | available
  search: '',
};

function isEnrolled(courseId) {
  return state.enrollments.some(function (e) { return e.course && e.course.id === courseId; });
}
function getEnrollment(courseId) {
  return state.enrollments.find(function (e) { return e.course && e.course.id === courseId; }) || null;
}

// ── 卡片渲染（网格 3 列 · cover 图优先）───────────
function renderCard(c) {
  var enr = getEnrollment(c.id);
  var enrolled = !!enr;
  // C3: '班级主修'徽章看是否仍被班级关联（enrolledViaClassId）· source 不再是当前链接标记
  var isClassMain = enr && !!enr.enrolledViaClassId;
  var title = window.JX.components.courseTitle(c);
  var author = sc(c.author || '', c.author || '');

  var coverInner = window.JX.components.coverHtml(c, {
    emojiClass: 'book-cover-emoji',
    onErrorFallback: true,
  });

  var pill = '';
  if (isClassMain) {
    pill = '<span class="book-pill class-main">📍 '
      + sc('主修', '主修') + '</span>';
  } else if (enrolled) {
    pill = '<span class="book-pill">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
      + sc('已加入', '已加入') + '</span>';
  }

  // ⋮ 菜单：仅 enrolled 且非班级主修可显示（班级主修退出要先退班）
  var menuBtn = (enrolled && !isClassMain)
    ? '<button class="book-menu" data-menu="' + escapeHtml(c.id) + '" aria-label="' + sc('更多', '更多') + '">'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">'
      + '<circle cx="12" cy="6" r=".7" fill="currentColor"/><circle cx="12" cy="12" r=".7" fill="currentColor"/><circle cx="12" cy="18" r=".7" fill="currentColor"/>'
      + '</svg></button>'
    : '';

  return '<div class="book-card" data-cid="' + escapeHtml(c.id) + '">'
    +   '<div class="book-cover">' + coverInner + pill + menuBtn + '</div>'
    +   '<div class="book-title">' + escapeHtml(title) + '</div>'
    +   (author ? '<div class="book-author">' + escapeHtml(author) + '</div>' : '<div class="book-author">&nbsp;</div>')
    + '</div>';
}

function render() {
  var listEl = document.getElementById('course-list');
  var q = (state.search || '').trim().toLowerCase();

  var visible = state.courses.filter(function (c) {
    if (state.filter === 'enrolled'  && !isEnrolled(c.id)) return false;
    if (state.filter === 'available' &&  isEnrolled(c.id)) return false;
    if (q) {
      var hay = [c.title, c.titleTraditional, c.author, c.description]
        .filter(Boolean).join(' ').toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });

  if (!visible.length) {
    var msg = q
      ? sc('没有匹配「' + state.search + '」的法本', '沒有匹配「' + state.search + '」的法本')
      : state.filter === 'enrolled'
        ? sc('您还没加入任何法本', '您還沒加入任何法本')
        : state.filter === 'available'
          ? sc('已加入全部法本', '已加入全部法本')
          : sc('暂无法本', '暫無法本');
    listEl.innerHTML = '<div class="empty-state">' + escapeHtml(msg) + '</div>';
    return;
  }

  listEl.innerHTML = visible.map(renderCard).join('');

  // 卡片点击 → 已加入直进阅读；未加入打开底部介绍弹层
  listEl.querySelectorAll('.book-card').forEach(function (card) {
    card.addEventListener('click', function () {
      var cid = card.getAttribute('data-cid');
      var c = state.courses.find(function (x) { return x.id === cid; });
      if (!c) return;
      if (isEnrolled(cid)) {
        // 已加入 → 直接进阅读（auto-resume 到上次位置 / 首次进显示介绍页）
        location.href = window.JX.nav.toReading({ slug: c.slug, from: window.JX.nav.FROM.COURSES });
      } else {
        openSheet(c);
      }
    });
  });

  // ⋮ 按钮 → 退出确认（阻止冒泡到卡片）
  listEl.querySelectorAll('[data-menu]').forEach(function (btn) {
    btn.addEventListener('click', function (ev) {
      ev.stopPropagation();
      ev.preventDefault();
      var cid = btn.getAttribute('data-menu');
      var c = state.courses.find(function (x) { return x.id === cid; });
      if (!c) return;
      var title = sc(c.title, c.titleTraditional || c.title);
      if (!confirm(sc(
        '退出《' + title + '》？\n阅读进度会保留，可随时重新加入。',
        '退出《' + title + '》？\n閱讀進度會保留，可隨時重新加入。'
      ))) return;
      btn.disabled = true;
      window.JX.api.del('/api/enrollments/' + encodeURIComponent(cid))
        .then(function () { return reload({ fresh: true }); })
        .then(function () {
          window.JX.toast && window.JX.toast.ok && window.JX.toast.ok(sc('已退出', '已退出'));
        })
        .catch(function (err) {
          btn.disabled = false;
          alert((err && err.message) || sc('退出失败', '退出失敗'));
        });
    });
  });
}

// ── 底部弹层：未加入时点击卡片显示 ────────────────
function openSheet(c) {
  var title = window.JX.components.courseTitle(c);
  var coverInner = window.JX.components.coverHtml(c, { emojiClass: 'sheet-cover-emoji' });
  var content = ''
    + '<div class="sheet-cover">' + coverInner + '</div>'
    + '<p class="sheet-title">' + escapeHtml(title) + '</p>'
    + (c.author ? '<p class="sheet-author">' + escapeHtml(c.author) + '</p>' : '')
    + (c.description
        ? '<p class="sheet-desc">' + escapeHtml(c.description) + '</p>'
        : '')
    + '<div class="sheet-actions">'
    +   '<button class="sheet-btn ghost" id="sheet-preview" data-slug="' + escapeHtml(c.slug || '') + '">'
    +     sc('先看目录', '先看目錄')
    +   '</button>'
    +   '<button class="sheet-btn primary" id="sheet-confirm" data-cid="' + escapeHtml(c.id) + '">'
    +     sc('+ 加入并查看', '+ 加入並查看')
    +   '</button>'
    + '</div>'
    + '<p style="text-align:center;margin-top:var(--sp-3);font:var(--text-caption);color:var(--ink-4);letter-spacing:.5px;">'
    +   sc('"先看目录"不算入学习 · 随时可加入', '"先看目錄"不算入學習 · 隨時可加入')
    + '</p>';
  document.getElementById('sheet-content').innerHTML = content;
  document.getElementById('sheet-bd').classList.add('open');
  document.getElementById('sheet').classList.add('open');

  document.getElementById('sheet-bd').addEventListener('click', closeSheet);
  // 先看目录 · 不报名 · 进 scripture-detail（TOC）· 用户阅读后可决定是否加入
  document.getElementById('sheet-preview').addEventListener('click', function (ev) {
    var slug = ev.currentTarget.getAttribute('data-slug');
    if (!slug) return;
    location.href = window.JX.nav.toScriptureDetail({ slug: slug, from: window.JX.nav.FROM.COURSES });
  });
  document.getElementById('sheet-confirm').addEventListener('click', function (ev) {
    var btn = ev.currentTarget;
    var cid = btn.getAttribute('data-cid');
    btn.setAttribute('aria-busy', 'true');
    // once · 双击防抖 + disabled · 防重复 enroll
    window.JX.util.once(btn, function () {
      return window.JX.api.post('/api/enrollments', { courseId: cid });
    }).then(function () {
      if (window.JX.analytics) window.JX.analytics.track('course_enroll', {
        courseId: cid,
        slug: c.slug,
        title: c.title,
      });
      // 加入成功 → 进阅读（首次会自动展示介绍页）· intro=1 强制确保
      var slug = c.slug;
      location.href = window.JX.nav.toReading({ slug: slug, intro: true, from: window.JX.nav.FROM.COURSES });
    }).catch(function (err) {
      btn.removeAttribute('aria-busy');
      if (err && err.message === 'LOADING') return; // 重复点击 · 静默
      alert((err && err.message) || sc('加入失败', '加入失敗'));
    });
  });
}
function closeSheet() {
  document.getElementById('sheet-bd').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function reload(opts) {
  // opts.fresh=true · 绕过 HTTP 缓存（mutation 后调用必须传）
  return Promise.all([
    window.JX.api.get('/api/courses', opts),
    window.JX.api.get('/api/my/enrollments', opts),
  ]).then(function (r) {
    state.courses = Array.isArray(r[0]) ? r[0] : [];
    state.enrollments = Array.isArray(r[1]) ? r[1] : [];
    // 智能默认 chip：首次进 + 有报名 → 默认「已加入」；否则 / 用户已切过 → 保持当前
    if (!state._chipUserChanged && state.enrollments.length > 0) {
      state.filter = 'enrolled';
      // 同步 chip active 高亮
      document.querySelectorAll('.ftab').forEach(function (t) {
        t.classList.toggle('active', t.getAttribute('data-filter') === 'enrolled');
      });
    }
    render();
  }).catch(function (err) {
    document.getElementById('course-list').innerHTML =
      '<div class="empty-state" style="color:var(--crimson);">'
      + escapeHtml((err && err.message) || sc('加载失败', '載入失敗')) + '</div>';
  });
}

// filter chips
document.querySelectorAll('.ftab').forEach(function (tab) {
  tab.addEventListener('click', function () {
    document.querySelectorAll('.ftab').forEach(function (t) { t.classList.remove('active'); });
    tab.classList.add('active');
    state.filter = tab.getAttribute('data-filter');
    state._chipUserChanged = true;  // 用户主动切过 · reload 不再覆盖
    render();
  });
});

// 搜索框 input
var searchInp = document.getElementById('course-search');
if (searchInp) {
  searchInp.addEventListener('input', function () {
    state.search = searchInp.value || '';
    render();
  });
}

document.addEventListener('jx:user-ready', reload);
document.addEventListener('langchange', render);
if (window.JX && window.JX.user) reload();
</script>
</body>
</html>
