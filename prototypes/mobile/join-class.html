<!DOCTYPE html>
<html lang="zh-CN" data-lang="sc">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>觉学 · 加入班级</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<script src="../shared/lang.js"></script>
<script src="../shared/font-size.js"></script>
<script src="../shared/status-bar.js"></script>
<script src="../shared/config.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/require-auth.js"></script>
<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display: flex; justify-content: center; }
.join-wrap { padding: var(--sp-5) var(--sp-5) var(--sp-8); display: flex; flex-direction: column; gap: var(--sp-5); }

.intro { text-align: center; padding: var(--sp-4) 0 var(--sp-2); }
.intro-icon {
  width: 72px; height: 72px; border-radius: var(--r-xl);
  margin: 0 auto var(--sp-4);
  background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 28px rgba(224,120,86,.35);
}
.intro h2 { font-family: var(--font-serif); font-weight: 700; font-size: 1.25rem; letter-spacing: 4px; color: var(--ink); margin-bottom: var(--sp-2); }
.intro p { font: var(--text-body); color: var(--ink-2); letter-spacing: 1px; line-height: 1.7; }

.code-input {
  width: 100%; padding: 18px 20px;
  border: 2px solid var(--border-light); border-radius: var(--r);
  background: var(--glass-thick); color: var(--ink);
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 1.5rem; font-weight: 700;
  letter-spacing: 12px; text-align: center;
  text-transform: uppercase;
  transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
}
.code-input:focus {
  outline: none; border-color: var(--saffron);
  box-shadow: 0 0 0 3px rgba(224,120,86,.15);
}
.code-input.invalid { border-color: var(--crimson); }

.form-hint { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1.5px; line-height: 1.7; padding: 10px 12px; background: rgba(43,34,24,.04); border-radius: var(--r); }
.form-msg { font: var(--text-caption); letter-spacing: 1px; padding: 10px 12px; border-radius: var(--r); min-height: 1em; }
.form-msg.error { color: var(--crimson); background: rgba(192,57,43,.08); }
.form-msg.ok    { color: var(--sage-dark); background: rgba(125,154,108,.12); }
.form-msg:empty { display: none; }
.btn[aria-busy="true"] { opacity: .6; pointer-events: none; }

/* 成功后的班级卡 */
.class-preview {
  background: var(--sage-light); border: 1px solid var(--sage-light);
  border-radius: var(--r); padding: var(--sp-4);
  display: flex; flex-direction: column; gap: var(--sp-2);
  animation: slideUp .3s var(--ease);
}
.class-preview .ok-label { font: var(--text-caption); color: var(--sage-dark); letter-spacing: 2px; font-weight: 700; }
.class-preview .class-name { font-family: var(--font-serif); font-weight: 700; font-size: 1.125rem; color: var(--ink); letter-spacing: 2px; }
.class-preview .class-desc { font: var(--text-body); color: var(--ink-2); letter-spacing: .5px; line-height: 1.6; }
@keyframes slideUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone">

  <div class="status-bar" data-auto></div>

  <div class="top-nav">
    <a class="nav-back" href="home.html"><svg width="18" height="18" fill="none" stroke="#55463A" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="nav-title"><span class="sc">加入班级</span><span class="tc">加入班級</span></span>
    <div style="width:34px;"></div>
  </div>

  <form id="form-join" class="join-wrap" novalidate>

    <div class="intro">
      <div class="intro-icon">
        <svg width="36" height="36" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <h2><span class="sc">输入班级邀请码</span><span class="tc">輸入班級邀請碼</span></h2>
      <p>
        <span class="sc">向您的辅导员索取 6 位邀请码</span>
        <span class="tc">向您的輔導員索取 6 位邀請碼</span>
      </p>
    </div>

    <p class="form-hint">
      <span class="sc">邀请码由字母与数字组成，不区分大小写。加入后可在"班级详情"查看成员与公告。</span>
      <span class="tc">邀請碼由字母與數字組成，不區分大小寫。加入後可在"班級詳情"查看成員與公告。</span>
    </p>

    <div class="input-group">
      <label class="input-label" for="fld-code"><span class="sc">邀请码</span><span class="tc">邀請碼</span></label>
      <input class="code-input" id="fld-code" name="joinCode" type="text" autocomplete="off" autocapitalize="characters"
        maxlength="8" minlength="6" required
        placeholder="XXXXXX"
        inputmode="text" pattern="[A-Z0-9]{6,8}">
    </div>

    <div class="form-msg" id="join-msg" role="status"></div>

    <div id="preview-slot"></div>

    <button type="submit" class="btn btn-primary btn-lg btn-full btn-pill" id="btn-submit">
      <span class="sc">确认加入</span><span class="tc">確認加入</span>
    </button>

  </form>

</div>
</div>
<script src="../shared/nav.js"></script>
<script>
// 加入班级 · POST /api/classes/join { joinCode }
// 后端会把 code 自动 toUpperCase().trim()，前端同步这样处理便于校验
var sc = window.JX.sc;

function setMsg(kind, text) {
  var el = document.getElementById('join-msg');
  el.className = 'form-msg ' + kind;
  el.textContent = text || '';
}

// 实时把输入转大写 + 去空格
var input = document.getElementById('fld-code');
input.addEventListener('input', function () {
  var v = input.value.toUpperCase().replace(/\s+/g, '');
  if (v !== input.value) input.value = v;
  input.classList.remove('invalid');
  setMsg('', '');
});

document.getElementById('form-join').addEventListener('submit', function (ev) {
  ev.preventDefault();
  var code = input.value.toUpperCase().trim();

  if (!/^[A-Z0-9]{6,8}$/.test(code)) {
    input.classList.add('invalid');
    return setMsg('error', sc('邀请码应为 6-8 位字母或数字', '邀請碼應為 6-8 位字母或數字'));
  }

  var btn = document.getElementById('btn-submit');
  btn.setAttribute('aria-busy', 'true');
  setMsg('', '');

  window.JX.api.post('/api/classes/join', { joinCode: code })
    .then(function (data) {
      var cls = (data && data.class) || {};
      setMsg('ok', sc('加入成功！', '加入成功！'));
      // 成功预览卡
      var slot = document.getElementById('preview-slot');
      slot.innerHTML = ''
        + '<div class="class-preview">'
        + '<p class="ok-label">' + sc('已加入班级', '已加入班級') + '</p>'
        + '<p class="class-name">' + (escapeHtml(cls.name) || sc('（未命名班级）', '（未命名班級）')) + '</p>'
        + (cls.description ? '<p class="class-desc">' + escapeHtml(cls.description) + '</p>' : '')
        + '</div>';
      // 锁定表单，改按钮文案
      input.disabled = true;
      btn.innerHTML = '<span class="sc">进入班级 →</span><span class="tc">進入班級 →</span>';
      btn.removeAttribute('aria-busy');
      // 下次点击按钮 → 进 class-detail
      btn.onclick = function (e) {
        e.preventDefault();
        location.replace('class-detail.html');
      };
    })
    .catch(function (err) {
      input.classList.add('invalid');
      if (err && err.status === 404) {
        setMsg('error', sc('邀请码无效或班级已归档', '邀請碼無效或班級已歸檔'));
      } else if (err && err.status === 401) {
        setMsg('error', sc('登录状态失效，请重新登录', '登入狀態失效，請重新登入'));
      } else {
        setMsg('error', sc('加入失败：', '加入失敗：') + (err.message || err));
      }
    })
    .finally(function () {
      if (!input.disabled) btn.removeAttribute('aria-busy');
    });
});

function escapeHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
</script>
</body>
</html>
