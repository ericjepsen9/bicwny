<!DOCTYPE html>
<html lang="zh-CN" data-lang="sc">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="view-transition" content="same-origin">
<title>觉学 · 注销账号</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<script src="../shared/sentry.js"></script>
<script src="../shared/analytics.js"></script>
<script src="../shared/lang.js"></script>
<script src="../shared/return-url.js"></script>
<script src="../shared/font-size.js"></script>
<script src="../shared/status-bar.js"></script>
<script src="../shared/config.js"></script>
<script src="../shared/token-store.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/offline-queue.js"></script>
<script src="../shared/require-auth.js"></script>
<script src="../shared/sw-register.js" defer></script>
<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display: flex; justify-content: center; }
.form-wrap { padding: var(--sp-4) var(--sp-5); display: flex; flex-direction: column; gap: var(--sp-4); }
.warn-card {
  padding: var(--sp-4);
  background: rgba(192,57,43,.06); border: 1px solid rgba(192,57,43,.2);
  border-left: 3px solid var(--crimson); border-radius: var(--r);
  font: var(--text-caption); color: var(--ink-2); line-height: 1.8; letter-spacing: 1px;
}
.warn-card ul { margin: var(--sp-2) 0 0 var(--sp-4); padding: 0; }
.warn-card li { margin: 4px 0; }
.form-msg { font: var(--text-caption); letter-spacing: 1px; padding: 10px 12px; border-radius: var(--r); min-height: 1em; }
.form-msg.error { color: var(--crimson); background: rgba(192,57,43,.08); }
.form-msg:empty { display: none; }
.btn-danger {
  background: var(--crimson); color: #FFF; border: none;
}
.btn-danger:hover:not([disabled]) { background: #8E2F24; }
.btn[aria-busy="true"] { opacity: .6; pointer-events: none; }
</style>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone">

  <div class="status-bar" data-auto></div>

  <div class="top-nav">
    <a class="nav-back" href="profile.html"><svg width="18" height="18" fill="none" stroke="#55463A" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="nav-title"><span class="sc">注销账号</span><span class="tc">註銷帳號</span></span>
    <div style="width:34px;"></div>
  </div>

  <form id="form-delete" class="form-wrap" novalidate>

    <div class="warn-card">
      <strong><span class="sc">此操作不可撤销，请确认：</span><span class="tc">此操作不可撤銷，請確認：</span></strong>
      <ul>
        <li><span class="sc">账号将立即停用，所有设备将被强制退出</span><span class="tc">帳號將立即停用，所有設備將被強制退出</span></li>
        <li><span class="sc">邮箱进入 30 天冷却期 · 期间无法重新注册</span><span class="tc">郵箱進入 30 天冷卻期 · 期間無法重新註冊</span></li>
        <li><span class="sc">答题记录、错题本、SM-2 学习卡片将保留用于匿名统计</span><span class="tc">答題記錄、錯題本、SM-2 學習卡片將保留用於匿名統計</span></li>
        <li><span class="sc">班级成员身份、收藏、报名将一并失效</span><span class="tc">班級成員身份、收藏、報名將一併失效</span></li>
      </ul>
    </div>

    <div class="input-group">
      <label class="input-label" for="fld-pw"><span class="sc">输入当前密码以确认</span><span class="tc">輸入當前密碼以確認</span></label>
      <input class="input-field" id="fld-pw" name="currentPassword" type="password" autocomplete="current-password" required
        data-ph-sc="当前登录密码" data-ph-tc="當前登錄密碼" placeholder="当前登录密码">
    </div>

    <label style="display:flex;align-items:flex-start;gap:8px;padding:12px;background:rgba(192,57,43,.05);border-radius:var(--r);cursor:pointer;font:var(--text-caption);color:var(--ink-2);letter-spacing:1px;line-height:1.6;">
      <input type="checkbox" id="fld-acknowledge" required style="margin-top:3px;flex-shrink:0;width:16px;height:16px;accent-color:var(--crimson);">
      <span>
        <span class="sc">我已阅读并了解上述后果，确认要注销账号</span>
        <span class="tc">我已閱讀並了解上述後果，確認要註銷帳號</span>
      </span>
    </label>

    <div class="form-msg" id="del-msg" role="status"></div>

    <button type="submit" id="btn-delete" disabled class="btn btn-lg btn-full btn-pill btn-danger">
      <span class="sc">永久注销账号</span><span class="tc">永久註銷帳號</span>
    </button>
    <a href="profile.html" class="btn btn-ghost btn-lg btn-full btn-pill">
      <span class="sc">取消</span><span class="tc">取消</span>
    </a>
  </form>

</div>
</div>
<script src="../shared/nav.js"></script>
<script>
// delete-account · DELETE /api/auth/me
// 成功后后端已软删除账号 + 吊销所有 session；前端清 token 并跳登录
var sc = window.JX.sc;

function setMsg(kind, text) {
  var el = document.getElementById('del-msg');
  el.className = 'form-msg ' + kind;
  el.textContent = text || '';
}

// 勾选确认 checkbox 才能点提交按钮
var ackBox = document.getElementById('fld-acknowledge');
var delBtn = document.getElementById('btn-delete');
ackBox.addEventListener('change', function () {
  delBtn.disabled = !ackBox.checked;
});

document.getElementById('form-delete').addEventListener('submit', function (ev) {
  ev.preventDefault();
  var pw = document.getElementById('fld-pw').value;
  if (!pw) return setMsg('error', sc('请输入当前密码', '請輸入當前密碼'));
  if (!ackBox.checked) return setMsg('error', sc('请勾选确认了解后果', '請勾選確認了解後果'));
  if (!confirm(sc('最后确认：注销账号且无法恢复 · 邮箱将被锁定 30 天',
                  '最後確認：註銷帳號且無法恢復 · 郵箱將被鎖定 30 天'))) return;

  var btn = ev.target.querySelector('button[type="submit"]');
  btn.setAttribute('aria-busy', 'true');
  setMsg('', '');

  window.JX.api.del('/api/auth/me', { currentPassword: pw })
    .then(function () {
      window.JX.api.clearTokens();
      location.replace('auth.html');
    })
    .catch(function (err) {
      if (err && err.status === 401) setMsg('error', sc('当前密码不正确', '當前密碼不正確'));
      else setMsg('error', sc('注销失败：', '註銷失敗：') + (err.message || err));
    })
    .finally(function () { btn.removeAttribute('aria-busy'); });
});
</script>
</body>
</html>
