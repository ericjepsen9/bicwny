  顶礼本师释迦牟尼佛！

  顶礼文殊智慧勇识！

  顶礼传承大恩上师！

  无上甚深微妙法 百千万劫难遭遇
  我今见闻得受持 愿解如来真实义

  为度化一切众生，请大家发无上殊胜的菩提心！

<!DOCTYPE html>
<html lang="zh-CN" data-lang="sc">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>觉学 · 重置密码</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<script src="../shared/lang.js"></script>
<script src="../shared/font-size.js"></script>
<script src="../shared/status-bar.js"></script>
<script src="../shared/config.js"></script>
<script src="../shared/api.js"></script>
<!-- 注意：此页不挂 require-auth.js，用户未登录状态下也要能访问 -->
<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display: flex; justify-content: center; align-items: center; }
.logo-block { text-align: center; padding: var(--sp-5) var(--sp-5) var(--sp-4); }
.logo-icon {
  width: 68px; height: 68px; border-radius: var(--r-xl);
  margin: 0 auto var(--sp-4);
  background: linear-gradient(135deg, var(--saffron) 0%, var(--saffron-dark) 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 28px rgba(224,120,86,.35);
}
.logo-name { font-family: var(--font-serif); font-weight: 700; font-size: 1.5rem; color: var(--ink); letter-spacing: 8px; }
.logo-tagline { font: var(--text-caption); color: var(--ink-3); letter-spacing: 2px; margin-top: 4px; }
.form-wrap { padding: 0 var(--sp-5) var(--sp-8); display: flex; flex-direction: column; gap: var(--sp-4); }
.screen-title { font-family: var(--font-serif); font-weight: 700; font-size: 1.125rem; color: var(--ink); letter-spacing: 4px; }
.form-hint { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1.5px; line-height: 1.7; padding: 10px 12px; background: rgba(43,34,24,.04); border-radius: var(--r); }
.form-msg { font: var(--text-caption); letter-spacing: 1px; padding: 10px 12px; border-radius: var(--r); min-height: 1em; }
.form-msg.error { color: var(--crimson); background: rgba(192,57,43,.08); }
.form-msg.ok    { color: var(--sage-dark); background: rgba(125,154,108,.12); }
.form-msg.info  { color: var(--ink-3); background: rgba(43,34,24,.04); }
.form-msg:empty { display: none; }
.btn[aria-busy="true"] { opacity: .6; pointer-events: none; }

.success-block { text-align: center; padding: var(--sp-6) var(--sp-4); display: flex; flex-direction: column; gap: var(--sp-3); align-items: center; }
.success-icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--sage-light); color: var(--sage-dark);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: var(--sp-2);
}
.success-title { font-family: var(--font-serif); font-weight: 700; font-size: 1.125rem; letter-spacing: 4px; color: var(--ink); }
.success-desc { font: var(--text-body); color: var(--ink-2); letter-spacing: 1px; line-height: 1.7; max-width: 280px; }
</style>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone">

  <div class="status-bar" data-auto></div>

  <!-- Logo -->
  <div class="logo-block">
    <div class="logo-icon">
      <svg width="34" height="34" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </div>
    <p class="logo-name"><span class="sc">觉学</span><span class="tc">覺學</span></p>
    <p class="logo-tagline"><span class="sc">闻思修 · 共学</span><span class="tc">聞思修 · 共學</span></p>
  </div>

  <!-- ══ 表单态：输入新密码 ══ -->
  <form id="form-reset" class="form-wrap" novalidate>
    <p class="screen-title"><span class="sc">重置密码</span><span class="tc">重設密碼</span></p>

    <p class="form-hint">
      <span class="sc">请输入新密码。提交后，所有设备将被退出登录，请重新登录。</span>
      <span class="tc">請輸入新密碼。提交後，所有設備將被退出登入，請重新登入。</span>
    </p>

    <div class="input-group">
      <label class="input-label" for="fld-new"><span class="sc">新密码</span><span class="tc">新密碼</span></label>
      <input class="input-field" id="fld-new" name="newPassword" type="password" autocomplete="new-password" required minlength="6"
        data-ph-sc="至少 6 位" data-ph-tc="至少 6 位" placeholder="至少 6 位">
    </div>

    <div class="input-group">
      <label class="input-label" for="fld-confirm"><span class="sc">确认新密码</span><span class="tc">確認新密碼</span></label>
      <input class="input-field" id="fld-confirm" name="confirm" type="password" autocomplete="new-password" required
        data-ph-sc="再次输入新密码" data-ph-tc="再次輸入新密碼" placeholder="再次输入新密码">
    </div>

    <div class="form-msg" id="reset-msg" role="status"></div>

    <button type="submit" class="btn btn-primary btn-lg btn-full btn-pill">
      <span class="sc">确认重置</span><span class="tc">確認重設</span>
    </button>

    <p class="auth-center" style="text-align:center;">
      <a class="auth-link muted" href="auth.html" style="color:var(--ink-3);letter-spacing:1px;">
        <span class="sc">返回登录</span><span class="tc">返回登入</span>
      </a>
    </p>
  </form>

  <!-- ══ 成功态：链接已失效 / 重置成功 ══ -->
  <div id="success-block" class="success-block" style="display:none;">
    <div class="success-icon">
      <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <p class="success-title" id="success-title"><span class="sc">密码已重置</span><span class="tc">密碼已重設</span></p>
    <p class="success-desc" id="success-desc">
      <span class="sc">请使用新密码重新登录。</span>
      <span class="tc">請使用新密碼重新登入。</span>
    </p>
    <a href="auth.html" class="btn btn-primary btn-lg btn-pill" style="padding-left:36px;padding-right:36px;margin-top:var(--sp-4);">
      <span class="sc">去登录</span><span class="tc">去登入</span>
    </a>
  </div>

  <!-- ══ 错误态：token 缺失 / 失效 ══ -->
  <div id="error-block" class="success-block" style="display:none;">
    <div class="success-icon" style="background:rgba(192,57,43,.10);color:var(--crimson);">
      <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <p class="success-title"><span class="sc">链接已失效</span><span class="tc">連結已失效</span></p>
    <p class="success-desc">
      <span class="sc">重置链接无效或已过期。请返回登录页重新申请找回密码。</span>
      <span class="tc">重設連結無效或已過期。請返回登入頁重新申請找回密碼。</span>
    </p>
    <a href="auth.html" class="btn btn-primary btn-lg btn-pill" style="padding-left:36px;padding-right:36px;margin-top:var(--sp-4);">
      <span class="sc">重新申请</span><span class="tc">重新申請</span>
    </a>
  </div>

</div>
</div>
<script>
var sc = window.JX.sc;

function setMsg(kind, text) {
  var el = document.getElementById('reset-msg');
  el.className = 'form-msg ' + kind;
  el.textContent = text || '';
}

function showSuccess() {
  document.getElementById('form-reset').style.display = 'none';
  document.getElementById('error-block').style.display = 'none';
  document.getElementById('success-block').style.display = '';
}
function showError() {
  document.getElementById('form-reset').style.display = 'none';
  document.getElementById('success-block').style.display = 'none';
  document.getElementById('error-block').style.display = '';
}

// 取 URL 里的 token
function getToken() {
  var m = location.search.match(/[?&]token=([^&]+)/);
  return m ? decodeURIComponent(m[1]) : '';
}

// 页面加载时：缺 token 直接进错误态
var token = getToken();
if (!token || token.length < 20) {
  showError();
}

document.getElementById('form-reset').addEventListener('submit', function (ev) {
  ev.preventDefault();
  var neu = document.getElementById('fld-new').value;
  var cfm = document.getElementById('fld-confirm').value;

  if (!neu || !cfm)   return setMsg('error', sc('请填写全部字段', '請填寫全部字段'));
  if (neu.length < 6) return setMsg('error', sc('新密码至少 6 位', '新密碼至少 6 位'));
  if (neu !== cfm)    return setMsg('error', sc('两次输入不一致', '兩次輸入不一致'));

  var btn = ev.target.querySelector('button[type="submit"]');
  btn.setAttribute('aria-busy', 'true');
  setMsg('', '');

  window.JX.api.post('/api/auth/reset', { token: token, newPassword: neu }, { noAuth: true })
    .then(function () {
      // 清掉本地任何残留 token（保险），再展示成功页
      try { window.JX.api.clearTokens(); } catch (_) {}
      showSuccess();
    })
    .catch(function (err) {
      if (err && (err.status === 401 || err.status === 400)) {
        showError();
      } else {
        setMsg('error', sc('重置失败：', '重設失敗：') + (err.message || err));
      }
    })
    .finally(function () { btn.removeAttribute('aria-busy'); });
});
</script>
</body>
</html>
