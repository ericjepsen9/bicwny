<!DOCTYPE html>
<html lang="zh-CN" data-lang="sc">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="view-transition" content="same-origin">
<title>觉学 · 登录设备</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/base.css">
<link rel="stylesheet" href="../shared/components.css">
<script src="../shared/theme.js"></script>
<script src="../shared/sentry.js"></script>
<script src="../shared/analytics.js"></script>
<script src="../shared/lang.js"></script>
<script src="../shared/return-url.js"></script>
<script src="../shared/font-size.js"></script>
<script src="../shared/status-bar.js"></script>
<script src="../shared/config.js"></script>
<script src="../shared/token-store.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/offline-queue.js"></script>
<script src="../shared/scroll-restore.js"></script>
<script src="../shared/skeleton.js"></script>
<script src="../shared/haptics.js"></script>
<script src="../shared/toast.js"></script>
<script src="../shared/require-auth.js"></script>
<script src="../shared/sw-register.js" defer></script>
<style>
body { background: var(--bg-scene); min-height: 100vh; }
.phone-wrap { display: flex; justify-content: center; }
.devices-wrap { padding: 0 var(--sp-5) var(--sp-8); display: flex; flex-direction: column; gap: var(--sp-3); }
.device-card {
  display: flex; gap: var(--sp-3); align-items: flex-start;
  padding: var(--sp-4);
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg);
}
.device-card.current { border-left: 3px solid var(--saffron); }
.device-icon {
  width: 40px; height: 40px; border-radius: var(--r-sm); flex-shrink: 0;
  background: var(--saffron-pale);
  display: flex; align-items: center; justify-content: center;
  color: var(--saffron-dark);
}
.device-info { flex: 1; min-width: 0; }
.device-name {
  font: var(--text-body); font-weight: 600; color: var(--ink);
  letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
}
.device-meta { font: var(--text-caption); color: var(--ink-3); letter-spacing: .5px; margin-top: 4px; }
.current-badge {
  background: var(--saffron); color: #FFF;
  padding: 1px 8px; border-radius: var(--r-pill);
  font-size: .625rem; font-weight: 700; letter-spacing: 1px;
}
.btn-revoke {
  background: transparent; color: var(--crimson);
  border: 1px solid rgba(192,57,43,.3); border-radius: var(--r-pill);
  padding: 5px 14px; font: var(--text-caption); font-weight: 600;
  letter-spacing: 1px; cursor: pointer; flex-shrink: 0;
  transition: all var(--dur) var(--ease);
}
.btn-revoke:hover { background: rgba(192,57,43,.08); }
.btn-revoke[aria-busy="true"] { opacity: .5; pointer-events: none; }
.empty-block {
  padding: var(--sp-8) var(--sp-5);
  display: flex; flex-direction: column; align-items: center; gap: var(--sp-3);
  text-align: center;
}
.summary-row {
  padding: var(--sp-3) var(--sp-5);
  font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px;
  display: flex; justify-content: space-between; align-items: center;
}
.btn-revoke-all {
  background: transparent; color: var(--ink-3);
  border: 1px solid var(--border-light); border-radius: var(--r-pill);
  padding: 5px 12px; font: var(--text-caption); font-weight: 600;
  letter-spacing: 1px; cursor: pointer;
}
.btn-revoke-all:hover { color: var(--crimson); border-color: rgba(192,57,43,.3); }
.btn-revoke-all[aria-busy="true"] { opacity: .5; pointer-events: none; }
</style>
</head>
<body class="scene">
<div class="phone-wrap">
<div class="phone">

  <div class="status-bar" data-auto></div>

  <div class="top-nav">
    <a class="nav-back" href="settings.html"><svg width="18" height="18" fill="none" stroke="#55463A" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="nav-title"><span class="sc">登录设备</span><span class="tc">登入裝置</span></span>
    <div style="width:34px;"></div>
  </div>

  <div class="summary-row">
    <span id="summary-text"><span class="skel skel-line-sm" style="display:inline-block;vertical-align:middle;width:120px;" aria-hidden="true"></span></span>
    <button class="btn-revoke-all" id="btn-revoke-others" style="display:none;">
      <span class="sc">退出其他设备</span><span class="tc">退出其他裝置</span>
    </button>
  </div>

  <div class="devices-wrap" id="devices-list" data-skeleton="1" aria-hidden="true">
    <div class="skel-card" style="margin-bottom:var(--sp-3);"><div class="skel-row" style="padding:0;"><div class="skel skel-avatar" style="width:36px;height:36px;border-radius:var(--r-sm);"></div><div class="skel-stack"><div class="skel skel-line-lg"></div><div class="skel skel-line-sm"></div></div></div></div>
    <div class="skel-card" style="margin-bottom:var(--sp-3);"><div class="skel-row" style="padding:0;"><div class="skel skel-avatar" style="width:36px;height:36px;border-radius:var(--r-sm);"></div><div class="skel-stack"><div class="skel skel-line-lg"></div><div class="skel skel-line-sm"></div></div></div></div>
    <div class="skel-card"><div class="skel-row" style="padding:0;"><div class="skel skel-avatar" style="width:36px;height:36px;border-radius:var(--r-sm);"></div><div class="skel-stack"><div class="skel skel-line-lg"></div><div class="skel skel-line-sm"></div></div></div></div>
  </div>

</div>
</div>
<script src="../shared/nav.js"></script>
<script>
var sc = window.JX.sc, escapeHtml = window.JX.util.escapeHtml;

function fmtDate(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  var pad = function (n) { return n < 10 ? '0' + n : String(n); };
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
    + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function osIcon(os) {
  // 简易 svg · 各平台风格化
  if (os === 'iOS' || os === 'macOS') return '<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.05 12.5c0-2.42 1.97-3.6 2.06-3.65a4.42 4.42 0 0 0-3.49-1.89c-1.47-.15-2.88.87-3.63.87-.76 0-1.91-.85-3.14-.83a4.65 4.65 0 0 0-3.92 2.39c-1.68 2.92-.43 7.21 1.21 9.57.8 1.16 1.74 2.45 2.97 2.4 1.2-.05 1.65-.77 3.1-.77 1.45 0 1.86.77 3.13.75 1.3-.02 2.12-1.16 2.91-2.32a10.4 10.4 0 0 0 1.32-2.71 4.27 4.27 0 0 1-2.52-3.81zm-2.41-7.18a4.18 4.18 0 0 0 .96-3 4.27 4.27 0 0 0-2.77 1.43 3.99 3.99 0 0 0-.99 2.93 3.55 3.55 0 0 0 2.8-1.36z"/></svg>';
  if (os === 'Android') return '<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.6 9.48l1.84-3.18c.16-.31.04-.69-.26-.85a.637.637 0 0 0-.83.22l-1.88 3.24a11.43 11.43 0 0 0-8.94 0L5.65 5.67a.643.643 0 0 0-.87-.2c-.28.18-.37.54-.22.83L6.4 9.48A10.81 10.81 0 0 0 1 18h22a10.81 10.81 0 0 0-5.4-8.52zM7 15.25a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5zm10 0a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5z"/></svg>';
  if (os === 'Windows') return '<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M2 12V6.4l8-1.4v7H2zm9-7.6L22 3v9h-11V4.4zM2 13h8v6.6L2 18.4V13zm9 0h11v8l-11-1.6V13z"/></svg>';
  return '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="2"/></svg>';
}

function render(sessions) {
  var list = document.getElementById('devices-list');
  var summary = document.getElementById('summary-text');
  var btnAll = document.getElementById('btn-revoke-others');

  if (!sessions || sessions.length === 0) {
    list.innerHTML = '<div class="empty-block"><p style="font:var(--text-body);color:var(--ink-3);letter-spacing:1px;">' +
      escapeHtml(sc('当前没有活跃登录', '當前沒有活躍登入')) + '</p></div>';
    summary.innerHTML = '<span class="sc">0 台设备</span><span class="tc">0 台裝置</span>';
    return;
  }

  summary.innerHTML = '<span class="sc">' + sessions.length + ' 台设备</span><span class="tc">' + sessions.length + ' 台裝置</span>';
  var others = sessions.filter(function (s) { return !s.isCurrent; });
  btnAll.style.display = others.length > 0 ? '' : 'none';

  list.innerHTML = sessions.map(function (s) {
    var name = (s.browser || 'Browser') + ' · ' + (s.os || 'Unknown');
    return ''
      + '<div class="device-card' + (s.isCurrent ? ' current' : '') + '">'
      +   '<div class="device-icon">' + osIcon(s.os) + '</div>'
      +   '<div class="device-info">'
      +     '<div class="device-name">' + escapeHtml(name)
      +       (s.isCurrent ? '<span class="current-badge">' + sc('当前', '當前') + '</span>' : '')
      +     '</div>'
      +     '<div class="device-meta">'
      +       sc('登录于 ', '登入於 ') + fmtDate(s.issuedAt)
      +       (s.ipAddress ? ' · IP ' + escapeHtml(s.ipAddress) : '')
      +     '</div>'
      +   '</div>'
      +   (s.isCurrent ? '' :
        '<button class="btn-revoke" data-sid="' + escapeHtml(s.id) + '">' +
        sc('下线', '下線') + '</button>')
      + '</div>';
  }).join('');

  // 单个下线
  list.querySelectorAll('.btn-revoke[data-sid]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      if (btn.getAttribute('aria-busy') === 'true') return;
      var sid = btn.getAttribute('data-sid');
      if (!confirm(sc('确认下线该设备？', '確認下線該裝置？'))) return;
      btn.setAttribute('aria-busy', 'true');
      window.JX.api.del('/api/auth/sessions/' + encodeURIComponent(sid))
        .then(function () {
          window.JX.toast && window.JX.toast.ok(sc('已下线', '已下線'));
          load();
        })
        .catch(function (err) {
          btn.removeAttribute('aria-busy');
          window.JX.toast && window.JX.toast.error(sc('下线失败：', '下線失敗：') + ((err && err.message) || ''));
        });
    });
  });
}

document.getElementById('btn-revoke-others').addEventListener('click', function () {
  var btn = this;
  if (btn.getAttribute('aria-busy') === 'true') return;
  if (!confirm(sc('退出当前设备以外的所有登录？', '退出當前裝置以外的所有登入？'))) return;
  btn.setAttribute('aria-busy', 'true');
  window.JX.api.post('/api/auth/sessions/revoke-others', {})
    .then(function (r) {
      window.JX.toast && window.JX.toast.ok(sc('已下线 ', '已下線 ') + r.revoked + sc(' 台设备', ' 台裝置'));
      load();
    })
    .catch(function (err) {
      btn.removeAttribute('aria-busy');
      window.JX.toast && window.JX.toast.error(sc('操作失败：', '操作失敗：') + ((err && err.message) || ''));
    });
});

function load() {
  window.JX.util.bootGuard(
    document.getElementById('devices-list'),
    window.JX.api.get('/api/auth/sessions', { fresh: true })
      .then(render)
      .catch(function (err) {
        document.getElementById('devices-list').innerHTML =
          '<div class="empty-block"><p style="color:var(--crimson);">' +
          escapeHtml(sc('加载失败：', '載入失敗：') + ((err && err.message) || '')) +
          '</p></div>';
      }),
    { timeoutMs: 8000 }
  );
}

document.addEventListener('jx:user-ready', load);
if (window.JX && window.JX.user) load();
</script>
</body>
</html>
