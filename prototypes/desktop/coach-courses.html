<style>
.side-avatar { background: linear-gradient(135deg, var(--gold-light), var(--gold)); }

/* 两栏布局 · 复用 admin-courses 的视觉语言 */
.cs-layout {
  display: grid; grid-template-columns: 320px 1fr; gap: var(--sp-4);
  align-items: start;
}
@media (max-width: 767px) {
  .cs-layout { grid-template-columns: 1fr; }
  .cs-list-panel { position: static !important; max-height: 50vh !important; }
}
.cs-list-panel {
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg); overflow: hidden;
  position: sticky; top: var(--sp-4); max-height: calc(100vh - 120px); overflow-y: auto;
}
.cs-list-head {
  padding: var(--sp-3) var(--sp-4); border-bottom: 1px solid var(--border-light);
  background: rgba(43,34,24,.02);
}
.cs-list-head h3 { font-family: var(--font-serif); font-weight: 700; font-size: .9375rem; color: var(--ink); letter-spacing: 2px; margin: 0; }

.cs-card {
  display: flex; gap: var(--sp-3); padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--border-light); cursor: pointer;
}
.cs-card:hover { background: rgba(224,120,86,.04); }
.cs-card.active { background: rgba(224,120,86,.10); border-left: 3px solid var(--saffron); padding-left: calc(var(--sp-4) - 3px); }
.cs-card:last-child { border-bottom: 0; }
.cs-emoji { font-size: 1.5rem; line-height: 1; flex-shrink: 0; }
.cs-info { flex: 1; min-width: 0; }
.cs-name { font-family: var(--font-serif); font-weight: 700; color: var(--ink); letter-spacing: 1px; word-break: break-word; }
.cs-meta { font: var(--text-caption); color: var(--ink-3); margin-top: 4px; }

.cs-detail-panel {
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg); padding: var(--sp-5);
  min-height: 400px;
}
.cs-detail-empty {
  display: flex; align-items: center; justify-content: center;
  min-height: 360px; color: var(--ink-4); font: var(--text-body); letter-spacing: 1px;
}
.cs-section { margin-bottom: var(--sp-5); }
.cs-section h4 {
  font-family: var(--font-serif); font-weight: 700; letter-spacing: 2px;
  color: var(--ink); margin: 0 0 var(--sp-3); font-size: .9375rem;
  border-bottom: 1px solid var(--border-light); padding-bottom: var(--sp-2);
}

.chapter {
  background: rgba(43,34,24,.02); border: 1px solid var(--border-light);
  border-radius: var(--r-sm); margin-bottom: var(--sp-2); overflow: hidden;
}
.ch-head {
  display: flex; align-items: center; gap: var(--sp-2); padding: 10px var(--sp-3);
  background: rgba(255,255,255,.6); cursor: pointer;
}
.ch-toggle { width: 16px; transition: transform var(--dur) var(--ease); color: var(--ink-3); }
.chapter.expanded .ch-toggle { transform: rotate(90deg); }
.ch-order {
  font-family: 'SF Mono', Consolas, monospace; font-size: .6875rem; font-weight: 700;
  color: var(--saffron-dark); background: var(--saffron-pale);
  padding: 2px 6px; border-radius: var(--r-sm); min-width: 28px; text-align: center;
}
.ch-title { font-family: var(--font-serif); font-weight: 700; color: var(--ink); letter-spacing: 1px; flex: 1; }
.ch-count { font: var(--text-caption); color: var(--ink-3); }
.ch-body { display: none; padding: var(--sp-2) var(--sp-3); }
.chapter.expanded .ch-body { display: block; }

.lesson {
  display: flex; flex-direction: column; gap: 4px;
  padding: 8px 10px; margin-bottom: 6px;
  background: #fff; border: 1px solid var(--border-light); border-radius: var(--r-sm);
  cursor: pointer;
}
.lesson:hover { border-color: var(--saffron-light); }
.lesson.active { border-color: var(--saffron); background: var(--saffron-pale); }
.le-head { display: flex; align-items: center; gap: var(--sp-2); }
.le-order { font-family: 'SF Mono', Consolas, monospace; font-size: .6875rem; color: var(--ink-3); min-width: 24px; text-align: center; }
.le-title { font: var(--text-caption); font-weight: 600; color: var(--ink); letter-spacing: .5px; flex: 1; }
.le-len { font: var(--text-caption); color: var(--ink-4); font-size: .6875rem; }

.text-view {
  background: rgba(255,255,255,.5); border: 1px solid var(--border-light);
  border-radius: var(--r-sm); padding: var(--sp-3) var(--sp-4);
  font: var(--text-body-serif); line-height: 1.9; letter-spacing: 1px;
  color: var(--ink); white-space: pre-wrap; word-break: break-word;
  max-height: 50vh; overflow-y: auto;
}
.text-empty { color: var(--ink-4); font-style: italic; }
</style>

  <main class="main">
    <div class="top-bar">

        <h1 class="page-title"><span class="sc">法本浏览</span><span class="tc">法本瀏覽</span></h1>
        <p class="page-sub"><span class="sc">已发布法本 · 备课参考（只读）</span><span class="tc">已發佈法本 · 備課參考（只讀）</span></p>

    <div class="cs-layout">
      <!-- 左 · 法本列表 -->

          <div style="padding:var(--sp-5);text-align:center;color:var(--ink-3);font:var(--text-caption);">

<script>
// coach-courses · 只读法本浏览（公开端点 · GET /api/courses + GET /api/courses/:slug）
var sc = window.JX.sc, escapeHtml = window.JX.util.escapeHtml;
var state = { list: [], currentSlug: null, currentTree: null, currentLessonId: null };

function fetchList() {
  return window.JX.api.get('/api/courses').then(function (data) {
    state.list = data || [];
    renderList();
  }).catch(function (err) {
    document.getElementById('course-list').innerHTML =
      '<div style="padding:var(--sp-5);color:var(--crimson);font:var(--text-caption);">' +
      escapeHtml(sc('加载失败：', '加載失敗：') + ((err && err.message) || err)) + '</div>';
  });
}

function renderList() {
  var body = document.getElementById('course-list');
  if (!state.list.length) {
    body.innerHTML = '<div style="padding:var(--sp-5);text-align:center;color:var(--ink-4);font:var(--text-caption);">' +
      escapeHtml(sc('暂无已发布法本', '暫無已發佈法本')) + '</div>';
    return;
  }
  body.innerHTML = state.list.map(function (c) {
    var act = c.slug === state.currentSlug;
    return '<div class="cs-card' + (act ? ' active' : '') + '" data-slug="' + escapeHtml(c.slug) + '">' +
      '<div class="cs-emoji">' + escapeHtml(c.coverEmoji || '🪷') + '</div>' +
      '<div class="cs-info">' +
        '<div class="cs-name">' + escapeHtml(c.title || '—') + '</div>' +
        '<div class="cs-meta">' + escapeHtml(c.author || '') + '</div>' +
      '</div></div>';
  }).join('');
  body.querySelectorAll('[data-slug]').forEach(function (el) {
    el.addEventListener('click', function () { selectCourse(el.getAttribute('data-slug')); });
  });
}

function selectCourse(slug) {
  state.currentSlug = slug;
  state.currentLessonId = null;
  document.querySelectorAll('.cs-card').forEach(function (el) {
    el.classList.toggle('active', el.getAttribute('data-slug') === slug);
  });
  var detail = document.getElementById('detail');
  detail.innerHTML = '<div class="cs-detail-empty"><span class="sc">加载中…</span><span class="tc">加載中…</span></div>';
  window.JX.api.get('/api/courses/' + encodeURIComponent(slug))
    .then(function (data) {
      state.currentTree = data.course;
      renderDetail();
    })
    .catch(function (err) {
      detail.innerHTML = '<div class="cs-detail-empty" style="color:var(--crimson);">' +
        escapeHtml(sc('加载失败：', '加載失敗：') + ((err && err.message) || err)) + '</div>';
    });
}

function renderDetail() {
  var c = state.currentTree;
  if (!c) return;
  var detail = document.getElementById('detail');

  var head = '<div style="margin-bottom:var(--sp-4);">' +
    '<div style="font-family:var(--font-serif);font-weight:700;font-size:1.25rem;color:var(--ink);letter-spacing:3px;margin-bottom:6px;">' +
      escapeHtml(c.coverEmoji || '🪷') + '  ' + escapeHtml(c.title) + '</div>' +
    (c.author ? '<div style="font:var(--text-caption);color:var(--ink-3);letter-spacing:1px;">' + escapeHtml(c.author) + '</div>' : '') +
    (c.description ? '<div style="font:var(--text-body);color:var(--ink-2);margin-top:8px;line-height:1.7;">' + escapeHtml(c.description) + '</div>' : '') +
    '</div>';

  var chapters = (c.chapters || []).map(function (ch) {
    return '<div class="chapter" data-cid="' + escapeHtml(ch.id) + '">' +
      '<div class="ch-head">' +
        '<svg class="ch-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>' +
        '<span class="ch-order">' + ch.order + '</span>' +
        '<span class="ch-title">' + escapeHtml(ch.title) + '</span>' +
        '<span class="ch-count">' + (ch.lessons || []).length + sc(' 节', ' 節') + '</span>' +
      '</div>' +
      '<div class="ch-body">' +
        (ch.lessons || []).map(function (le) {
          var refLen = (le.referenceText || '').length;
          var act = le.id === state.currentLessonId;
          return '<div class="lesson' + (act ? ' active' : '') + '" data-lid="' + escapeHtml(le.id) + '">' +
            '<div class="le-head">' +
              '<span class="le-order">' + le.order + '</span>' +
              '<span class="le-title">' + escapeHtml(le.title) + '</span>' +
              '<span class="le-len">' + refLen + sc(' 字', ' 字') + '</span>' +
            '</div></div>';
        }).join('') +
      '</div>' +
    '</div>';
  }).join('');

  detail.innerHTML = head +
    '<div class="cs-section"><h4>' + sc('章 / 节', '章 / 節') + '</h4>' + chapters + '</div>' +
    '<div class="cs-section" id="text-section"><h4>' + sc('正文 · 讲记', '正文 · 講記') + '</h4>' +
      '<div class="text-view text-empty">' + escapeHtml(sc('点选左侧课时查看正文', '點選左側課時查看正文')) + '</div></div>';

  // 章折叠
  detail.querySelectorAll('.chapter').forEach(function (chEl) {
    chEl.querySelector('.ch-head').addEventListener('click', function () {
      chEl.classList.toggle('expanded');
    });
  });

  // 课时点选
  detail.querySelectorAll('.lesson').forEach(function (leEl) {
    leEl.addEventListener('click', function (ev) {
      ev.stopPropagation();
      var lid = leEl.getAttribute('data-lid');
      state.currentLessonId = lid;
      // 更新 active
      detail.querySelectorAll('.lesson').forEach(function (el) {
        el.classList.toggle('active', el.getAttribute('data-lid') === lid);
      });
      // 找到课时数据 + 渲染正文
      var lesson = null;
      (c.chapters || []).some(function (ch) {
        var f = (ch.lessons || []).find(function (x) { return x.id === lid; });
        if (f) { lesson = f; return true; }
        return false;
      });
      if (lesson) renderLesson(lesson);
    });
  });
}

function renderLesson(le) {
  var sec = document.getElementById('text-section');
  if (!sec) return;
  var ref = le.referenceText || '';
  var ts  = le.teachingSummary || '';

  // 找该 lesson 归属的 chapter（state.currentTree 里查）· 用于"+ 加题"快捷链接
  var courseId = state.currentTree && state.currentTree.id;
  var chapter = null;
  if (state.currentTree && state.currentTree.chapters) {
    for (var i = 0; i < state.currentTree.chapters.length; i++) {
      var ch = state.currentTree.chapters[i];
      if ((ch.lessons || []).some(function (l) { return l.id === le.id; })) { chapter = ch; break; }
    }
  }
  var addQHref = (courseId && chapter)
    ? 'coach-questions.html?autoNew=1&courseId=' + encodeURIComponent(courseId) +
      '&chapterId=' + encodeURIComponent(chapter.id) +
      '&lessonId=' + encodeURIComponent(le.id)
    : '';

  var html =
    '<div style="display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);margin-bottom:var(--sp-3);">' +
      '<h4 style="margin:0;">' + escapeHtml(le.title) + '</h4>' +
      (addQHref
        ? '<a href="' + addQHref + '" class="btn btn-primary btn-pill" ' +
          'style="padding:6px 14px;font-size:.75rem;letter-spacing:1.5px;text-decoration:none;flex-shrink:0;">' +
          '+ <span class="sc">添加新题</span><span class="tc">添加新題</span></a>'
        : '') +
    '</div>';
  if (ref) {
    html += '<div style="font:var(--text-caption);color:var(--ink-3);letter-spacing:1.5px;margin-bottom:6px;">' +
      sc('原文', '原文') + '</div>' +
      '<div class="text-view">' + escapeHtml(ref) + '</div>';
  }
  if (ts) {
    html += '<div style="font:var(--text-caption);color:var(--ink-3);letter-spacing:1.5px;margin:var(--sp-3) 0 6px;">' +
      sc('讲记摘要', '講記摘要') + '</div>' +
      '<div class="text-view">' + escapeHtml(ts) + '</div>';
  }
  if (!ref && !ts) {
    html += '<div class="text-view text-empty">' + escapeHtml(sc('（此课时尚未填正文）', '（此課時尚未填正文）')) + '</div>';
  }
  sec.innerHTML = html;
  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.getElementById('btn-logout').addEventListener('click', function () {
  if (!confirm(sc('确定退出登录？', '確定退出登入？'))) return;
  window.JX.api.logout().finally(function () { location.replace('auth.html'); });
});

document.addEventListener('jx:user-ready', fetchList);
document.addEventListener('langchange', function () {
  renderList();
  if (state.currentTree) renderDetail();
});
if (window.JX && window.JX.user) fetchList();
</script>
