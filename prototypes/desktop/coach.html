<style>
.search-box {
  display: flex; align-items: center; gap: var(--sp-2);
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--r-pill); padding: 7px var(--sp-4); min-width: 220px;
}
.search-box input { border: none; background: transparent; font: var(--text-body); color: var(--ink); outline: none; flex: 1; }
/* KPI cards */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-4); margin-bottom: var(--sp-6); }
.kpi-card {
  background: var(--glass-thick); backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border); border-radius: var(--r-xl);
  padding: var(--sp-5); box-shadow: var(--glass-shadow);
}
.kpi-label { font: var(--text-caption); color: var(--ink-3); letter-spacing: 2px; margin-bottom: var(--sp-2); }
.kpi-value { font-family: var(--font-serif); font-weight: 700; font-size: 1.875rem; color: var(--ink); letter-spacing: 1px; line-height: 1; }
.kpi-trend { font: var(--text-caption); color: var(--sage-dark); margin-top: 6px; letter-spacing: 1px; }
.kpi-trend.down { color: var(--crimson); }

/* Section */
.section { margin-bottom: var(--sp-6); }
.section-head-d { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--sp-4); }
.section-title-d { font-family: var(--font-serif); font-weight: 700; font-size: 1.125rem; color: var(--ink); letter-spacing: 3px; }
.section-action { font: var(--text-caption); color: var(--saffron); letter-spacing: 1px; cursor: pointer; }

/* Class cards grid */
.class-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-4); }
.class-card-d {
  background: var(--glass-thick); backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border); border-radius: var(--r-xl);
  padding: var(--sp-5); transition: transform var(--dur) var(--ease);
}
.class-card-d:hover { transform: translateY(-2px); box-shadow: var(--shadow-3); }
.class-head {
  display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-4);
  padding-bottom: var(--sp-3); border-bottom: 1px solid var(--border-light);
}
.class-icon-d {
  width: 44px; height: 44px; border-radius: var(--r-sm);
  background: var(--saffron-pale); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.class-info-d { flex: 1; min-width: 0; }
.class-name-d { font-family: var(--font-serif); font-weight: 700; color: var(--ink); letter-spacing: 2px; margin-bottom: 2px; }
.class-code { font: var(--text-caption); color: var(--ink-4); font-family: 'SF Mono', monospace; letter-spacing: 1px; }
.class-stats { display: flex; gap: var(--sp-4); margin-bottom: var(--sp-4); }
.class-stat { flex: 1; }
.class-stat-val { font-family: var(--font-serif); font-weight: 700; font-size: 1.125rem; color: var(--ink); line-height: 1; }
.class-stat-lbl { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px; margin-top: 3px; }
.class-progress { margin-bottom: var(--sp-3); }
.class-progress-label { display: flex; justify-content: space-between; font: var(--text-caption); color: var(--ink-3); margin-bottom: 4px; }
.class-progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.class-progress-fill { height: 100%; background: linear-gradient(90deg, var(--saffron), var(--saffron-dark)); border-radius: 3px; }
.class-actions { display: flex; gap: var(--sp-2); }
.class-btn {
  flex: 1; padding: 7px; border-radius: var(--r-sm);
  font: var(--text-caption); font-weight: 600; letter-spacing: 1px;
  text-align: center; cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--ink-2); text-decoration: none;
}
.class-btn.primary { background: var(--saffron); color: #fff; border-color: var(--saffron); }

/* Activity feed */
.feed { display: flex; flex-direction: column; gap: var(--sp-3); }
.feed-item {
  display: flex; align-items: flex-start; gap: var(--sp-3);
  padding: var(--sp-4);
  background: var(--glass-thick); border: 1px solid var(--glass-border); border-radius: var(--r-lg);
}
.feed-icon { width: 36px; height: 36px; border-radius: var(--r); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.feed-icon.saffron { background: var(--saffron-pale); }
.feed-icon.sage { background: var(--sage-light); }
.feed-icon.gold { background: var(--gold-pale); }
.feed-body { flex: 1; }
.feed-title { font-weight: 600; color: var(--ink); letter-spacing: .5px; font-size: .875rem; margin-bottom: 2px; }
.feed-meta { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px; }
.feed-action {
  padding: 5px 14px; border-radius: var(--r-pill);
  background: var(--saffron-pale); color: var(--saffron-dark);
  border: 1px solid var(--saffron-light); font: var(--text-caption); font-weight: 700;
  letter-spacing: 1px; cursor: pointer; flex-shrink: 0;
}
.feed-time { font: var(--text-caption); color: var(--ink-4); flex-shrink: 0; }
</style>

<body>

        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>

    <!-- KPIs -->
    <div class="kpi-grid">

<script>
// coach dashboard 数据源
//   GET /api/coach/classes                      我负责的班级
//   GET /api/coach/classes/:id/stats            单班级聚合（本周窗口）
//   GET /api/coach/questions                    我创建的题（筛 reviewStatus=pending 作待办）
var sc = window.JX.sc, escapeHtml = window.JX.util.escapeHtml;

function renderPageSub() {
  var d = new Date();
  var weeks = ['日','一','二','三','四','五','六'];
  var txt = sc(
    '周 ' + weeks[d.getDay()] + ' · ' + (d.getMonth()+1) + ' 月 ' + d.getDate() + ' 日',
    '週 ' + weeks[d.getDay()] + ' · ' + (d.getMonth()+1) + ' 月 ' + d.getDate() + ' 日',
  );
  document.getElementById('page-sub').textContent = txt;
}

function pct(v)        { return Math.round((v || 0) * 100) + '%'; }
function setSub(id, t) { document.getElementById(id).textContent = t; }

function renderKpis(classes, statsList) {
  document.getElementById('kpi-classes').textContent = classes.length;
  setSub('kpi-classes-sub', sc('覆盖班级总数', '覆蓋班級總數'));

  var members = 0, answers = 0, correctSum = 0, active = 0;
  statsList.forEach(function (s) {
    if (!s) return;
    members += s.memberCount || 0;
    answers += s.totalAnswers || 0;
    correctSum += (s.correctRate || 0) * (s.totalAnswers || 0);
    active += s.activeInWindow || 0;
  });

  document.getElementById('kpi-members').textContent = members;
  setSub('kpi-members-sub', sc('本周活跃 ', '本週活躍 ') + active);
  document.getElementById('kpi-answers').textContent = answers;
  setSub('kpi-answers-sub', sc('近 7 天窗口', '近 7 天視窗'));
  document.getElementById('kpi-accuracy').textContent = answers
    ? pct(correctSum / answers) : '—';
  setSub('kpi-accuracy-sub', sc('学员答题加权', '學員答題加權'));
}

function renderClassCards(memberships, statsMap) {
  var grid = document.getElementById('class-grid');
  if (!memberships.length) {
    grid.innerHTML = '<p style="color:var(--ink-3);font:var(--text-caption);">' +
      escapeHtml(sc('尚未负责任何班级，请联系管理员分配', '尚未負責任何班級，請聯繫管理員分配')) +
      '</p>';
    return;
  }
  grid.innerHTML = memberships.map(function (m) {
    var cls = m.class || {};
    var s = statsMap[cls.id] || { memberCount: 0, activeInWindow: 0, correctRate: 0, totalAnswers: 0 };
    var courseLine = cls.course
      ? '<p style="font:var(--text-caption);color:var(--gold-dark);letter-spacing:.5px;margin-top:6px;">'
        + (cls.course.coverEmoji || '🪷') + ' '
        + sc('主修：', '主修：')
        + escapeHtml(sc(cls.course.title, cls.course.titleTraditional || cls.course.title))
        + '</p>'
      : '';
    return '<a class="class-card-d" href="coach-students.html?classId=' + encodeURIComponent(cls.id) + '" data-class-id="' + escapeHtml(cls.id) + '" style="text-decoration:none;color:inherit;display:block;">' +
      '<div class="class-head">' +
        '<div class="class-icon-d"><svg width="22" height="22" fill="none" stroke="#E07856" stroke-width="1.6" stroke-linecap="round" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>' +
        '<div class="class-info-d">' +
          '<p class="class-name-d">' + escapeHtml(cls.name || '—') + '</p>' +
          '<p class="class-code">' + escapeHtml(cls.joinCode || '—') + '</p>' +
          courseLine +
        '</div>' +
      '</div>' +
      '<div class="class-stats">' +
        '<div class="class-stat"><p class="class-stat-val">' + s.memberCount + '</p>' +
          '<p class="class-stat-lbl">' + escapeHtml(sc('成员', '成員')) + '</p></div>' +
        '<div class="class-stat"><p class="class-stat-val">' + s.activeInWindow + '</p>' +
          '<p class="class-stat-lbl">' + escapeHtml(sc('周活跃', '週活躍')) + '</p></div>' +
        '<div class="class-stat"><p class="class-stat-val">' + pct(s.correctRate) + '</p>' +
          '<p class="class-stat-lbl">' + escapeHtml(sc('正确率', '正確率')) + '</p></div>' +
      '</div>' +
      '<div class="class-progress">' +
        '<div class="class-progress-label">' +
          '<span>' + escapeHtml(sc('本周答题', '本週答題')) + '</span>' +
          '<span>' + s.totalAnswers + '</span>' +
        '</div>' +
        '<div class="class-progress-track"><div class="class-progress-fill" style="width:' +
          Math.min(100, Math.round(s.totalAnswers / 5)) + '%"></div></div>' +
      '</div>' +
    '</a>';
  }).join('');
}

function renderFeed(items) {
  var feed = document.getElementById('feed');
  var count = items.length;
  document.getElementById('feed-count').textContent =
    count ? (sc('共 ', '共 ') + count + sc(' 条', ' 條')) : '';
  if (!count) {
    feed.innerHTML = '<p style="color:var(--ink-3);font:var(--text-caption);">' +
      escapeHtml(sc('暂无待办，所有题目均已审核', '暫無待辦，所有題目均已審核')) + '</p>';
    return;
  }
  feed.innerHTML = items.map(function (q) {
    var when = window.JX.util.relativeTime(q.createdAt);
    return '<div class="feed-item">' +
      '<div class="feed-icon gold"><svg width="18" height="18" fill="none" stroke="var(--gold-dark)" stroke-width="1.8" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="12 6 12 12 16 14"/><circle cx="12" cy="12" r="10"/></svg></div>' +
      '<div class="feed-body">' +
        '<p class="feed-title">' + escapeHtml(sc('待审 · ', '待審 · ')) + escapeHtml(q.source || '—') + '</p>' +
        '<p class="feed-meta">' + escapeHtml(q.questionText) + '</p>' +
      '</div>' +
      '<span class="feed-time">' + escapeHtml(when) + '</span>' +
    '</div>';
  }).join('');
}

function boot() {
  renderPageSub();

  window.JX.api.get('/api/coach/classes')
    .then(function (memberships) {
      var items = Array.isArray(memberships) ? memberships : [];
      // 并行拉每班统计
      return Promise.all(items.map(function (m) {
        return window.JX.api.get('/api/coach/classes/' + encodeURIComponent(m.classId) + '/stats?windowDays=7')
          .then(function (s) { return { classId: m.classId, stats: s }; })
          .catch(function () { return { classId: m.classId, stats: null }; });
      })).then(function (results) {
        var statsMap = {};
        results.forEach(function (r) { statsMap[r.classId] = r.stats; });
        renderKpis(items, results.map(function (r) { return r.stats; }));
        renderClassCards(items, statsMap);
      });
    })
    .catch(function (err) {
      document.getElementById('class-grid').innerHTML =
        '<p style="color:var(--crimson);">' +
        escapeHtml(sc('加载失败：', '加載失敗：') + (err.message || err)) + '</p>';
    });

  window.JX.api.get('/api/coach/questions?limit=200')
    .then(function (list) {
      var pending = (list || []).filter(function (q) { return q.reviewStatus === 'pending'; }).slice(0, 8);
      renderFeed(pending);
    })
    .catch(function () { renderFeed([]); });
}

document.getElementById('btn-logout').addEventListener('click', function () {
  if (!confirm(sc('确定退出登录？', '確定退出登入？'))) return;
  window.JX.api.logout().finally(function () { location.replace('auth.html'); });
});

document.addEventListener('jx:user-ready', boot);
document.addEventListener('langchange', boot);
if (window.JX && window.JX.user) boot();
</script>
