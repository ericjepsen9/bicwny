<style>
.side-avatar { background: linear-gradient(135deg, var(--crimson-light), var(--crimson)); }

.filter-bar {
  display: flex; align-items: center; gap: var(--sp-3); flex-wrap: wrap;
  margin-bottom: var(--sp-4); padding: var(--sp-3) var(--sp-4);
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg);
}
.fchip {
  padding: 5px 14px; border-radius: var(--r-pill);
  font: var(--text-caption); font-weight: 600; letter-spacing: 1px;
  background: rgba(43,34,24,.05); border: 1px solid transparent; color: var(--ink-3);
  cursor: pointer; transition: all var(--dur) var(--ease);
}
.fchip.active { background: var(--saffron-pale); border-color: var(--saffron-light); color: var(--saffron-dark); }
.fsearch {
  flex: 1; min-width: 200px;
  padding: 6px 12px; border-radius: var(--r-pill);
  border: 1px solid var(--border); background: #fff;
  font: var(--text-caption); color: var(--ink); outline: none;
}
.fcount { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px; margin-left: auto; }

.list-panel {
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg); overflow: hidden;
}
table.a-list { width: 100%; border-collapse: collapse; }
.a-list th, .a-list td {
  padding: 10px 14px; text-align: left; vertical-align: top;
  font: var(--text-caption); letter-spacing: .5px;
  border-bottom: 1px solid var(--border-light);
}
.a-list th { color: var(--ink-3); font-weight: 600; background: rgba(43,34,24,.03); white-space: nowrap; }
.a-list td { color: var(--ink-2); }
.a-list tr:last-child td { border-bottom: 0; }
.a-list tr.expanded { background: rgba(224,120,86,.04); }
.a-list tr[data-row] { cursor: pointer; }
.a-list tr[data-row]:hover { background: rgba(224,120,86,.04); }

.action-tag {
  display: inline-block; padding: 2px 8px; border-radius: var(--r-pill);
  font-size: .6875rem; font-weight: 600; letter-spacing: 1px;
  background: var(--saffron-pale); color: var(--saffron-dark);
}
.action-tag.danger { background: var(--crimson-light); color: var(--crimson); }
.action-tag.ok     { background: var(--sage-light);     color: var(--sage-dark); }

.detail-row td {
  padding: 0 14px 12px;
  background: rgba(43,34,24,.03);
}
.detail-diff {
  display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3);
  padding: var(--sp-3); border-radius: var(--r);
  background: #fff; border: 1px solid var(--border-light);
  font-family: 'SF Mono', Consolas, monospace; font-size: .75rem;
}
.detail-diff h5 {
  font-family: var(--font-sans); font-weight: 700; font-size: .6875rem;
  letter-spacing: 1.5px; color: var(--ink-3); margin-bottom: 6px;
}
.detail-diff pre {
  white-space: pre-wrap; word-break: break-word;
  color: var(--ink); font-size: .75rem; line-height: 1.5;
}
.detail-diff .before h5 { color: var(--crimson); }
.detail-diff .after  h5 { color: var(--sage-dark); }

.empty-state { padding: var(--sp-8) var(--sp-5); text-align: center; color: var(--ink-3); font: var(--text-caption); letter-spacing: 1px; }
.err-state { color: var(--crimson); }

.load-more {
  width: 100%; padding: 12px; border: 0; border-top: 1px solid var(--border-light);
  background: rgba(255,255,255,.5); color: var(--saffron-dark);
  font: var(--text-caption); font-weight: 600; letter-spacing: 1px; cursor: pointer;
}
.load-more:hover { background: var(--saffron-pale); }
.load-more[disabled] { opacity: .5; cursor: default; }

<script>
// admin-audit · GET /api/admin/audit
// 过滤：action chip · adminId / targetId 搜索（简单 contains 前端过滤不做）
// 展开：点行切换 before/after JSON diff
var sc = window.JX.sc, escapeHtml = window.JX.util.escapeHtml;

var state = {
  action: '',
  searchType: null, // 'adminId' | 'targetId' · 从搜索值猜
  searchVal: '',
  limit: 50,
  cursor: null,
  items: [],
  hasMore: false,
  expandedId: null,
};

function fmtTime(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  var pad = function (n) { return n < 10 ? '0' + n : String(n); };
  return pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' +
    pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function actionClass(a) {
  if (/deactivate|reject|archive|delete/i.test(a)) return 'danger';
  if (/activate|approve|restore/i.test(a)) return 'ok';
  return '';
}

function buildQS() {
  var qs = ['limit=' + state.limit];
  if (state.action) qs.push('action=' + encodeURIComponent(state.action));
  if (state.cursor) qs.push('cursor=' + encodeURIComponent(state.cursor));
  if (state.searchVal) {
    // 用户输入较短 → 默认当 targetId；包含 cmk 开头可能是 adminId cuid
    if (state.searchVal.length > 10) qs.push('adminId=' + encodeURIComponent(state.searchVal));
    else qs.push('targetId=' + encodeURIComponent(state.searchVal));
  }
  return qs.join('&');
}

function render() {
  var body = document.getElementById('list-body');
  var loadMore = document.getElementById('load-more');

  if (!state.items.length) {
    body.innerHTML = '<div class="empty-state">' +
      escapeHtml(sc('暂无审计记录', '暫無審計記錄')) + '</div>';
    loadMore.style.display = 'none';
    document.getElementById('filter-count').textContent = '0';
    return;
  }

  var rows = state.items.map(function (it) {
    var expanded = state.expandedId === it.id;
    var detailRow = '';
    if (expanded) {
      var beforeStr = JSON.stringify(it.before || {}, null, 2);
      var afterStr = JSON.stringify(it.after || {}, null, 2);
      detailRow =
        '<tr class="detail-row"><td colspan="5">' +
          '<div class="detail-diff">' +
            '<div class="before"><h5>BEFORE</h5><pre>' + escapeHtml(beforeStr) + '</pre></div>' +
            '<div class="after"><h5>AFTER</h5><pre>' + escapeHtml(afterStr) + '</pre></div>' +
          '</div>' +
        '</td></tr>';
    }
    return ''
      + '<tr data-row data-id="' + escapeHtml(it.id) + '"' + (expanded ? ' class="expanded"' : '') + '>'
      +   '<td style="white-space:nowrap;color:var(--ink-3);">' + fmtTime(it.timestamp) + '</td>'
      +   '<td style="white-space:nowrap;color:var(--ink-3);font-family:\'SF Mono\',Consolas,monospace;font-size:.75rem;">' + escapeHtml(it.adminId || '—') + '</td>'
      +   '<td><span class="action-tag ' + actionClass(it.action) + '">' + escapeHtml(it.action || '—') + '</span></td>'
      +   '<td style="font-family:\'SF Mono\',Consolas,monospace;font-size:.75rem;">'
      +     '<span style="color:var(--ink-4);">' + escapeHtml(it.targetType || '—') + ':</span> '
      +     escapeHtml(it.targetId || '—')
      +   '</td>'
      +   '<td style="width:30px;color:var(--ink-4);">' + (expanded ? '▾' : '▸') + '</td>'
      + '</tr>'
      + detailRow;
  });

  body.innerHTML =
    '<table class="a-list"><thead><tr>' +
      '<th><span class="sc">时间</span><span class="tc">時間</span></th>' +
      '<th>Admin ID</th>' +
      '<th><span class="sc">动作</span><span class="tc">動作</span></th>' +
      '<th><span class="sc">目标</span><span class="tc">目標</span></th>' +
      '<th></th>' +
    '</tr></thead><tbody>' + rows.join('') + '</tbody></table>';

  body.querySelectorAll('tr[data-row]').forEach(function (tr) {
    tr.addEventListener('click', function () {
      var id = tr.getAttribute('data-id');
      state.expandedId = (state.expandedId === id) ? null : id;
      render();
    });
  });

  document.getElementById('filter-count').textContent = state.items.length + (state.hasMore ? '+' : '');
  loadMore.style.display = state.hasMore ? '' : 'none';
}

function fetchPage(append) {
  window.JX.api.get('/api/admin/audit?' + buildQS()).then(function (data) {
    var batch = data || [];
    state.items = append ? state.items.concat(batch) : batch;
    state.hasMore = batch.length === state.limit;
    state.cursor = state.hasMore ? batch[batch.length - 1].id : null;
    render();
  }).catch(function (err) {
    document.getElementById('list-body').innerHTML =
      '<div class="empty-state err-state">' + escapeHtml((err && err.message) || sc('加载失败', '載入失敗')) + '</div>';
  });
}

// 筛选 chip
document.querySelectorAll('.fchip').forEach(function (chip) {
  chip.addEventListener('click', function () {
    document.querySelectorAll('.fchip').forEach(function (c) { c.classList.remove('active'); });
    chip.classList.add('active');
    state.action = chip.getAttribute('data-action') || '';
    state.cursor = null;
    fetchPage(false);
  });
});

// 搜索 · 简单 debounce
var searchTimer;
document.getElementById('search-input').addEventListener('input', function (e) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function () {
    state.searchVal = (e.target.value || '').trim();
    state.cursor = null;
    fetchPage(false);
  }, 300);
});

// 加载更多
document.getElementById('load-more').addEventListener('click', function () { fetchPage(true); });

// 退出登录
document.getElementById('btn-logout').addEventListener('click', function () {
  window.JX.api.logout().finally(function () { location.replace('../mobile/auth.html'); });
});

// 初始加载
document.addEventListener('jx:user-ready', function () { fetchPage(false); });
if (window.JX && window.JX.user) fetchPage(false);
</script>
