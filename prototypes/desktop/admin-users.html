<style>
.side-avatar { background: linear-gradient(135deg, var(--crimson-light), var(--crimson)); }

.filter-bar {
  display: flex; align-items: center; gap: var(--sp-3); flex-wrap: wrap;
  margin-bottom: var(--sp-4); padding: var(--sp-3) var(--sp-4);
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg);
}
.fchips { display: flex; gap: var(--sp-2); }
.fchip {
  padding: 5px 14px; border-radius: var(--r-pill);
  font: var(--text-caption); font-weight: 600; letter-spacing: 1px;
  background: rgba(43,34,24,.05); border: 1px solid transparent; color: var(--ink-3);
  cursor: pointer; transition: all var(--dur) var(--ease);
}
.fchip.active { background: var(--saffron-pale); border-color: var(--saffron-light); color: var(--saffron-dark); }
.fsearch {
  flex: 1; min-width: 200px;
  padding: 6px 12px; border-radius: var(--r-pill);
  border: 1px solid var(--border); background: #fff;
  font: var(--text-caption); color: var(--ink); outline: none;
}
.fcount { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px; margin-left: auto; }

.list-panel {
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg); overflow: hidden;
}
table.u-list { width: 100%; border-collapse: collapse; }
.u-list th, .u-list td {
  padding: 10px 14px; text-align: left;
  font: var(--text-caption); letter-spacing: .5px;
  border-bottom: 1px solid var(--border-light);
}
.u-list th { color: var(--ink-3); font-weight: 600; background: rgba(43,34,24,.03); }
.u-list td { color: var(--ink-2); }
.u-list tr:last-child td { border-bottom: 0; }
.u-list tr[data-row]:hover { background: rgba(224,120,86,.04); cursor: pointer; }
.u-user-cell { display: flex; align-items: center; gap: 10px; }
.u-av {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: .75rem; letter-spacing: .5px;
  flex-shrink: 0;
}
.u-role {
  display: inline-block; padding: 2px 8px; border-radius: var(--r-pill);
  font-size: .6875rem; letter-spacing: 1px; font-weight: 600;
}
.u-role.admin   { background: var(--crimson-light);  color: var(--crimson); }
.u-role.coach   { background: var(--gold-pale);      color: var(--gold-dark); }
.u-role.student { background: rgba(43,34,24,.06);    color: var(--ink-3); }

.load-more {
  width: 100%; padding: 12px; border: 0; border-top: 1px solid var(--border-light);
  background: rgba(43,34,24,.02); color: var(--ink-3); cursor: pointer;
  font: var(--text-caption); letter-spacing: 2px; font-weight: 600;
}
.load-more:hover:not([disabled]) { background: rgba(224,120,86,.06); color: var(--saffron-dark); }
.load-more[disabled] { opacity: .5; cursor: default; }

.empty-state { padding: var(--sp-8) var(--sp-5); text-align: center; color: var(--ink-3); font: var(--text-caption); letter-spacing: 1px; }
.err-state { color: var(--crimson); }
</style>

<body>

      </a>

  <main class="main">
    <div class="top-bar">
      <div>
        <h1 class="page-title"><span class="sc">用户管理</span><span class="tc">用戶管理</span></h1>
        <p class="page-sub"><span class="sc">按注册时间倒序 · 游标分页</span><span class="tc">按註冊時間倒序 · 游標分頁</span></p>
      </div>
      <div class="top-actions">
        <button class="lang-btn" onclick="toggleLang()">繁</button>
      </div>
    </div>

    <div class="filter-bar">
      <div class="fchips" id="role-chips">
        <span class="fchip active" data-role=""><span class="sc">全部</span><span class="tc">全部</span></span>
        <span class="fchip" data-role="student"><span class="sc">学员</span><span class="tc">學員</span></span>
        <span class="fchip" data-role="coach"><span class="sc">辅导员</span><span class="tc">輔導員</span></span>
        <span class="fchip" data-role="admin"><span class="sc">管理员</span><span class="tc">管理員</span></span>
      </div>
      <input class="fsearch" id="search-input" type="search"
        data-ph-sc="搜索邮箱或法名" data-ph-tc="搜索郵箱或法名" placeholder="搜索邮箱或法名">
      <span class="fcount" id="filter-count">—</span>
    </div>

    <div class="list-panel">

<script>
// admin-users · 2a 骨架：/api/admin/users 分页 + 筛选
var sc = window.JX.sc, escapeHtml = window.JX.util.escapeHtml;
var PAGE_SIZE = 50;

var ROLE_LABELS = {
  student: ['学员', '學員'],
  coach:   ['辅导员', '輔導員'],
  admin:   ['管理员', '管理員'],
};
function roleLabel(r) { var m = ROLE_LABELS[r] || [r, r]; return sc(m[0], m[1]); }

var state = {
  all: [],          // 已加载的用户累积
  roleFilter: '',
  search: '',
  cursor: null,
  done: false,      // 是否还有更多
  fetching: false,
};

function userRow(u) {
  var nm = u.dharmaName || (u.email ? u.email.split('@')[0] : '—');
  var initial = (nm.charAt(0) || '·').toUpperCase();
  var bgColors = {
    admin: 'linear-gradient(135deg,var(--crimson-light),var(--crimson))',
    coach: 'linear-gradient(135deg,var(--gold-light),var(--gold))',
    student: 'linear-gradient(135deg,var(--saffron),var(--saffron-dark))',
  };
  var bg = bgColors[u.role] || bgColors.student;
  var statusPill = u.isActive
    ? '<span class="status-pill status-active">' + escapeHtml(sc('活跃', '活躍')) + '</span>'
    : '<span class="status-pill status-blocked">' + escapeHtml(sc('已禁用', '已禁用')) + '</span>';
  return '<tr data-row data-uid="' + escapeHtml(u.id) + '">' +
    '<td><div class="u-user-cell"><div class="u-av" style="background:' + bg + ';">' + escapeHtml(initial) + '</div>' +
      '<span>' + escapeHtml(nm) + '</span></div></td>' +
    '<td><code style="font-size:.6875rem;color:var(--ink-3);">' + escapeHtml(u.email || '—') + '</code></td>' +
    '<td><span class="u-role ' + u.role + '">' + escapeHtml(roleLabel(u.role)) + '</span></td>' +
    '<td>' + escapeHtml(window.JX.util.relativeTime(u.createdAt)) + '</td>' +
    '<td>' + escapeHtml(u.lastLoginAt ? window.JX.util.relativeTime(u.lastLoginAt) : sc('—', '—')) + '</td>' +
    '<td>' + statusPill + '</td>' +
  '</tr>';
}

function renderList() {
  document.getElementById('filter-count').textContent =
    sc('已加载 ', '已加載 ') + state.all.length + sc(' 名', ' 名');
  var body = document.getElementById('list-body');
  if (!state.all.length) {
    body.innerHTML = '<div class="empty-state">' + escapeHtml(sc('无结果', '無結果')) + '</div>';
    return;
  }
  body.innerHTML =
    '<table class="u-list"><thead><tr>' +
      '<th>' + escapeHtml(sc('用户', '用戶')) + '</th>' +
      '<th>' + escapeHtml(sc('邮箱', '郵箱')) + '</th>' +
      '<th>' + escapeHtml(sc('角色', '角色')) + '</th>' +
      '<th>' + escapeHtml(sc('注册时间', '註冊時間')) + '</th>' +
      '<th>' + escapeHtml(sc('上次登录', '上次登錄')) + '</th>' +
      '<th>' + escapeHtml(sc('状态', '狀態')) + '</th>' +
    '</tr></thead><tbody>' +
      state.all.map(userRow).join('') +
    '</tbody></table>';

  var more = document.getElementById('load-more');
  more.style.display = state.done ? 'none' : '';
  more.disabled = state.fetching;
  more.innerHTML = state.fetching
    ? '<span class="sc">加载中…</span><span class="tc">加載中…</span>'
    : '<span class="sc">加载更多</span><span class="tc">加載更多</span>';
}

function showErr(msg) {
  document.getElementById('list-body').innerHTML =
    '<div class="empty-state err-state">' + escapeHtml(msg) + '</div>';
  document.getElementById('load-more').style.display = 'none';
}

function fetchPage(reset) {
  if (state.fetching) return;
  if (!reset && state.done) return;
  state.fetching = true;
  if (!reset) renderList();

  var qs = ['limit=' + PAGE_SIZE];
  if (state.roleFilter) qs.push('role=' + encodeURIComponent(state.roleFilter));
  if (state.search) qs.push('search=' + encodeURIComponent(state.search));
  if (!reset && state.cursor) qs.push('cursor=' + encodeURIComponent(state.cursor));

  window.JX.api.get('/api/admin/users?' + qs.join('&'))
    .then(function (list) {
      list = Array.isArray(list) ? list : [];
      if (reset) state.all = [];
      state.all = state.all.concat(list);
      state.cursor = list.length ? list[list.length - 1].id : state.cursor;
      state.done = list.length < PAGE_SIZE;
      state.fetching = false;
      renderList();
    })
    .catch(function (err) {
      state.fetching = false;
      showErr(sc('加载失败：', '加載失敗：') + (err && err.message || err));
    });
}

function resetAndFetch() {
  state.cursor = null;
  state.done = false;
  state.all = [];
  fetchPage(true);
}

// Filters
document.getElementById('role-chips').addEventListener('click', function (ev) {
  var chip = ev.target.closest('.fchip');
  if (!chip) return;
  document.querySelectorAll('#role-chips .fchip').forEach(function (c) { c.classList.remove('active'); });
  chip.classList.add('active');
  state.roleFilter = chip.getAttribute('data-role') || '';
  resetAndFetch();
});
var searchDebounce;
document.getElementById('search-input').addEventListener('input', function (ev) {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(function () {
    state.search = ev.target.value.trim();
    resetAndFetch();
  }, 250);
});
document.getElementById('load-more').addEventListener('click', function () { fetchPage(false); });

// 行点击 → 2b drawer（占位）
document.getElementById('list-body').addEventListener('click', function (ev) {
  var tr = ev.target.closest('tr[data-row]');
  if (!tr) return;
  // 待 2b 实装
  console.log('[admin-users] click uid=' + tr.getAttribute('data-uid'));
});

document.getElementById('btn-logout').addEventListener('click', function () {
  if (!confirm(sc('确定退出登录？', '確定退出登入？'))) return;
  window.JX.api.logout().finally(function () { location.replace('../mobile/auth.html'); });
});

document.addEventListener('jx:user-ready', resetAndFetch);
document.addEventListener('langchange', renderList);
if (window.JX && window.JX.user) resetAndFetch();
</script>
</body>
