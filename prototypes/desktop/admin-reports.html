<style>
.side-avatar { background: linear-gradient(135deg, var(--crimson-light), var(--crimson)); }

.filter-bar {
  display: flex; align-items: center; gap: var(--sp-3); flex-wrap: wrap;
  margin-bottom: var(--sp-4); padding: var(--sp-3) var(--sp-4);
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg);
}
.fchips { display: flex; gap: var(--sp-2); flex-wrap: wrap; }
.fchip {
  padding: 5px 14px; border-radius: var(--r-pill);
  font: var(--text-caption); font-weight: 600; letter-spacing: 1px;
  background: rgba(43,34,24,.05); border: 1px solid transparent; color: var(--ink-3);
  cursor: pointer; transition: all var(--dur) var(--ease);
}
.fchip.active { background: var(--saffron-pale); border-color: var(--saffron-light); color: var(--saffron-dark); }
.fcount { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px; margin-left: auto; }

.list-panel {
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg); overflow: hidden;
}
.r-item {
  display: grid;
  grid-template-columns: 140px 120px 1fr 180px;
  gap: var(--sp-3);
  padding: var(--sp-4);
  border-bottom: 1px solid var(--border-light);
  align-items: flex-start;
}
.r-item:last-child { border-bottom: 0; }
.r-time { font: var(--text-caption); color: var(--ink-3); letter-spacing: .5px; }
.r-time .when { color: var(--ink-2); }
.r-reason {
  display: inline-block; padding: 3px 10px; border-radius: var(--r-pill);
  font-size: .6875rem; font-weight: 600; letter-spacing: 1px;
  background: var(--saffron-pale); color: var(--saffron-dark);
}
.r-reason.wrong_answer    { background: var(--crimson-light); color: var(--crimson); }
.r-reason.sensitive       { background: #F3D4D1; color: #8B1E17; }
.r-reason.doctrine_error  { background: var(--gold-pale); color: var(--gold-dark); }
.r-reason.typo            { background: rgba(43,34,24,.08); color: var(--ink-3); }
.r-reason.other           { background: var(--saffron-pale); color: var(--saffron-dark); }

.r-detail { font: var(--text-caption); color: var(--ink-2); letter-spacing: .5px; line-height: 1.7; }
.r-detail .qid {
  font-family: 'SF Mono', Consolas, monospace; font-size: .75rem;
  color: var(--ink-3); background: rgba(43,34,24,.05);
  padding: 2px 8px; border-radius: var(--r-sm); cursor: pointer;
}
.r-detail .qid:hover { background: var(--saffron-pale); color: var(--saffron-dark); }
.r-detail .qtext {
  display: block; margin-top: 8px; padding: 10px 12px;
  background: #fff; border: 1px solid var(--border-light); border-radius: var(--r-sm);
  font: var(--text-body); color: var(--ink); letter-spacing: .5px;
}
.r-detail .note { margin-top: 6px; font-style: italic; color: var(--ink-3); }

.r-actions { display: flex; gap: var(--sp-2); align-items: flex-start; justify-content: flex-end; }
.r-btn {
  padding: 6px 14px; border-radius: var(--r-pill);
  font: var(--text-caption); font-weight: 700; letter-spacing: 1px;
  cursor: pointer; transition: all var(--dur) var(--ease);
  border: 1px solid;
}
.r-btn.accept { background: var(--sage-light); color: var(--sage-dark); border-color: var(--sage); }
.r-btn.accept:hover { background: var(--sage); color: #fff; }
.r-btn.reject { background: transparent; color: var(--ink-3); border-color: var(--border); }
.r-btn.reject:hover { color: var(--crimson); border-color: var(--crimson); }
.r-btn[aria-busy="true"] { opacity: .5; pointer-events: none; }

.empty-state { padding: var(--sp-8) var(--sp-5); text-align: center; color: var(--ink-3); font: var(--text-caption); letter-spacing: 1px; }
.err-state { color: var(--crimson); }

<script>
// admin-reports · GET /api/admin/reports/pending
// POST /api/admin/reports/:id/handle { decision, note }
//   accept = 举报成立（题目会被平台侧后续处理 / 下架）
//   reject = 举报不成立
var sc = window.JX.sc, escapeHtml = window.JX.util.escapeHtml;

var state = {
  reason: '',
  items: [],
  // 缓存已加载的题目内容，避免重复拉 /api/questions/:id
  qCache: {},
};

var REASON_LABELS = {
  wrong_answer:   ['答案错误', '答案錯誤'],
  doctrine_error: ['教义错误', '教義錯誤'],
  sensitive:      ['涉敏', '涉敏'],
  typo:           ['错别字', '錯別字'],
  other:          ['其他', '其他'],
};

function fmtTime(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  var pad = function (n) { return n < 10 ? '0' + n : String(n); };
  return pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' +
    pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function relAge(iso) {
  if (!iso) return '';
  var diff = Date.now() - new Date(iso).getTime();
  var h = Math.floor(diff / 3600000);
  if (h < 1) return sc('不到 1 小时', '不到 1 小時');
  if (h < 24) return h + sc(' 小时前', ' 小時前');
  return Math.floor(h / 24) + sc(' 天前', ' 天前');
}

function render() {
  var body = document.getElementById('list-body');
  document.getElementById('filter-count').textContent = state.items.length + sc(' 条待处理', ' 條待處理');

  if (!state.items.length) {
    body.innerHTML = '<div class="empty-state">' +
      escapeHtml(sc('暂无待处理举报', '暫無待處理舉報')) + '</div>';
    return;
  }

  body.innerHTML = state.items.map(function (r) {
    var label = REASON_LABELS[r.reason] || [r.reason, r.reason];
    var qText = state.qCache[r.questionId];
    return ''
      + '<div class="r-item" data-rid="' + escapeHtml(r.id) + '">'
      +   '<div class="r-time">'
      +     '<div class="when">' + fmtTime(r.createdAt) + '</div>'
      +     '<div>' + relAge(r.createdAt) + '</div>'
      +   '</div>'
      +   '<div><span class="r-reason ' + escapeHtml(r.reason) + '">' + label[0] + '</span></div>'
      +   '<div class="r-detail">'
      +     (r.details ? '<div>' + escapeHtml(r.details) + '</div>' : '<div style="color:var(--ink-4);">' + sc('（无补充说明）', '（無補充說明）') + '</div>')
      +     '<div style="margin-top:6px;">'
      +       sc('题目 ', '題目 ') + '<span class="qid" data-qid="' + escapeHtml(r.questionId) + '">' + escapeHtml(r.questionId) + '</span>'
      +     '</div>'
      +     (qText
        ? '<div class="qtext">' + escapeHtml(qText) + '</div>'
        : '')
      +     '<div class="note">' + sc('举报人 ', '舉報人 ') + escapeHtml(r.userId || '—') + '</div>'
      +   '</div>'
      +   '<div class="r-actions">'
      +     '<button class="r-btn accept" data-action="accept" data-rid="' + escapeHtml(r.id) + '">'
      +       sc('✓ 成立', '✓ 成立') + '</button>'
      +     '<button class="r-btn reject" data-action="reject" data-rid="' + escapeHtml(r.id) + '">'
      +       sc('✗ 不成立', '✗ 不成立') + '</button>'
      +   '</div>'
      + '</div>';
  }).join('');

  // 点 qid → 拉题目详情并注入
  body.querySelectorAll('.qid[data-qid]').forEach(function (el) {
    el.addEventListener('click', function (ev) {
      ev.stopPropagation();
      var qid = el.getAttribute('data-qid');
      if (state.qCache[qid]) return; // 已展开
      window.JX.api.get('/api/questions/' + encodeURIComponent(qid)).then(function (q) {
        state.qCache[qid] = q.questionText || '(无题干)';
        render();
      }).catch(function (err) {
        state.qCache[qid] = sc('（题目加载失败：', '（題目載入失敗：') + ((err && err.message) || '') + '）';
        render();
      });
    });
  });

  // 处理按钮
  body.querySelectorAll('.r-btn[data-action]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      if (btn.getAttribute('aria-busy') === 'true') return;
      var rid = btn.getAttribute('data-rid');
      var action = btn.getAttribute('data-action');
      var noteMsg = action === 'accept'
        ? sc('可选 · 备注(写给自己或下一位 admin)：', '可選 · 備註(寫給自己或下一位 admin)：')
        : sc('可选 · 驳回原因：', '可選 · 駁回原因：');
      var note = prompt(noteMsg) || '';
      btn.setAttribute('aria-busy', 'true');
      window.JX.api.post('/api/admin/reports/' + encodeURIComponent(rid) + '/handle', {
        decision: action, note: note,
      }).then(function () {
        // 本地移除（乐观）+ 重新拉
        state.items = state.items.filter(function (r) { return r.id !== rid; });
        render();
      }).catch(function (err) {
        alert(sc('处理失败：', '處理失敗：') + ((err && err.message) || err));
        btn.removeAttribute('aria-busy');
      });
    });
  });
}

function loadReports() {
  var qs = [];
  if (state.reason) qs.push('reason=' + encodeURIComponent(state.reason));
  qs.push('limit=200');
  window.JX.api.get('/api/admin/reports/pending?' + qs.join('&')).then(function (data) {
    state.items = data || [];
    render();
  }).catch(function (err) {
    document.getElementById('list-body').innerHTML =
      '<div class="empty-state err-state">' +
      escapeHtml((err && err.message) || sc('加载失败', '載入失敗')) + '</div>';
  });
}

// Reason chips
document.querySelectorAll('.fchip[data-reason]').forEach(function (chip) {
  chip.addEventListener('click', function () {
    document.querySelectorAll('.fchip[data-reason]').forEach(function (c) { c.classList.remove('active'); });
    chip.classList.add('active');
    state.reason = chip.getAttribute('data-reason') || '';
    loadReports();
  });
});

// 退出登录
document.getElementById('btn-logout').addEventListener('click', function () {
  window.JX.api.logout().finally(function () { location.replace('auth.html'); });
});

// 初始加载
document.addEventListener('jx:user-ready', loadReports);
if (window.JX && window.JX.user) loadReports();
</script>
