<style>
/* Filter bar */
.filter-bar {
  display: flex; align-items: center; gap: var(--sp-3); flex-wrap: wrap;
  margin-bottom: var(--sp-4); padding: var(--sp-3) var(--sp-4);
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg);
}
.fchips { display: flex; gap: var(--sp-2); }
.fchip {
  padding: 5px 14px; border-radius: var(--r-pill);
  font: var(--text-caption); font-weight: 600; letter-spacing: 1px;
  background: rgba(43,34,24,.05); border: 1px solid transparent;
  color: var(--ink-3); cursor: pointer; transition: all var(--dur) var(--ease);
  user-select: none;
}
.fchip.active { background: var(--saffron-pale); border-color: var(--saffron-light); color: var(--saffron-dark); }
.fsel {
  padding: 6px 10px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: #fff;
  font: var(--text-caption); color: var(--ink); letter-spacing: 1px; outline: none;
}
.fsearch {
  flex: 1; min-width: 200px;
  padding: 6px 12px; border-radius: var(--r-pill);
  border: 1px solid var(--border); background: #fff;
  font: var(--text-caption); color: var(--ink); outline: none;
}
.fcount { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px; margin-left: auto; }

/* List table */
.list-panel {
  background: var(--glass-thick); border: 1px solid var(--glass-border);
  border-radius: var(--r-lg); overflow: hidden;
}
table.q-list { width: 100%; border-collapse: collapse; }
.q-list th, .q-list td {
  padding: 10px 14px; text-align: left;
  font: var(--text-caption); letter-spacing: .5px;
  border-bottom: 1px solid var(--border-light);
}
.q-list th { color: var(--ink-3); font-weight: 600; background: rgba(43,34,24,.03); }
.q-list td { color: var(--ink-2); }
.q-list tr:last-child td { border-bottom: 0; }
.q-list tr[data-row]:hover { background: rgba(224,120,86,.04); cursor: pointer; }
.q-stem-cell { color: var(--ink); font-weight: 500; }
.q-type-badge {
  display: inline-block; padding: 2px 8px; border-radius: var(--r-pill);
  background: rgba(43,34,24,.06); font-size: .6875rem; letter-spacing: 1px;
}
.q-status { padding: 2px 10px; border-radius: var(--r-pill); font-size: .6875rem; font-weight: 700; letter-spacing: 1px; }
.q-status.pending  { background: var(--gold-pale);    color: var(--gold-dark); }
.q-status.approved { background: var(--sage-light);    color: var(--sage-dark); }
.q-status.rejected { background: var(--crimson-light); color: var(--crimson); }
.q-vis { font-size: .6875rem; color: var(--ink-4); letter-spacing: 1px; }

.empty-state {
  padding: var(--sp-8) var(--sp-5);
  text-align: center; color: var(--ink-3); font: var(--text-caption); letter-spacing: 1px;
}
.err-state { color: var(--crimson); }

/* Drawer */
.drawer-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.35);
  opacity: 0; pointer-events: none; transition: opacity .2s var(--ease); z-index: 90;
}
.drawer-backdrop.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 480px; max-width: 92vw;
  background: #fff; box-shadow: -8px 0 24px rgba(0,0,0,.12);
  transform: translateX(100%); transition: transform .25s var(--ease);
  overflow: hidden; display: flex; flex-direction: column; z-index: 100;
}
.drawer.open { transform: translateX(0); }
.drawer-head {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-4) var(--sp-5);
  border-bottom: 1px solid var(--border-light);
}
.drawer-title { flex: 1; font-family: var(--font-serif); font-weight: 700; color: var(--ink); letter-spacing: 2px; }
.drawer-close {
  width: 28px; height: 28px; border-radius: var(--r-sm);
  background: rgba(43,34,24,.04); border: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.drawer-body { flex: 1; overflow-y: auto; padding: var(--sp-5); }
.drawer-foot {
  display: flex; gap: var(--sp-3); justify-content: flex-end;
  padding: var(--sp-4) var(--sp-5);
  border-top: 1px solid var(--border-light);
  background: rgba(43,34,24,.02);
}
.drawer h3 {
  font: var(--text-caption); font-weight: 700; letter-spacing: 2px;
  color: var(--ink-3); margin: var(--sp-4) 0 var(--sp-2);
}
.drawer h3:first-child { margin-top: 0; }
.dr-stem { font: var(--text-body-serif); color: var(--ink); line-height: 1.75; letter-spacing: 1px; }
.dr-meta { font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px; display: flex; flex-wrap: wrap; gap: var(--sp-3); }
.dr-meta b { color: var(--ink-2); font-weight: 600; }
.dr-opt {
  display: flex; gap: 10px; padding: 10px 14px; margin-bottom: 8px;
  background: rgba(43,34,24,.03); border-radius: var(--r-sm);
  font: var(--text-caption); color: var(--ink); letter-spacing: 1px;
}
.dr-opt.correct { background: var(--sage-light); border-left: 3px solid var(--sage-dark); color: var(--ink); }
.dr-letter { font-weight: 700; width: 20px; flex-shrink: 0; }
.dr-code {
  display: block; padding: var(--sp-3);
  background: rgba(43,34,24,.04); border-radius: var(--r-sm);
  font-family: 'SF Mono', ui-monospace, monospace; font-size: .75rem;
  color: var(--ink-2); white-space: pre-wrap; word-break: break-all;
}
.btn-danger {
  padding: 7px 16px; border-radius: var(--r-sm);
  background: var(--crimson); color: #fff; border: 0;
  font: var(--text-caption); font-weight: 700; letter-spacing: 1px; cursor: pointer;
}
.btn-danger[disabled] { opacity: .5; cursor: not-allowed; }
.btn-ghost-s {
  padding: 7px 16px; border-radius: var(--r-sm);
  background: transparent; color: var(--ink-2); border: 1px solid var(--border);
  font: var(--text-caption); font-weight: 600; letter-spacing: 1px; cursor: pointer;
}
.dr-err { color: var(--crimson); font: var(--text-caption); letter-spacing: 1px; margin-top: var(--sp-3); }

/* Form fields */
.f-row { margin-bottom: var(--sp-4); }
.f-row label { display: block; font: var(--text-caption); color: var(--ink-3); letter-spacing: 2px; font-weight: 600; margin-bottom: 6px; }
.f-input, .f-area, .f-sel {
  width: 100%; padding: 8px 12px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: #fff;
  font: var(--text-body); color: var(--ink); letter-spacing: .5px; outline: none; font-family: inherit;
}
.f-input:focus, .f-area:focus, .f-sel:focus { border-color: var(--saffron); }
.f-area { min-height: 70px; resize: vertical; }
.f-row-split { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--sp-3); }
.f-opt-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
.f-opt-row input[type=text] { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--r-sm); font: var(--text-caption); outline: none; font-family: inherit; }
.f-opt-row input[type=text]:focus { border-color: var(--saffron); }
.f-opt-mark { display: flex; align-items: center; gap: 4px; font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px; padding: 0 4px; }
.f-opt-del { background: none; border: 0; color: var(--ink-4); cursor: pointer; font-size: 1rem; padding: 4px 6px; }
.f-opt-del:hover { color: var(--crimson); }
.f-add-opt {
  padding: 6px 12px; border-radius: var(--r-sm);
  background: var(--saffron-pale); color: var(--saffron-dark);
  border: 1px dashed var(--saffron-light); font: var(--text-caption); letter-spacing: 1px; cursor: pointer; margin-top: 6px;
}
.f-hint { font-size: .6875rem; color: var(--ink-4); letter-spacing: .5px; margin-top: 4px; }

/* Generate results */
.gen-summary {
  padding: var(--sp-4); border-radius: var(--r);
  background: var(--sage-light); border-left: 3px solid var(--sage-dark);
  font: var(--text-caption); letter-spacing: 1px; margin-bottom: var(--sp-4);
}
.gen-summary.has-err { background: var(--gold-pale); border-left-color: var(--gold-dark); }
.gen-skip-item {
  padding: 10px 14px; border-radius: var(--r-sm); margin-bottom: 6px;
  background: rgba(192,57,43,.06); border-left: 3px solid var(--crimson-light);
  font: var(--text-caption); color: var(--ink-2); letter-spacing: .5px;
}
.gen-ok-item {
  padding: 10px 14px; border-radius: var(--r-sm); margin-bottom: 6px;
  background: rgba(125,154,108,.08); border-left: 3px solid var(--sage);
  font: var(--text-caption); color: var(--ink-2); letter-spacing: .5px;
}
.gen-loading {
  padding: var(--sp-6); text-align: center;
  font: var(--text-caption); color: var(--ink-3); letter-spacing: 1px;
}
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--saffron-light); border-top-color: var(--saffron-dark); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
