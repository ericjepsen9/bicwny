services:
  postgres:
    image: postgres:16-alpine
    container_name: juexue-postgres
    environment:
      POSTGRES_USER: juexue
      POSTGRES_PASSWORD: juexue_dev
      POSTGRES_DB: juexue
    ports:
      - "5433:5432"
    volumes:
      - juexue_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juexue -d juexue"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  juexue_pg:
