# 觉学 · 自动依赖升级
# 每周一 02:00 UTC 扫描 · open PR 升级 patch / minor 版
# major 升级要人工 review · ignore-version 列表可加
version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    versioning-strategy: increase-if-necessary
    # 仅 patch + minor · major 自己来
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /e2e
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - e2e

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
