# 觉学 · 安全响应头 · 包含进 server { } 块
# P2 #28 · CSP / SRI / HSTS / Permissions-Policy / Referrer-Policy / X-* 旧标
#
# 用法（在 juexue.conf 或 staging.conf 的 server { } 内 include）：
#   include /etc/nginx/conf.d/juexue-security-headers.conf;
# 或者直接在 server { } 顶部 include 本文件相对路径
#
# 注意：
#   1. CSP 留 'unsafe-inline' 给 script/style 是为兼容当前 28 页大量内联
#      上线后逐步把内联脚本搬到 .js 文件 → 改 nonce/hash 模式收紧
#   2. CAPTCHA 当前未启用（CAPTCHA_PROVIDER=none）· 启用某家时打开对应注释
#   3. HSTS 仅在 HTTPS 启用后再加 · 否则 strict mode 子域名也拒绝走 HTTP
#   4. 所有 add_header 都用 always 后缀 · 让错误页 / 4xx 也带这些头

# ── HSTS · 强制 HTTPS · 启 HTTPS 后再打开 ──
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ── Content Security Policy ──
# default-src 'self'                  · 默认所有资源同源
# script-src · 'unsafe-inline' 是临时妥协 · 见上方说明
#   browser.sentry-cdn.com  · sentry.js 动态加载 SDK
#   challenges.cloudflare.com · Turnstile（CAPTCHA_PROVIDER=turnstile）
#   www.google.com/gstatic.com · reCAPTCHA（CAPTCHA_PROVIDER=recaptcha）
#   js.hcaptcha.com           · hCaptcha（CAPTCHA_PROVIDER=hcaptcha）
# style-src · Google Fonts CSS link 需要 fonts.googleapis.com
# font-src  · Google Fonts woff2 来自 fonts.gstatic.com
# img-src   · admin 上传 / blob (canvas) / data (内联 svg) / https (cover urls)
# connect-src · 自家 + sentry ingest（DSN host）
# frame-src · CAPTCHA iframe 嵌入
# worker-src · service-worker + 离线队列可能用 blob worker
# object-src 'none' · 全面禁 plugins
# base-uri 'self' · 防止 <base> 注入
# form-action 'self' · 表单只能提交回自家
# frame-ancestors 'none' · 不让别人 iframe 我们（替代旧 X-Frame-Options:DENY）
# upgrade-insecure-requests · 自动把 http: 升级到 https:
add_header Content-Security-Policy "
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://browser.sentry-cdn.com https://challenges.cloudflare.com https://www.google.com https://www.gstatic.com https://js.hcaptcha.com https://hcaptcha.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' https://fonts.gstatic.com;
  img-src 'self' data: blob: https:;
  connect-src 'self' https://*.ingest.sentry.io https://*.sentry.io;
  frame-src 'self' https://challenges.cloudflare.com https://www.google.com https://*.hcaptcha.com;
  worker-src 'self' blob:;
  manifest-src 'self';
  object-src 'none';
  base-uri 'self';
  form-action 'self';
  frame-ancestors 'none';
  upgrade-insecure-requests;
" always;

# ── 旧版浏览器仍然支持 X-Frame-Options · 与 frame-ancestors 重叠保险 ──
add_header X-Frame-Options "DENY" always;

# ── MIME sniffing 关 · 防止 .txt 被当 html 执行 ──
add_header X-Content-Type-Options "nosniff" always;

# ── Referrer 限制：跨站只发 origin · 同站发完整 path ──
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Permissions-Policy · 默认全部禁掉敏感 API ──
# camera / microphone / geolocation 暂时全站不需要 · 若以后加再放开特定路由
# accelerometer / gyroscope / magnetometer · 移动端动效要才打开
add_header Permissions-Policy "
  accelerometer=(),
  ambient-light-sensor=(),
  autoplay=(self),
  battery=(),
  bluetooth=(),
  camera=(),
  clipboard-read=(),
  clipboard-write=(self),
  display-capture=(),
  document-domain=(),
  encrypted-media=(),
  fullscreen=(self),
  geolocation=(),
  gyroscope=(),
  hid=(),
  idle-detection=(),
  keyboard-map=(),
  magnetometer=(),
  microphone=(),
  midi=(),
  payment=(),
  picture-in-picture=(),
  publickey-credentials-get=(),
  serial=(),
  sync-xhr=(self),
  usb=(),
  xr-spatial-tracking=()
" always;

# ── COOP/COEP（可选 · 启用后会跟某些第三方 iframe 不兼容）──
# add_header Cross-Origin-Opener-Policy "same-origin" always;
# add_header Cross-Origin-Embedder-Policy "require-corp" always;

# ── X-XSS-Protection · 现代浏览器已废弃但 IE/老 Safari 还看 ──
add_header X-XSS-Protection "1; mode=block" always;
