# 觉学 nginx 站点配置 · 生产模板
#
# 用法（必须替换三处占位符）：
#   sudo cp deploy/nginx/juexue.conf /etc/nginx/sites-available/juexue
#   # ① 域名（按你的真实域名）
#   sudo sed -i 's/app.juexue.example/你的真实域名/g' /etc/nginx/sites-available/juexue
#   # ② 项目路径（按你的真实部署路径，没改这步会 404）
#   sudo sed -i 's|/PATH/TO/juexue|/opt/juexue|g'      /etc/nginx/sites-available/juexue
#   # ③ 后端端口（默认 3000；如 backend/.env 里 PORT 不是 3000，改成实际值）
#   sudo sed -i 's|127.0.0.1:3000|127.0.0.1:你的端口|g' /etc/nginx/sites-available/juexue
#   sudo ln -sf /etc/nginx/sites-available/juexue /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d 你的真实域名      # 自动签 HTTPS · 会就地编辑此文件加 listen 443 ssl 块
#
# 本文件已校准的参数（出过事的踩坑修复，别随便改小）：
#   · client_max_body_size 25M     ── 不设 → 默认 1 MB，admin 上传法本 → 413
#   · proxy_*_timeout 120s         ── LLM 造题 / 大 PDF 解析可能 30s+
#   · X-Forwarded-* 全套           ── 后端 IP 限流 / 审计需要
#   · proxy_set_header Authorization ── @fastify/jwt 读 header

server {
  listen 80;
  server_name app.juexue.example;

  # ⚠️ 必须改成你的真实**项目根目录**（不是 /prototypes 子目录！）
  # 例：/opt/juexue 或 /home/ubuntu/projects/juexue
  # 这样 URL /prototypes/desktop/xxx.html 才能映射到 <root>/prototypes/desktop/xxx.html
  root /PATH/TO/juexue;
  index prototypes/mobile/auth.html;

  # ── 全局上传上限（必须 ≥ 后端 multipart fileSize 20 MB） ──
  # 不设 → nginx 默认 1 MB，admin 法本导入立刻 413
  client_max_body_size 25M;

  # ── 1. 静态资源（前端原型 · URL 含 /prototypes/ 前缀）──
  location / {
    try_files $uri $uri/ =404;
    location = / { return 302 /prototypes/mobile/auth.html; }
  }

  # ── 1b. admin 上传的资源（封面图等） · 7 天浏览器缓存 ──
  location /uploads/ {
    # root 已经是项目根 · /uploads/courses/<file> → <root>/uploads/courses/<file>
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    # 防热链 / 限制 referer 可在此加：valid_referers ...
  }

  # ── 2. API 反代到 Fastify ──
  # ⚠️ 端口必须和 backend/.env 的 PORT 一致（默认 3000，按需改）
  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization     $http_authorization;

    # 大文件上传 / LLM 长任务 / 法本网页抓取（最长 17s）
    # 任一项小于 60s 都可能导致间歇性超时
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;
    proxy_connect_timeout  30s;
    client_body_timeout   120s;

    # 关闭 nginx 自带 buffer，让大上传流式过 (避免 nginx 临时落盘)
    proxy_request_buffering off;
  }

  # ── 3. 健康检查（运维探活） ──
  location = /health {
    proxy_pass http://127.0.0.1:3000/health;
    access_log off;
  }

  # ── 4. /docs（OpenAPI Swagger UI） ──
  # dev/staging 留着方便联调；生产保密的话整段删掉
  location /docs {
    proxy_pass http://127.0.0.1:3000/docs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
  location /openapi.json {
    proxy_pass http://127.0.0.1:3000/openapi.json;
  }
}
