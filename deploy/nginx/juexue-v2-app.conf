# 觉学 v2 · React SPA · 与老 MPA 共存
#
# 用法（在 juexue.conf 的 server { } 内 include）：
#   include /etc/nginx/conf.d/juexue-v2-app.conf;
#
# 部署流程：
#   1. 本地：cd juexue-v2 && npm run build  生成 dist/
#   2. 服务器：rsync dist/ → /home/ubuntu/projects/juexue/juexue-v2/dist/
#      （或部署到 /var/www/juexue/app/ · 与老版隔离）
#   3. 老 MPA 路径 /prototypes/* 仍工作 · 用户继续访问老版
#   4. 新 SPA 路径 /app/* 上线 · 邀请用户测试
#   5. Phase 9 切默认入口 · 老版下线
#
# 路径设计（Phase 9 已切换默认入口）：
#   /                    → 302 → /app/（在 juexue.conf 的 location = / 完成）
#   /app/                → /app/index.html（fallback · SPA 路由由 React Router 接管）
#   /app/assets/*        → vite 产物 · 强缓存（1 年 immutable · hash 文件名）
#   /app/index.html      → 不缓存（每次拉新 · 否则 hash 引用过期）
#   /api/*               → 已有 location · 不变
#   /prototypes/*        → 保留兜底 30 天（Phase 10 完整下线）

location /app/ {
  # 静态文件根（与老 MPA 同一项目根 · 或独立 /var/www/juexue/app/）
  alias /home/ubuntu/projects/juexue/juexue-v2/dist/;

  # SPA fallback · 任何 /app/xxx 都返回 index.html · 让 React Router 接管
  try_files $uri $uri/ /app/index.html;

  # index.html 不缓存（文件名固定 · 内容会变）
  location = /app/index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
  }

  # vite 产物文件名带 hash（如 assets/index-a3f9b2.js）· 强缓存 1 年
  location ~* /app/assets/.*\.(js|css|woff2?|ttf|svg|png|jpg|jpeg|webp)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    expires 1y;
    access_log off;
  }
}

# Phase 9 完成 · 默认入口已切到 /app/（在 juexue.conf 的 location = / 内）。
# 回滚：把 juexue.conf 内 `return 302 /app/` 改回 `return 302 /prototypes/mobile/auth.html`
# 然后 sudo nginx -s reload。React SPA 仍可独立通过 /app/ 访问，不影响。
