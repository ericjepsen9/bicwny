# 觉学 Staging vhost 模板
#   占位符 __STAGING_DOMAIN__ / __STAGING_PORT__ / __PROJECT_DIR__
#   由 setup-staging.sh sed 替换后写到 /etc/nginx/sites-available/
#
# Robots：noindex 防搜索引擎收录 staging 内容
# Basic auth：可选 · 想完全私有打开下面注释 + 配 .htpasswd

server {
    listen 80;
    listen [::]:80;
    server_name __STAGING_DOMAIN__;

    # certbot 完成后会自动改这里 · 加 ssl 监听 + 强制 https
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __STAGING_DOMAIN__;

    # certbot 第一次跑会写入 ssl_certificate / ssl_certificate_key 行
    # 占位在此 · 会被自动覆盖
    # ssl_certificate /etc/letsencrypt/live/__STAGING_DOMAIN__/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/__STAGING_DOMAIN__/privkey.pem;

    # 安全响应头（CSP / Permissions-Policy 等）· P2 #28
    # ⚠️ 部署时把 deploy/nginx/security-headers.conf 复制到 /etc/nginx/conf.d/
    include /etc/nginx/conf.d/juexue-security-headers.conf;

    # robots noindex · 防 staging 内容被 Google / Baidu 收录
    add_header X-Robots-Tag "noindex, nofollow" always;

    # 可选 basic auth · 想完全私有打开（先 sudo apt install apache2-utils;
    #   htpasswd -c /etc/nginx/staging.htpasswd dev）
    # auth_basic "Staging";
    # auth_basic_user_file /etc/nginx/staging.htpasswd;

    client_max_body_size 25M;

    # 静态前端
    root __PROJECT_DIR__/prototypes;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # 上传图片 · 长缓存
    location /uploads/ {
        alias __PROJECT_DIR__/uploads/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
    }

    # service worker 不缓存（防发版触达不到）
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # API 反代到 staging pm2
    location /api/ {
        proxy_pass http://127.0.0.1:__STAGING_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:__STAGING_PORT__/health;
    }
}
